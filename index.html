/* ── Fuzzy ── */
function lev(a,b){const m=a.length,n=b.length;if(!m)return n;if(!n)return m;const d=Array.from({length:m+1},(_,i)=>i);for(let j=1;j<=n;j++){let p=d[0];d[0]=j;for(let i=1;i<=m;i++){const t=d[i];d[i]=a[i-1]===b[j-1]?p:1+Math.min(p,d[i],d[i-1]);p=t;}}return d[m];}
function norm(s){return s.toLowerCase().replace(/ё/g,"е").replace(/[.\-_\/\\,;:!?()]/g," ").replace(/\s+/g," ").trim();}
function normNum(s){return(" "+norm(s)+" ").replace(/(?<=\s)(одну|одной|одного|одним|одном|одна|одно|один)(?=\s)/g,"1").replace(/(?<=\s)(двух|двум|двумя|двое|две|два)(?=\s)/g,"2").replace(/(?<=\s)(трех|трем|тремя|трое|три)(?=\s)/g,"3").replace(/(?<=\s)(четырех|четырем|четыре)(?=\s)/g,"4").replace(/\s+/g," ").trim();}
function buildIdx(els,syn){return els.map(el=>{const n=normNum(el.name),w=n.split(" "),sk=[];for(const[k,v]of Object.entries(syn))if(v===el.name)sk.push(normNum(k));return{el,n,w,sk};});}
function findBest(q,idx,th=0.45){const qn=normNum(q);if(!qn)return null;let bs=0,be=null;for(const{el,n,w,sk}of idx){if(n===qn)return{el,s:1,ex:true};for(const s of sk)if(s===qn)return{el,s:1,ex:true};if(n.includes(qn)){const s=qn.length/n.length*0.95;if(s>bs){bs=s;be=el;}}/* Bonus: query matches first word(s) of element — only full words, len>2 */if(qn.length>2&&n.startsWith(qn+" ")){const s=Math.max(0.55,qn.length/n.length*1.2);if(s>bs){bs=Math.min(s,0.75);be=el;}}for(const s of sk){if(s.includes(qn)||qn.includes(s)){const sc=Math.min(qn.length,s.length)/Math.max(qn.length,s.length)*0.9;if(sc>bs){bs=sc;be=el;}}const d=lev(qn,s),ml=Math.max(qn.length,s.length),sc=ml>0?(1-d/ml):0;if(sc>bs){bs=sc;be=el;}}const qw=qn.split(" ");let mw=0;for(const qi of qw)for(const wi of w){const d=lev(qi,wi),ml=Math.max(qi.length,wi.length);if(ml>0&&(1-d/ml)>0.7){mw++;break;}}if(qw.length>0){const ws=mw/Math.max(qw.length,w.length)*0.85;if(ws>bs){bs=ws;be=el;}}const d=lev(qn,n),ml=Math.max(qn.length,n.length),s=ml>0?(1-d/ml)*0.8:0;if(s>bs){bs=s;be=el;}}if(bs>=th&&be)return{el:be,s:bs,ex:false};return null;}

/* ── Balance ── */
function bal(sC,dC,lv){const mx=Math.max(sC,dC),mn=Math.min(sC,dC);if(mx===0)return 0;const r=(mx+mn)/Math.sqrt(2*(mx*mx+mn*mn));return(1-Math.acos(Math.min(1,Math.max(-1,r)))/Math.acos(Math.SQRT2/2))*lv;}

function Gauge({value,max,color}){const p=max>0?Math.min(value/max,1):0;const C=2*Math.PI*54,o=C*(1-p*0.75);return(<svg viewBox="0 0 120 120" style={{width:160,height:160,transform:"rotate(135deg)"}}><circle cx="60" cy="60" r="54" fill="none" stroke="#1e293b" strokeWidth="10" strokeDasharray={`${C*0.75} ${C*0.25}`} strokeLinecap="round"/><circle cx="60" cy="60" r="54" fill="none" stroke={color} strokeWidth="10" strokeDasharray={`${C*0.75} ${C*0.25}`} strokeDashoffset={o} strokeLinecap="round" style={{transition:"stroke-dashoffset 0.8s"}}/></svg>);}

/* ── Voice Search Hook ── */
function useVoiceSearch(){
  const[listening,setListening]=useState(false);
  const mrRef=useRef(null);const chRef=useRef([]);const cbRef=useRef(null);
  const available=!!navigator.mediaDevices;
  const start=useCallback((onResult)=>{
    if(!navigator.mediaDevices)return;cbRef.current=onResult;
    navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
      const mr=new MediaRecorder(stream,{mimeType:MediaRecorder.isTypeSupported("audio/webm;codecs=opus")?"audio/webm;codecs=opus":"audio/webm"});
      chRef.current=[];
      mr.ondataavailable=e=>{if(e.data.size>0)chRef.current.push(e.data);};
      mr.onstop=async()=>{
        stream.getTracks().forEach(t=>t.stop());
        const blob=new Blob(chRef.current,{type:mr.mimeType});
        if(blob.size<100){setListening(false);return;}
        try{const text=await whisperTranscribe(blob);if(cbRef.current&&text.trim())cbRef.current(text.trim());}
        catch(e){console.error("Whisper error:",e);}
        setListening(false);mrRef.current=null;
      };
      mrRef.current=mr;mr.start(1000);setListening(true);
      setTimeout(()=>{if(mrRef.current&&mrRef.current.state==="recording")try{mrRef.current.stop();}catch(e){}},180000);
    }).catch(()=>{setListening(false);});
  },[]);
  const stop=useCallback(()=>{if(mrRef.current&&mrRef.current.state==="recording")try{mrRef.current.stop();}catch(e){}else setListening(false);},[]);
  return{available,listening,start,stop};
}

  const ids=useMemo(()=>new Set(selected.map(s=>s.name)),[selected]);
  const fil=useMemo(()=>{if(!q.trim())return elements.filter(e=>!ids.has(e.name)).slice(0,50);const qn=norm(q);return elements.filter(e=>{if(ids.has(e.name))return false;if(norm(e.name).includes(qn))return true;if(synonyms){for(const[k,v]of Object.entries(synonyms)){if(v===e.name&&norm(k).includes(qn))return true;}}return false;}).slice(0,50);},[q,elements,ids,synonyms]);
  const toggleVoice=()=>{
    if(voice.listening){voice.stop();return;}

/* ── Voice parsing ── */
const SLOT_KW=[
{ps:["группа а","группа a","связка 1","связка один","связка 1н","первая связка","первая группа","1 связка","1 группа","группа 1"],sl:0},
{ps:["группа с","группа c","связка 2","связка два","связка 2а","вторая связка","вторая группа","2 связка","2 группа","группа 2"],sl:1},
{ps:["группа е","группа e","связка 3","связка три","связка 3и","третья связка","третья группа","3 связка","3 группа","группа 3"],sl:2},
{ps:["группа г","группа g","связка 4","связка четыре","связка 4е","четвёртая связка","четвертая связка","четвертая группа","4 связка","4 группа","группа 4"],sl:3},
{ps:["связка 5","связка пять","пятая связка","5 связка","группа 5"],sl:4},
{ps:["связка 6","связка шесть","шестая связка","6 связка","группа 6"],sl:5},
{ps:["связка 7","связка семь","седьмая связка","7 связка","группа 7"],sl:6},
{ps:["связка 8","связка восемь","восьмая связка","8 связка","группа 8"],sl:7},
{ps:["связка 9","связка девять","девятая связка","9 связка","группа 9"],sl:8},
{ps:["связка 10","связка десять","десятая связка","10 связка","группа 10"],sl:9}];

function parseVoice(text){
  const lo=norm(text);const mk=[];
  for(const{ps,sl}of SLOT_KW)for(const p of ps){let i=lo.indexOf(p);while(i!==-1){mk.push({pos:i,len:p.length,sl});i=lo.indexOf(p,i+1);}}
  mk.sort((a,b)=>a.pos-b.pos);
  if(!mk.length)return[{sl:0,raw:text.trim()}];
  const r=[];for(let i=0;i<mk.length;i++){const s=mk[i].pos+mk[i].len;const e=i<mk.length-1?mk[i+1].pos:lo.length;const c=lo.substring(s,e).trim();if(c)r.push({sl:mk[i].sl,raw:c});}return r;
}
function splitEls(raw){return raw.split(/\s*(?:,|потом|далее|затем|дальше|следующий|следующая|и\s+потом)\s*/i).map(s=>s.trim()).filter(s=>s.length>0);}
function smartSplit(raw,idx){
  /* 1. Extract quoted phrases — user explicitly grouped with «», "", "" */
  const quoted=[];
  const QTAG="\x00";/* null byte placeholder — survives norm() */
  const stripped=raw.replace(/[""«»"\u201c\u201d](.*?)[""«»"\u201c\u201d]/g,(_,g)=>{quoted.push(g.trim());return " "+QTAG+quoted.length+QTAG+" ";});
  /* 2. Split by explicit delimiters */
  const chunks=splitEls(stripped);const all=[];
  for(const chunk of chunks){
    /* Handle quoted placeholders before norm */
    const parts=chunk.split(new RegExp(QTAG+"(\\d+)"+QTAG));
    for(let p=0;p<parts.length;p++){
      if(p%2===1){/* odd index = quoted number */
        all.push(quoted[parseInt(parts[p])-1]);continue;
      }
      const words=norm(parts[p]).split(/\s+/).filter(Boolean);
      if(!words.length)continue;
      let i=0;
      while(i<words.length){
        let found=false;
        const maxLen=Math.min(15,words.length-i);
        /* Try longest phrase first — take first match above threshold */
        for(let len=maxLen;len>=1;len--){
          const phrase=words.slice(i,i+len).join(" ");
          const th=len>=4?0.4:0.55;
          const m=findBest(phrase,idx,th);
          if(m&&m.s>=th){all.push(phrase);i+=len;found=true;break;}
        }
        if(!found){all.push(words[i]);i++;}
      }
    }
  }
  return all;
}

/* ── Voice Panel ── */
function VoicePanel({onApply,synonyms,onAddSyn,slots:curSlots,onPenalty}){
  const[on,setOn]=useState(false);const[tx,setTx]=useState("");const[itx,setItx]=useState("");
  const[parsed,setParsed]=useState(null);const[uri,setUri]=useState(null);const[sq,setSq]=useState("");
  const[ti,setTi]=useState("");const[status,setStatus]=useState("");
  const[aiLoading,setAiLoading]=useState(false);
  const[micOk,setMicOk]=useState(null);
  const[lastResult,setLastResult]=useState(null);/* {text, parsed, applied} — for review after apply */
  const[showReview,setShowReview]=useState(false);
  const mediaRec=useRef(null);const chunks=useRef([]);
  const sidx=useMemo(()=>buildIdx(ELS,synonyms),[synonyms]);

  const requestMic=async()=>{
    try{
      setStatus("Запрашиваю микрофон...");
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      stream.getTracks().forEach(t=>t.stop());
      setMicOk(true);setStatus("Микрофон разрешён");return true;
    }catch(e){
      setMicOk(false);
      if(e.name==="NotAllowedError")setStatus("Микрофон заблокирован");
      else if(e.name==="NotFoundError")setStatus("Микрофон не найден");
      else setStatus("Ошибка микрофона: "+e.message);
      return false;
    }
  };

  const start=async()=>{
    if(micOk!==true){const ok=await requestMic();if(!ok)return;}
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      const mr=new MediaRecorder(stream,{mimeType:MediaRecorder.isTypeSupported("audio/webm;codecs=opus")?"audio/webm;codecs=opus":"audio/webm"});
      chunks.current=[];
      mr.ondataavailable=e=>{if(e.data.size>0)chunks.current.push(e.data);};
      mr.onstop=async()=>{
        stream.getTracks().forEach(t=>t.stop());
        const blob=new Blob(chunks.current,{type:mr.mimeType});
        if(blob.size<100){setStatus("Запись слишком короткая");setOn(false);return;}
        setStatus("🤖 Распознаю речь (Whisper)...");
        try{const text=await whisperTranscribe(blob);if(text.trim()){setTx(prev=>(prev?prev+" ":"")+text.trim());setStatus("Распознано ✓");}else{setStatus("Речь не распознана");}}
        catch(e){setStatus("⛔ "+e.message);}
        setOn(false);
      };
      mediaRec.current=mr;mr.start(1000);setOn(true);setStatus("🎤 Запись...");setItx("");
      setTimeout(()=>{if(mediaRec.current&&mediaRec.current.state==="recording")try{mediaRec.current.stop();}catch(e){}},180000);
    }catch(e){setStatus("Ошибка записи: "+e.message);setOn(false);}
  };

  const stop=()=>{
    if(mediaRec.current&&mediaRec.current.state==="recording"){try{mediaRec.current.stop();}catch(e){}}
    else setOn(false);
  };

  const process=useCallback(()=>{
    if(!tx.trim())return;
    const lo=norm(tx);
    if(onPenalty){
      const penKw=[{p:["жесткое падение","жёсткое падение","дисквалификация"],t:"dq"},{p:["падение","упал","упала"],t:"fall"},{p:["грязно","бланш","грязное","штраф минус 2","минус 2 балла","минус два"],t:"dirty"}];
      for(const{p,t}of penKw)for(const kw of p)if(lo.includes(kw)){onPenalty(t);setStatus("⚠️ Штраф: "+(t==="dq"?"ДСК":t==="fall"?"падение":"грязное"));break;}
    }
    const chunks=parseVoice(tx);
    const res=chunks.map(({sl,raw})=>{const qs=smartSplit(raw,sidx);const ms=qs.map(q=>{const m=findBest(q,sidx);return{q,m,el:m?.el||null};});return{sl,ms};});
    setParsed(res);
  },[tx,sidx,onPenalty]);

  const unr=useMemo(()=>{if(!parsed)return[];const it=[];parsed.forEach((c,ci)=>c.ms.forEach((m,mi)=>{if(!m.el)it.push({ci,mi,q:m.q});}));return it;},[parsed]);
  const au=uri!==null?unr[uri]:null;
  const[editCI,setEditCI]=useState(null);const[editMI,setEditMI]=useState(null);const[editSq,setEditSq]=useState("");
  const editEls=useMemo(()=>editSq?ELS.filter(e=>norm(e.name).includes(norm(editSq))).slice(0,30):ELS.slice(0,30),[editSq]);
  const startEdit=(ci,mi,q)=>{setEditCI(ci);setEditMI(mi);setEditSq(q);setUri(null);setSq("");};
  const applyEdit=(el)=>{
    const origQ=parsed[editCI]?.ms[editMI]?.q;
    if(origQ&&!parsed[editCI].ms[editMI].el){onAddSyn(origQ,el.name);}
    setParsed(parsed.map((c,i)=>i!==editCI?c:{...c,ms:c.ms.map((m,j)=>j!==editMI?m:{...m,el,m:{el,s:1,ex:true}})}));
    setEditCI(null);setEditMI(null);setEditSq("");
  };
  const cancelEdit=()=>{setEditCI(null);setEditMI(null);setEditSq("");};
  const removeEl=(ci,mi)=>{setParsed(parsed.map((c,i)=>i!==ci?c:{...c,ms:c.ms.filter((_,j)=>j!==mi)}));};
  const mergeEls=(ci,mi)=>{/* merge element mi with mi+1 in chunk ci */
    setParsed(parsed.map((c,i)=>{if(i!==ci)return c;const ms=[...c.ms];if(mi>=ms.length-1)return c;
      const merged=ms[mi].q+" "+ms[mi+1].q;const m=findBest(merged,sidx,0.3);
      ms.splice(mi,2,{q:merged,m:m||null,el:m?.el||null});return{...c,ms};}));
  };

  const resolve=(ci,mi,el)=>{
    const q=parsed[ci].ms[mi].q;onAddSyn(q,el.name);
    setParsed(parsed.map((c,i)=>i!==ci?c:{...c,ms:c.ms.map((m,j)=>j!==mi?m:{...m,el,m:{el,s:1,ex:true}})}));
    setUri(null);setSq("");
  };

  const apply=()=>{
    if(!parsed)return;const maxSl=Math.max(curSlots.length-1,...parsed.map(p=>p.sl));const ns=Array.from({length:maxSl+1},(_, i)=>i<curSlots.length?[...curSlots[i]]:[]);const ex=new Set(curSlots.flat().map(e=>e.name));
    parsed.forEach(({sl,ms})=>ms.forEach(({el})=>{if(el&&!ex.has(el.name)){ns[sl].push(el);ex.add(el.name);}}));
    /* Save for review */
    const srcText=tx||ti;
    const matched=[];const missed=[];
    parsed.forEach(({sl,ms})=>ms.forEach(({q,el})=>{if(el)matched.push({q,name:el.name,sl});else missed.push({q,sl});}));
    setLastResult({text:srcText,matched,missed,slots:parsed.map(p=>p.sl)});
    setShowReview(missed.length>0);
    onApply(ns);setParsed(null);setTx("");setTi("");
  };

  const fEls=useMemo(()=>sq?ELS.filter(e=>norm(e.name).includes(norm(sq))).slice(0,30):ELS.slice(0,30),[sq]);

  const processText=()=>{if(!ti.trim())return;setTx(ti);const lo=norm(ti);if(onPenalty){const penKw=[{p:["жесткое падение","жёсткое падение","дисквалификация"],t:"dq"},{p:["падение","упал","упала"],t:"fall"},{p:["грязно","бланш","грязное","штраф минус 2","минус 2 балла","минус два"],t:"dirty"}];for(const{p,t}of penKw)for(const kw of p)if(lo.includes(kw)){onPenalty(t);break;}}const chunks=parseVoice(ti);const res=chunks.map(({sl,raw})=>{const qs=smartSplit(raw,sidx);const ms=qs.map(q=>{const m=findBest(q,sidx);return{q,m,el:m?.el||null};});return{sl,ms};});setParsed(res);};

  const processAI=async(text)=>{
    const src=text||(tx||ti).trim();if(!src){setStatus("Нет текста");return;}
    setAiLoading(true);setStatus("🤖 AI анализирует...");
    try{
      const data=await aiParse(src);
      if(data.elements&&data.elements.length){
        const voiceChunks=parseVoice(src);
        const aiEls=data.elements.map(ai=>{const el=ELS.find(e=>e.name===ai.name);return{q:ai.spoken||ai.name,m:el?{el,s:1,ex:true}:null,el:el||null,confidence:ai.confidence};});
        if(voiceChunks.length>1||voiceChunks[0].sl!==0||voiceChunks.length===1&&voiceChunks[0].raw!==src.trim()){
          /* Distribute AI elements across voice-detected slots by matching element names to chunk text */
          const loSrc=norm(src);const slotRanges=[];
          for(let i=0;i<voiceChunks.length;i++){
            const vc=voiceChunks[i];const rawLo=norm(vc.raw);
            const startPos=loSrc.indexOf(rawLo);
            slotRanges.push({sl:vc.sl,start:startPos,end:startPos>=0?startPos+rawLo.length:loSrc.length});
          }
          const buckets={};slotRanges.forEach(sr=>{if(!buckets[sr.sl])buckets[sr.sl]=[];});
          const assigned=new Set();
          /* For each AI element, find which chunk its name appears in (check spoken name, element name, or AI slot) */
          for(let ei=0;ei<aiEls.length;ei++){
            const ae=aiEls[ei];const aiSlot=data.elements[ei].slot;
            if(aiSlot!=null&&buckets[aiSlot]!=null){buckets[aiSlot].push(ae);assigned.add(ei);continue;}
            const eName=norm(ae.q);const elName=ae.el?norm(ae.el.name):"";
            let bestSl=voiceChunks[0].sl;let found=false;
            for(const sr of slotRanges){
              const chunkText=loSrc.substring(sr.start,sr.end);
              if(chunkText.includes(eName)||(elName&&chunkText.includes(elName))){bestSl=sr.sl;found=true;break;}
            }
            if(!buckets[bestSl])buckets[bestSl]=[];
            buckets[bestSl].push(ae);assigned.add(ei);
          }
          /* Any unassigned go to last slot */
          for(let ei=0;ei<aiEls.length;ei++){
            if(!assigned.has(ei)){const lastSl=voiceChunks[voiceChunks.length-1].sl;if(!buckets[lastSl])buckets[lastSl]=[];buckets[lastSl].push(aiEls[ei]);}
          }
          const res=Object.entries(buckets).filter(([_,ms])=>ms.length>0).map(([sl,ms])=>({sl:parseInt(sl),ms}));
          res.sort((a,b)=>a.sl-b.sl);
          setParsed(res);
        }else{
          setParsed([{sl:0,ms:aiEls}]);
        }
        setStatus("🤖 AI нашёл "+data.elements.length+" элементов");
      }else{setStatus("AI не нашёл элементов");}
    }catch(e){setStatus("⛔ "+e.message);}
    finally{setAiLoading(false);}
  };

  const voiceAvail=!!navigator.mediaDevices;

  return(<div style={{marginBottom:20,background:"linear-gradient(145deg,#1e293b,#0f172a)",borderRadius:16,border:"1px solid #334155",overflow:"hidden"}}>
    <div style={{padding:"16px 20px",borderBottom:"1px solid #1e293b",display:"flex",alignItems:"center",gap:12}}>
      <div style={{width:36,height:36,borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",background:on?"rgba(239,68,68,0.2)":"rgba(20,184,166,0.15)",border:`1px solid ${on?"rgba(239,68,68,0.4)":"rgba(20,184,166,0.3)"}`,animation:on?"pulse 1.5s infinite":"none"}}><span style={{fontSize:20}}>{on?"🔴":voiceAvail?"🎙️":"⌨️"}</span></div>
      <div style={{flex:1}}><div style={{fontSize:14,fontWeight:600,color:"#e2e8f0"}}>{voiceAvail?"Голосовой ввод":"Ввод связок"}</div><div style={{fontSize:11,color:"#64748b"}}>{on?"Говорите...":voiceAvail?"Нажмите Старт":"Текстовый режим"}</div></div>
      {voiceAvail&&<button onClick={on?stop:start} style={{padding:"8px 20px",borderRadius:10,border:`1px solid ${on?"rgba(239,68,68,0.3)":"rgba(20,184,166,0.3)"}`,cursor:"pointer",fontSize:13,fontWeight:600,background:on?"rgba(239,68,68,0.2)":"rgba(20,184,166,0.15)",color:on?"#ef4444":"#14b8a6"}}>{on?"⏹ Стоп":"▶ Старт"}</button>}
    </div>

    {/* Status line */}
    {status&&<div style={{padding:"6px 20px",fontSize:11,color:status.startsWith("⛔")?"#ef4444":"#64748b",background:status.startsWith("⛔")?"rgba(239,68,68,0.05)":"transparent"}}>{status}</div>}

/* ── Synonym Panel ── */
function SynPanel({syn,onRem,onAdd,onReplace,elements,syncStatus}){

  const[newKey,setNewKey]=useState("");
  const[newVal,setNewVal]=useState("");
  const[addMode,setAddMode]=useState(false);
  const e=Object.entries(syn);
  const filtered=filter?e.filter(([k,v])=>k.includes(norm(filter))||norm(v).includes(norm(filter))):e;
  const matchEls=useMemo(()=>newVal?elements.filter(el=>norm(el.name).includes(norm(newVal))).slice(0,20):elements.slice(0,20),[newVal,elements]);
  return(<div style={{marginBottom:20}}>
    <button onClick={()=>setShow(!show)} style={{width:"100%",padding:"12px",background:"#1e293b",border:"1px solid #334155",borderRadius:12,color:"#94a3b8",fontSize:13,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}><span>Словарь синонимов ({e.length})</span><span style={{transform:show?"rotate(180deg)":"none",transition:"transform 0.2s"}}>&#9660;</span></button>

        <button onClick={()=>setAddMode(!addMode)} style={{flex:1,padding:"8px",borderRadius:8,border:"1px dashed rgba(20,184,166,0.3)",background:addMode?"rgba(20,184,166,0.1)":"transparent",color:"#14b8a6",fontSize:12,fontWeight:600,cursor:"pointer"}}>{addMode?"Отмена":"+ Добавить"}</button>
        <button onClick={()=>{const blob=new Blob([JSON.stringify(syn,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="wu-synonyms.json";a.click();URL.revokeObjectURL(a.href);}} style={{padding:"8px 12px",borderRadius:8,border:"1px solid #334155",background:"transparent",color:"#94a3b8",fontSize:12,fontWeight:600,cursor:"pointer"}}>📥 Экспорт</button>
        <button onClick={()=>{const inp=document.createElement("input");inp.type="file";inp.accept=".json";inp.onchange=ev=>{const f=ev.target.files[0];if(!f)return;const r=new FileReader();r.onload=re=>{try{const d=JSON.parse(re.target.result);if(typeof d==="object"&&!Array.isArray(d)){onReplace({...syn,...d});}}catch(e){}};r.readAsText(f);};inp.click();}} style={{padding:"8px 12px",borderRadius:8,border:"1px solid #334155",background:"transparent",color:"#94a3b8",fontSize:12,fontWeight:600,cursor:"pointer"}}>📤 Импорт</button>
      </div>
      {syncStatus&&<div style={{fontSize:11,color:"#14b8a6",marginBottom:8,textAlign:"center"}}>{syncStatus}</div>}
      <div style={{fontSize:10,color:"#475569",marginBottom:10,textAlign:"center"}}>Синонимы хранятся на сервере и синхронизируются автоматически</div>
      {addMode&&(<div style={{padding:12,background:"#0f172a",borderRadius:10,border:"1px solid rgba(20,184,166,0.2)",marginBottom:12}}>
        <div style={{marginBottom:8}}><label style={{fontSize:11,color:"#64748b",display:"block",marginBottom:4}}>Слово/фраза (как говорите)</label><input value={newKey} onChange={e=>setNewKey(e.target.value)} placeholder='напр: "выход 1рука"' style={{width:"100%",padding:"8px 12px",background:"#1e293b",border:"1px solid #334155",borderRadius:8,color:"#e2e8f0",fontSize:13,outline:"none",boxSizing:"border-box"}}/></div>

      </div>)}
      {e.length>5&&(<input value={filter} onChange={e=>setFilter(e.target.value)} placeholder="Поиск синонимов..." style={{width:"100%",padding:"8px 12px",background:"#0f172a",border:"1px solid #334155",borderRadius:8,color:"#e2e8f0",fontSize:12,outline:"none",boxSizing:"border-box",marginBottom:10}}/>)}
      {filtered.length>0?(<div style={{display:"flex",flexDirection:"column",gap:6}}>{filtered.map(([k,v])=>(<div key={k} style={{display:"flex",alignItems:"flex-start",gap:6,padding:"6px 10px",background:"rgba(15,23,42,0.6)",borderRadius:8,border:"1px solid #1e293b",fontSize:11}}><span style={{color:"#f59e0b",fontWeight:600,whiteSpace:"nowrap"}}>{k}</span><span style={{color:"#475569"}}>→</span><span style={{color:"#94a3b8",flex:1,lineHeight:1.4}}>{v}</span><span onClick={()=>onRem(k)} style={{cursor:"pointer",color:"#64748b",fontSize:14,lineHeight:1,flexShrink:0}}>×</span></div>))}</div>):(<div style={{fontSize:12,color:"#475569",textAlign:"center",padding:8}}>{filter?"Ничего не найдено":"Нет синонимов"}</div>)}

  const[synStatus,setSynStatus]=useState("");

  const saveSyn=useCallback(ns=>{setSyn(ns);LS.set("wu-syn",ns);syncSynonymsToServer(ns);},[]);
  const addSyn=useCallback((k,v)=>{const ns={...syn,[norm(k)]:v};setSyn(ns);LS.set("wu-syn",ns);syncSynonymsToServer(ns);},[syn]);
  const remSyn=useCallback(k=>{const ns={...syn};delete ns[k];setSyn(ns);LS.set("wu-syn",ns);deleteSynonymOnServer(k);},[syn]);

  /* Sync synonyms from server on mount */
  useEffect(()=>{
    fetchSynonymsFromServer().then(serverSyn=>{
      if(!serverSyn)return;
      const local=LS.get("wu-syn")||{};
      const merged={...serverSyn,...local};
      if(JSON.stringify(merged)!==JSON.stringify(local)){
        setSyn(merged);LS.set("wu-syn",merged);
        syncSynonymsToServer(merged);
        setSynStatus("Синхронизировано с сервером");
        setTimeout(()=>setSynStatus(""),3000);
      }
    });
  },[]);

  const lv=LEVELS[li];const minS=g==="M"?lv.minM:lv.minF;
  const all=useMemo(()=>slots.flat(),[slots]);
  const sC=all.filter(e=>e.cat==="Статика").length;const dC=all.filter(e=>e.cat==="Динамика").length;
  const raw=all.reduce((s,e)=>s+e.score,0);const b=bal(sC,dC,lv.num);
  const penaltyScore=penalties.dirty*2+penalties.fall*4;
  const tot=raw+b-penaltyScore;
  const comboOk=slots.some(s=>s.length>=3);
  const sOk=minS<=0||tot>=minS;
  const ownLevelCount=all.filter(e=>e.score===lv.num).length;
  const eOk=lv.minEl<=0||ownLevelCount>=lv.minEl;
  const add=(i,el)=>setSlots(p=>{const n=[...p];n[i]=[...n[i],el];return n;});
  const rem=(i,nm)=>setSlots(p=>{const n=[...p];n[i]=n[i].filter(e=>e.name!==nm);return n;});
  const move=(i,from,to)=>setSlots(p=>{const n=[...p];const s=[...n[i]];const el=s[from];s.splice(from,1);s.splice(to,0,el);n[i]=s;return n;});
  const addSlot=()=>setSlots(p=>p.length<10?[...p,[]]:[...p]);
  const removeSlot=(i)=>setSlots(p=>{if(p.length<=1)return p;const n=[...p];n.splice(i,1);return n;});
  const reqs=[{l:"Мин. баллы ("+(g==="M"?"М":"Ж")+")",v:minS},{l:"Связка 3+ эл.",v:"Да"},{l:"Эл. "+lv.num+" разряда",v:lv.minEl}].filter(r=>r.v>0&&r.v!=="0");
  const allOk=!penalties.dq&&sOk&&comboOk&&eOk&&all.length>0;

  return(<div style={{minHeight:"100vh",background:"linear-gradient(180deg,#020617 0%,#0f172a 40%)",color:"#e2e8f0",fontFamily:"system-ui,sans-serif"}}><div style={{maxWidth:480,margin:"0 auto",padding:"0 16px 40px"}}>
    <div style={{padding:"24px 0 20px",textAlign:"center",position:"relative"}}><div style={{fontSize:11,letterSpacing:"0.15em",textTransform:"uppercase",color:"#14b8a6",fontWeight:600,marginBottom:4}}>Workout Unlimited</div><h1 style={{fontSize:24,fontWeight:700,margin:0,color:"#e2e8f0"}}>Калькулятор баллов</h1><p style={{fontSize:12,color:"#475569",margin:"4px 0 0"}}>Голосовой ввод + AI — {ELS.length} элементов</p>
      <button onClick={()=>setShowAI(!showAI)} style={{position:"absolute",top:24,right:0,width:36,height:36,borderRadius:10,border:"1px solid #334155",background:showAI?"rgba(168,85,247,0.15)":"#1e293b",color:showAI?"#a855f7":"#64748b",fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>⚙️</button>
    </div>
    {showAI&&<AISettings/>}

    <div style={{display:"flex",justifyContent:"center",gap:8,marginBottom:16}}>{["M","F"].map(x=>(<button key={x} onClick={()=>setG(x)} style={{padding:"8px 28px",borderRadius:10,border:"none",cursor:"pointer",fontSize:14,fontWeight:600,background:g===x?(x==="M"?"#14b8a6":"#f472b6"):"#1e293b",color:g===x?"#020617":"#64748b",transition:"all 0.2s"}}>{x==="M"?"Мужчины":"Женщины"}</button>))}</div>

    <div style={{marginBottom:20}}><div style={{fontSize:12,color:"#64748b",marginBottom:8,fontWeight:500}}>Уровень</div><div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:4}}>{LEVELS.map((l,i)=>(<button key={l.name} onClick={()=>setLi(i)} style={{padding:"6px 12px",borderRadius:8,border:li===i?"1px solid #14b8a6":"1px solid #1e293b",background:li===i?"rgba(20,184,166,0.12)":"#0f172a",color:li===i?"#14b8a6":"#64748b",fontSize:11,fontWeight:600,whiteSpace:"nowrap",cursor:"pointer",flexShrink:0}}>{l.name.replace("SPIRIT ","S").replace("FREESTYLE ","F")}</button>))}</div></div>

    <div style={{background:"linear-gradient(145deg,#1e293b,#0f172a)",borderRadius:20,padding:24,marginBottom:20,border:"1px solid #334155",position:"relative",overflow:"hidden"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}><Gauge value={tot} max={Math.max(minS*1.5,1)} color={sOk?"#14b8a6":"#f59e0b"}/><div style={{position:"absolute",textAlign:"center",transform:"translateY(-8px)"}}><div style={{fontSize:36,fontWeight:800,color:sOk?"#14b8a6":"#f59e0b",lineHeight:1}}>{tot.toFixed(1)}</div><div style={{fontSize:11,color:"#64748b",marginTop:2}}>{minS>0?"из "+minS+" ("+(g==="M"?"М":"Ж")+")":"нет порога"}</div></div></div>
      <div style={{display:"grid",gridTemplateColumns:(penaltyScore>0||penalties.dq)?"1fr 1fr 1fr 1fr":"1fr 1fr 1fr",gap:12,marginTop:16}}>
        <div style={{textAlign:"center",padding:"10px 0",background:"rgba(15,23,42,0.6)",borderRadius:12}}><div style={{fontSize:20,fontWeight:700,color:"#e2e8f0"}}>{raw.toFixed(1)}</div><div style={{fontSize:10,color:"#64748b",marginTop:2}}>Элементы</div></div>
        <div style={{textAlign:"center",padding:"10px 0",background:"rgba(15,23,42,0.6)",borderRadius:12}}><div style={{fontSize:20,fontWeight:700,color:b>0?"#14b8a6":"#64748b"}}>+{b.toFixed(1)}</div><div style={{fontSize:10,color:"#64748b",marginTop:2}}>Баланс</div></div>
        <div style={{textAlign:"center",padding:"10px 0",background:"rgba(15,23,42,0.6)",borderRadius:12}}><div style={{fontSize:20,fontWeight:700,color:"#e2e8f0"}}>{all.length}</div><div style={{fontSize:10,color:"#64748b",marginTop:2}}>Кол-во</div></div>
        {(penaltyScore>0||penalties.dq)&&<div style={{textAlign:"center",padding:"10px 0",background:"rgba(239,68,68,0.1)",borderRadius:12}}><div style={{fontSize:20,fontWeight:700,color:"#ef4444"}}>{penalties.dq?"ДСК":"−"+penaltyScore}</div><div style={{fontSize:10,color:"#64748b",marginTop:2}}>Штрафы</div></div>}
      </div>
      <div style={{marginTop:16}}><div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:6}}><span style={{color:"#14b8a6"}}>Статика: {sC}</span><span style={{color:"#64748b"}}>Баланс</span><span style={{color:"#f59e0b"}}>Динамика: {dC}</span></div><div style={{height:6,background:"#0f172a",borderRadius:3,display:"flex",overflow:"hidden"}}>{(sC+dC)>0&&<><div style={{width:`${sC/(sC+dC)*100}%`,background:"#14b8a6",borderRadius:3,transition:"width 0.5s"}}/><div style={{width:`${dC/(sC+dC)*100}%`,background:"#f59e0b",borderRadius:3,transition:"width 0.5s"}}/></>}</div></div>
    </div>

    <div style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap"}}>{[[sOk,`Баллы ${sOk?">=":"<"} ${minS}`,minS>0],[comboOk,`Связка 3+ эл.: ${comboOk?"Да":"Нет"}`,true],[eOk,`Эл. ${lv.num} разр.: ${ownLevelCount}/${lv.minEl}+`,lv.minEl>0]].filter(x=>x[2]).map(([ok,t],i)=>(<div key={i} style={{padding:"6px 14px",borderRadius:10,fontSize:12,fontWeight:600,background:ok?"rgba(20,184,166,0.12)":"rgba(239,68,68,0.12)",color:ok?"#14b8a6":"#ef4444",border:`1px solid ${ok?"rgba(20,184,166,0.3)":"rgba(239,68,68,0.3)"}`}}>{ok?"✓":"✗"} {t}</div>))}</div>

    <button onClick={()=>setShowR(!showR)} style={{width:"100%",padding:"12px",background:"#1e293b",border:"1px solid #334155",borderRadius:12,color:"#94a3b8",fontSize:13,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><span>Нормативы: {lv.name}</span><span style={{transform:showR?"rotate(180deg)":"none",transition:"transform 0.2s"}}>&#9660;</span></button>
    {showR&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:20}}>{reqs.map(r=>(<div key={r.l} style={{padding:"12px",background:"#1e293b",borderRadius:12,border:"1px solid #334155"}}><div style={{fontSize:13,fontWeight:600,color:"#e2e8f0"}}>{r.l}</div><div style={{fontSize:20,fontWeight:700,color:"#14b8a6",marginTop:2}}>{r.v}</div></div>))}</div>}

    <button onClick={()=>setShowV(!showV)} style={{width:"100%",padding:"14px",borderRadius:12,border:`1px solid ${showV?"rgba(20,184,166,0.3)":"#334155"}`,cursor:"pointer",fontSize:14,fontWeight:600,marginBottom:16,background:showV?"linear-gradient(135deg,rgba(20,184,166,0.2),rgba(20,184,166,0.05))":"linear-gradient(135deg,#1e293b,#0f172a)",color:showV?"#14b8a6":"#94a3b8",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}><span style={{fontSize:18}}>🎙️</span>{showV?"Скрыть голосовой ввод":"Голосовой ввод связок"}</button>

    {showV&&<VoicePanel onApply={setSlots} synonyms={syn} onAddSyn={addSyn} slots={slots} onPenalty={addPenalty}/>}

    <SynPanel syn={syn} onRem={remSyn} onAdd={addSyn} onReplace={saveSyn} elements={ELS} syncStatus={synStatus}/>
    <div style={{fontSize:12,color:"#64748b",marginBottom:12,fontWeight:500}}>Связки ({slots.length})</div>
    {slots.map((slot,i)=>(<div key={i} style={{position:"relative"}}>{slots.length>1&&<button onClick={()=>removeSlot(i)} style={{position:"absolute",top:0,right:0,width:24,height:24,borderRadius:6,border:"1px solid #334155",background:"#1e293b",color:"#64748b",fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",zIndex:2}} title="Удалить связку">×</button>}<Pick label={SN[i]||("Связка "+(i+1))} color={SC[i%SC.length]} elements={ELS} selected={slot} onAdd={el=>add(i,el)} onRemove={nm=>rem(i,nm)} onMove={(from,to)=>move(i,from,to)} synonyms={syn}/></div>))}
    {slots.length<10&&<button onClick={addSlot} style={{width:"100%",padding:"12px",borderRadius:12,border:"1px dashed rgba(20,184,166,0.3)",background:"transparent",color:"#14b8a6",fontSize:13,fontWeight:600,cursor:"pointer",marginBottom:16}}>+ Добавить связку</button>}

    <div style={{marginTop:16,marginBottom:8,padding:16,background:"linear-gradient(145deg,#1e293b,#0f172a)",borderRadius:16,border:"1px solid #334155"}}>
      <div style={{fontSize:12,color:"#ef4444",marginBottom:12,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em"}}>Штрафы</div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <div><div style={{fontSize:13,color:"#e2e8f0",fontWeight:500}}>Грязное выполнение</div><div style={{fontSize:11,color:"#64748b"}}>-2 балла</div></div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <button onClick={()=>setPenalties(p=>({...p,dirty:Math.max(0,p.dirty-1)}))} style={{width:28,height:28,borderRadius:8,border:"1px solid #334155",background:"#0f172a",color:"#94a3b8",fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
          <span style={{fontSize:16,fontWeight:700,color:penalties.dirty>0?"#ef4444":"#64748b",minWidth:20,textAlign:"center"}}>{penalties.dirty}</span>
          <button onClick={()=>setPenalties(p=>({...p,dirty:p.dirty+1}))} style={{width:28,height:28,borderRadius:8,border:"1px solid #334155",background:"#0f172a",color:"#94a3b8",fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
        </div>
      </div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <div><div style={{fontSize:13,color:"#e2e8f0",fontWeight:500}}>Падение</div><div style={{fontSize:11,color:"#64748b"}}>-4 балла</div></div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <button onClick={()=>setPenalties(p=>({...p,fall:Math.max(0,p.fall-1)}))} style={{width:28,height:28,borderRadius:8,border:"1px solid #334155",background:"#0f172a",color:"#94a3b8",fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
          <span style={{fontSize:16,fontWeight:700,color:penalties.fall>0?"#ef4444":"#64748b",minWidth:20,textAlign:"center"}}>{penalties.fall}</span>
          <button onClick={()=>setPenalties(p=>({...p,fall:p.fall+1}))} style={{width:28,height:28,borderRadius:8,border:"1px solid #334155",background:"#0f172a",color:"#94a3b8",fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
        </div>
      </div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",paddingTop:10,borderTop:"1px solid #334155"}}>
        <div><div style={{fontSize:13,color:"#e2e8f0",fontWeight:500}}>Жёсткое падение</div><div style={{fontSize:11,color:"#64748b"}}>Дисквалификация</div></div>
        <button onClick={()=>setPenalties(p=>({...p,dq:!p.dq}))} style={{padding:"6px 16px",borderRadius:8,border:`1px solid ${penalties.dq?"rgba(239,68,68,0.5)":"#334155"}`,background:penalties.dq?"rgba(239,68,68,0.2)":"#0f172a",color:penalties.dq?"#ef4444":"#64748b",fontSize:13,fontWeight:600,cursor:"pointer"}}>{penalties.dq?"ДСК":"Нет"}</button>
      </div>
      {(penaltyScore>0||penalties.dq)&&<div style={{marginTop:10,padding:"8px 12px",background:"rgba(239,68,68,0.08)",borderRadius:8,border:"1px solid rgba(239,68,68,0.2)",fontSize:12,color:"#ef4444",fontWeight:600}}>
        {penalties.dq?"ДИСКВАЛИФИКАЦИЯ":"Штраф: −"+penaltyScore+" б."}
      </div>}
    </div>

    {all.length>0&&(<div style={{marginTop:24,padding:20,borderRadius:16,textAlign:"center",background:allOk?"linear-gradient(135deg,rgba(20,184,166,0.15),rgba(20,184,166,0.05))":"linear-gradient(135deg,rgba(239,68,68,0.1),rgba(239,68,68,0.03))",border:`1px solid ${allOk?"rgba(20,184,166,0.3)":"rgba(239,68,68,0.2)"}`}}><div style={{fontSize:18,fontWeight:700,color:allOk?"#14b8a6":"#f59e0b"}}>{allOk?"Уровень выполнен!":"Не хватает требований"}</div><div style={{fontSize:12,color:"#64748b",marginTop:4}}>{lv.name} — Итого: {tot.toFixed(1)} баллов</div>
      <button onClick={()=>{
        const d=new Date().toLocaleDateString("ru-RU");
        let txt="ПРОТОКОЛ WU — "+d+"\n";
        txt+="Уровень: "+lv.name+" | Пол: "+(g==="M"?"Мужчины":"Женщины")+"\n";
        txt+="═══════════════════════════\n";
        slots.forEach((s,i)=>{if(!s.length)return;txt+="\n"+(SN[i]||("Связка "+(i+1)))+":\n";s.forEach(el=>{txt+="  • "+el.name+" ("+el.cat+", "+el.score+" б.)\n";});});
        txt+="\n═══════════════════════════\n";
        txt+="Элементы: "+raw.toFixed(1)+" | Баланс: +"+b.toFixed(1)+" | ИТОГО: "+tot.toFixed(1)+"\n";
        txt+="Статика: "+sC+" | Динамика: "+dC+"\n";
        if(penaltyScore>0)txt+="Штрафы: −"+penaltyScore+" б. (грязное: "+penalties.dirty+", падение: "+penalties.fall+")\n";
        if(penalties.dq)txt+="ДИСКВАЛИФИКАЦИЯ (жёсткое падение)\n";
        txt+="Эл. "+lv.num+" разряда: "+ownLevelCount+"/"+lv.minEl+"\n";
        txt+="Результат: "+(penalties.dq?"ДИСКВАЛИФИКАЦИЯ":(allOk?"ВЫПОЛНЕН":"НЕ ВЫПОЛНЕН"))+"\n";
        if(navigator.share){navigator.share({title:"Протокол WU",text:txt}).catch(()=>{});}
        else{navigator.clipboard.writeText(txt).then(()=>alert("Скопировано!")).catch(()=>{const w=window.open();w.document.write("<pre>"+txt+"</pre>");});}
      }} style={{marginTop:12,padding:"8px 20px",borderRadius:10,border:"1px solid rgba(20,184,166,0.3)",background:"rgba(20,184,166,0.1)",color:"#14b8a6",fontSize:13,fontWeight:600,cursor:"pointer"}}>📋 Протокол</button>
    </div>)}
    <div style={{textAlign:"center",padding:"32px 0 16px",fontSize:11,color:"#334155"}}>WU Calculator v2 — Голос + Синонимы — {ELS.length} эл.</div>
  </div></div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(e=>console.log('SW:',e));}
</script>
</body>
</html>
