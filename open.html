<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>WU Открытые Соревнования</title>
<script>
/* One-shot cache/SW purge to force fresh version (v10+). Removes self after. */
(function(){
  var MARK='wu_open_purged_v10';
  if(localStorage.getItem(MARK))return;
  try{
    if(navigator.serviceWorker){navigator.serviceWorker.getRegistrations().then(function(rs){rs.forEach(function(r){r.unregister()})})}
    if(window.caches){caches.keys().then(function(ns){ns.forEach(function(n){caches.delete(n)})})}
  }catch(e){}
  localStorage.setItem(MARK,'1');
  setTimeout(function(){location.reload()},600);
})();
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#020617;font-family:system-ui,-apple-system,sans-serif;color:#e2e8f0;overflow-x:hidden;min-height:100vh}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:#0f172a}
::-webkit-scrollbar-thumb{background:#334155;border-radius:4px}
input,select,textarea,button{font-family:inherit;font-size:inherit}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.header{background:#0f172a;border-bottom:1px solid #334155;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}

.tabs{display:flex;background:#0f172a;border-bottom:1px solid #334155;position:sticky;top:49px;z-index:99;overflow-x:auto}
.tabs button{flex:1;min-width:0;padding:10px 8px;background:none;border:none;color:#94a3b8;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s}
.tabs button.active{color:#f59e0b;border-bottom-color:#f59e0b;background:#f59e0b11}
.tabs button:hover:not(.active){color:#e2e8f0}

.container{max-width:1200px;margin:0 auto;padding:16px}
.card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:16px;margin-bottom:16px;animation:fadeIn .3s ease}

.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-weight:600;font-size:14px;transition:all .2s}
.btn-primary{background:#f59e0b;color:#020617}
.btn-primary:hover{background:#d97706}
.btn-danger{background:#ef4444;color:#fff}
.btn-danger:hover{background:#dc2626}
.btn-secondary{background:#334155;color:#e2e8f0}
.btn-secondary:hover{background:#475569}
.btn-sm{padding:4px 10px;font-size:12px}

input[type="number"],input[type="text"],select,textarea{background:#0f172a;border:1px solid #334155;border-radius:8px;padding:8px 12px;color:#e2e8f0;width:100%;outline:none;transition:border-color .2s}
input:focus,select:focus,textarea:focus{border-color:#f59e0b}
textarea{resize:vertical;min-height:100px}

table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#0f172a;color:#94a3b8;font-weight:600;text-align:left;padding:8px 10px;border-bottom:1px solid #334155;white-space:nowrap}

.table-wrap{overflow-x:auto;border-radius:8px;border:1px solid #334155}

.form-row{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap;align-items:flex-end}
.form-group{display:flex;flex-direction:column;gap:4px;flex:1;min-width:120px}
.form-group label{font-size:12px;color:#94a3b8;font-weight:500}

.badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600}
.badge-fs{background:#f59e0b22;color:#f59e0b}
.badge-base{background:#14b8a622;color:#14b8a6}
.badge-female{background:#f472b622;color:#f472b6}
.badge-male{background:#60a5fa22;color:#60a5fa}

.section-title{font-size:16px;font-weight:700;color:#f59e0b;margin:20px 0 12px;padding-bottom:8px;border-bottom:1px solid #334155}
.empty{text-align:center;color:#64748b;padding:24px;font-style:italic}

.footer{text-align:center;padding:24px 16px;color:#64748b;font-size:13px;border-top:1px solid #334155;margin-top:32px}
.footer a{color:#f59e0b;text-decoration:none}

.chk{display:inline-flex;align-items:center;gap:6px;cursor:pointer;user-select:none;padding:3px 8px;border-radius:6px;font-size:12px;border:1px solid #334155;background:#0f172a;color:#94a3b8}
.chk.on{border-color:#f59e0b;color:#f59e0b;background:#f59e0b11}
.chk input{display:none}

.medal-1{color:#fbbf24}
.medal-2{color:#94a3b8}
.medal-3{color:#cd7f32}

@media(max-width:480px){
  .tabs button{font-size:11px;padding:8px 4px}
  .container{padding:10px}
  .card{padding:12px}
  .form-row{flex-direction:column}

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useMemo,useCallback}=React;

/* ========== КАТЕГОРИИ ========== */
/* Фристайл: девочки все, мальчики <10, 11-14, 15+ */
function getFreestyleCategory(sex,age){
  if(sex==="ж")return {code:"girls_all",label:"Девочки"};
  if(age<=10)return {code:"boys_u10",label:"Мальчики до 10"};
  if(age<=14)return {code:"boys_11_14",label:"Мальчики 11–14"};
  return {code:"boys_15plus",label:"Мальчики 15+"};
}

/* База/ОФП: девочки все, мальчики <10, 11-15, 15+ (троеборье) */
function getBaseCategory(sex,age){
  if(sex==="ж")return {code:"girls_all",label:"Девочки"};
  if(age<=10)return {code:"boys_u10",label:"Мальчики до 10"};
  if(age<=15)return {code:"boys_11_15",label:"Мальчики 11–15"};
  return {code:"boys_15plus_triathlon",label:"Мальчики 15+ (троеборье)"};
}

const BASE_COEF={otj:0.5,press:0.5,podt:2,br:1,vyh:3};
const EXERCISE_LABEL={otj:"Отжимания",press:"Пресс",podt:"Подтягивания",br:"Отж. брусья",vyh:"Выходы"};

/* Упражнения по категориям базы/ОФП */
const BASE_EXERCISES={
  "girls_all":["press","otj"],
  "boys_u10":["otj","press"],
  "boys_11_15":["podt","otj"],
  "boys_15plus_triathlon":["vyh","br","podt"]
};

const FREESTYLE_CAT_ORDER=["girls_all","boys_u10","boys_11_14","boys_15plus"];
const BASE_CAT_ORDER=["girls_all","boys_u10","boys_11_15","boys_15plus_triathlon"];

/* ========== LS HELPERS ========== */
function loadLS(key,def){try{const v=localStorage.getItem(key);return v?JSON.parse(v):def;}catch{return def;}}
function saveLS(key,val){localStorage.setItem(key,JSON.stringify(val));}

/* ========== APP ========== */
function App(){
  const [tab,setTab]=useState("athletes");
  const [athletes,setAthletes]=useState(()=>loadLS("open_athletes",[]));
  const [fsResults,setFsResults]=useState(()=>loadLS("open_freestyle_results",[]));
  const [baseResults,setBaseResults]=useState(()=>loadLS("open_base_results",[]));
  const [toast,setToast]=useState("");

  useEffect(()=>saveLS("open_athletes",athletes),[athletes]);
  useEffect(()=>saveLS("open_freestyle_results",fsResults),[fsResults]);
  useEffect(()=>saveLS("open_base_results",baseResults),[baseResults]);

  /* Refresh fsResults when returning from open_calc.html */
  useEffect(()=>{
    const onFocus=()=>{
      setFsResults(loadLS("open_freestyle_results",[]));
      setAthletes(loadLS("open_athletes",[]));
    };
    window.addEventListener("focus",onFocus);
    return()=>window.removeEventListener("focus",onFocus);
  },[]);

  const showToast=useCallback((m)=>{setToast(m);setTimeout(()=>setToast(""),2500);},[]);

  const tabs=[
    {id:"athletes",label:"Участники"},
    {id:"judge_base",label:"Судейство база"},
    {id:"protocol",label:"Протокол"},
    {id:"winners",label:"Призёры"}
  ];

  return <>
    <div className="header">
      <h1>⚡ Открытые соревнования</h1>
      <a href="open_calc.html" target="_blank">Калькулятор фристайла →</a>
    </div>
    <div className="tabs">{tabs.map(t=>(<button key={t.id} className={tab===t.id?"active":""} onClick={()=>setTab(t.id)}>{t.label}</button>))}</div>

    <div className="container">
      {tab==="athletes"&&<AthletesTab athletes={athletes} setAthletes={setAthletes} showToast={showToast}/>}
      {tab==="judge_base"&&<JudgeBaseTab athletes={athletes} baseResults={baseResults} setBaseResults={setBaseResults} showToast={showToast}/>}
      {tab==="protocol"&&<ProtocolTab athletes={athletes} fsResults={fsResults} setFsResults={setFsResults} baseResults={baseResults} setBaseResults={setBaseResults}/>}
      {tab==="winners"&&<WinnersTab athletes={athletes} fsResults={fsResults} baseResults={baseResults}/>}
    </div>

    <div className="footer">WU Open v1 · <a href="competition.html">Разрядный протокол</a></div>
    {toast&&<div className="toast">{toast}</div>}
  </>;
}

/* ========== ТАБ 1: УЧАСТНИКИ ========== */
function AthletesTab({athletes,setAthletes,showToast}){
  const [form,setForm]=useState({name:"",sex:"м",age:10,group:""});
  const [csvText,setCsvText]=useState("");
  const [showCsv,setShowCsv]=useState(false);
  const [showServer,setShowServer]=useState(false);
  const [serverDate,setServerDate]=useState("2026-04-18");
  const [serverLoading,setServerLoading]=useState(false);
  const [serverPreview,setServerPreview]=useState(null);

  function addAthlete(){
    if(!form.name.trim()){showToast("Укажи ФИО");return;}
    const a={id:"open_"+Date.now()+"_"+Math.floor(Math.random()*1000),name:form.name.trim(),sex:form.sex,age:parseInt(form.age)||0,group:form.group.trim()||"—",present:true,freestyle:false,base:false};
    setAthletes([...athletes,a]);
    setForm({name:"",sex:"м",age:10,group:""});
    showToast("Добавлен: "+a.name);
  }

  function updateAthlete(id,patch){
    setAthletes(athletes.map(a=>a.id===id?{...a,...patch}:a));
  }

  function removeAthlete(id){
    if(!confirm("Удалить участника?"))return;
    setAthletes(athletes.filter(a=>a.id!==id));
  }

  function importCsv(){
    /* Формат: ФИО;пол(м/ж);возраст;группа */
    const lines=csvText.split(/\r?\n/).filter(l=>l.trim());
    const parsed=[];
    for(const l of lines){
      const p=l.split(/[;,\t]/).map(s=>s.trim());
      if(p.length<3)continue;
      const [name,sexRaw,ageRaw,groupRaw]=p;
      const sex=sexRaw.toLowerCase().startsWith("ж")||sexRaw.toLowerCase().startsWith("f")?"ж":"м";
      const age=parseInt(ageRaw)||0;
      if(!name||!age)continue;
      parsed.push({id:"open_"+Date.now()+"_"+parsed.length+"_"+Math.floor(Math.random()*1000),name,sex,age,group:groupRaw||"—",present:true,freestyle:false,base:false});
    }
    if(parsed.length===0){showToast("Ничего не распарсено");return;}
    setAthletes([...athletes,...parsed]);
    setCsvText("");
    setShowCsv(false);
    showToast("Добавлено: "+parsed.length);
  }

  async function loadFromServer(){
    setServerLoading(true);
    try{
      const API_BASE="https://api.workoutudm.ru/api/competition";
      const API_KEY="SggpROWNGUNVTdWFYXmNmBZGzyoJp91E-7c5bEz8zdE";
      const res=await fetch(`${API_BASE}/athletes?date=${encodeURIComponent(serverDate)}`,{headers:{"X-API-Key":API_KEY}});
      if(!res.ok){const txt=await res.text();throw new Error(`${res.status}: ${txt.slice(0,200)}`);}
      const data=await res.json();
      const count=data.count||0;
      if(count===0){showToast(`На дату ${serverDate} записей нет`);setServerLoading(false);return;}
      setServerPreview(data);
    }catch(e){showToast("Ошибка: "+e.message);}
    setServerLoading(false);
  }

  function applyServerData(mode){
    if(!serverPreview)return;
    const incoming=(serverPreview.athletes||[]).map(a=>({
      id:String(a.id),
      name:a.name,
      sex:(a.sex||"м").toLowerCase().startsWith("ж")?"ж":"м",
      age:parseInt(a.age)||0,
      group:a.group||"—",
      present:true,
      freestyle:false,
      base:false
    }));
    if(mode==="replace"){
      setAthletes(incoming);
    }else{
      const map=new Map(athletes.map(a=>[String(a.id),a]));
      for(const a of incoming){
        if(map.has(a.id)){
          const old=map.get(a.id);
          map.set(a.id,{...old,name:a.name,sex:a.sex,age:a.age||old.age,group:a.group||old.group});
        }else{map.set(a.id,a);}
      }
      setAthletes(Array.from(map.values()));
    }
    showToast(`Загружено ${incoming.length} участников с сервера`);
    setServerPreview(null);
    setShowServer(false);
  }

  function clearAll(){
    if(!confirm("Удалить ВСЕХ участников и их результаты?"))return;
    setAthletes([]);
    localStorage.removeItem("open_freestyle_results");
    localStorage.removeItem("open_base_results");
    showToast("Очищено");
    setTimeout(()=>location.reload(),500);
  }

  const presentCount=athletes.filter(a=>a.present!==false).length;
  const totalCount=athletes.length;
  const fsCount=athletes.filter(a=>a.present!==false&&a.freestyle===true).length;
  const baseCount=athletes.filter(a=>a.present!==false&&a.base===true).length;

  return <div>
    <div style={{fontSize:12,color:"#94a3b8",padding:"6px 2px",borderBottom:"1px solid #334155",marginBottom:12}}>Участники: {presentCount}/{totalCount} · ФС: {fsCount} · ОП: {baseCount}</div>
    <div className="card">
      <h3 style={{color:"#f59e0b",marginBottom:12}}>Добавить участника</h3>
      <div className="form-row">
        <div className="form-group" style={{flex:2}}><label>ФИО</label><input type="text" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Иванов Иван Иванович"/></div>
        <div className="form-group"><label>Пол</label><select value={form.sex} onChange={e=>setForm({...form,sex:e.target.value})}><option value="м">М</option><option value="ж">Ж</option></select></div>
        <div className="form-group"><label>Возраст</label><input type="number" value={form.age} onChange={e=>setForm({...form,age:e.target.value})} min="5" max="60"/></div>
        <div className="form-group"><label>Группа</label><input type="text" value={form.group} onChange={e=>setForm({...form,group:e.target.value})} placeholder="—"/></div>
        <button className="btn btn-primary" onClick={addAthlete}>+ Добавить</button>
      </div>
      <div style={{marginTop:8,display:"flex",gap:8,flexWrap:"wrap"}}>
        <button className="btn btn-secondary btn-sm" onClick={()=>setShowCsv(!showCsv)}>{showCsv?"Скрыть":"Импорт CSV"}</button>
        <button className="btn btn-primary btn-sm" onClick={()=>setShowServer(!showServer)}>{showServer?"Скрыть":"Загрузить с сервера"}</button>
      </div>
      {showCsv&&<div style={{marginTop:12}}>
        <div style={{fontSize:12,color:"#94a3b8",marginBottom:6}}>Формат: <code>ФИО;пол(м/ж);возраст;группа</code> — по одной записи в строке</div>
        <textarea value={csvText} onChange={e=>setCsvText(e.target.value)} placeholder="Иванов Иван;м;12;А-1&#10;Петрова Мария;ж;14;Б-2"/>
        <button className="btn btn-primary btn-sm" style={{marginTop:8}} onClick={importCsv}>Импортировать</button>
      </div>}
      {showServer&&<div style={{marginTop:12,padding:12,background:"#0f172a",borderRadius:8,border:"1px solid #334155"}}>
        <div style={{fontSize:12,color:"#94a3b8",marginBottom:6}}>Автосборка спортсменов из МойКласс на выбранную дату</div>
        <div className="form-row" style={{alignItems:"flex-end"}}>
          <div className="form-group" style={{flex:1}}>
            <label>Дата</label>
            <input type="date" value={serverDate} onChange={e=>setServerDate(e.target.value)}/>
          </div>
          <button className="btn btn-primary btn-sm" onClick={loadFromServer} disabled={serverLoading}>{serverLoading?"Загрузка…":"OK"}</button>
        </div>
      </div>}
    </div>

    {serverPreview&&<div onClick={()=>setServerPreview(null)} style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(2,6,23,0.85)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#1e293b",borderRadius:12,padding:20,maxWidth:520,width:"100%",maxHeight:"90vh",overflowY:"auto",border:"1px solid #334155"}}>
        <h3 style={{color:"#f59e0b",marginBottom:12}}>Загрузка с сервера</h3>
        <p style={{marginBottom:8}}>Найдено <strong>{serverPreview.count}</strong> на <strong>{serverPreview.date}</strong></p>
        <div style={{maxHeight:240,overflowY:"auto",border:"1px solid #334155",borderRadius:8,marginBottom:12}}>
          <table><thead><tr><th>ФИО</th><th>Пол</th><th>Возр</th><th>Группа</th></tr></thead>
          <tbody>{serverPreview.athletes.map((a,i)=><tr key={i}><td>{a.name}</td><td>{(a.sex||"").toLowerCase().startsWith("ж")?"Ж":"М"}</td><td>{a.age}</td><td>{a.group}</td></tr>)}</tbody></table>
        </div>
        <p style={{fontSize:12,color:"#94a3b8",marginBottom:12}}>Текущий список: <strong>{athletes.length}</strong> чел. «Заменить» — удалит текущих. «Объединить» — обновит по ID, новых добавит.</p>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <button className="btn btn-primary btn-sm" onClick={()=>{if(athletes.length>0&&!confirm(`Заменить текущий список (${athletes.length} чел.) на новый (${serverPreview.count})?`))return;applyServerData("replace");}}>Заменить ({serverPreview.count})</button>
          <button className="btn btn-secondary btn-sm" onClick={()=>applyServerData("merge")}>Объединить</button>
          <button className="btn btn-secondary btn-sm" onClick={()=>setServerPreview(null)}>Отмена</button>
        </div>
      </div>
    </div>}

    <div className="card">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <h3 style={{color:"#f59e0b"}}>Список ({presentCount}/{athletes.length})</h3>
        {athletes.length>0&&<button className="btn btn-danger btn-sm" onClick={clearAll}>Очистить всё</button>}
      </div>
      {athletes.length===0?<div className="empty">Нет участников. Добавь вручную или импортируй CSV.</div>:
      <div className="table-wrap"><table>
        <thead><tr><th>ФИО</th><th>Пол</th><th>Возраст</th><th>Группа</th><th>ФС</th><th>База</th><th>Категория (ФС / база)</th><th>Явка</th><th></th></tr></thead>
        <tbody>
          {athletes.map(a=>{const fc=getFreestyleCategory(a.sex,a.age);const bc=getBaseCategory(a.sex,a.age);return <tr key={a.id} style={a.present===false?{opacity:0.5}:{}}>
            <td>{a.name}</td>
            <td><span className={"badge "+(a.sex==="ж"?"badge-female":"badge-male")}>{a.sex==="ж"?"Ж":"М"}</span></td>
            <td><input type="number" value={a.age} onChange={e=>updateAthlete(a.id,{age:parseInt(e.target.value)||0})} style={{width:60}}/></td>
            <td><input type="text" value={a.group} onChange={e=>updateAthlete(a.id,{group:e.target.value})} style={{width:80}}/></td>
            <td><label className={"chk "+(a.freestyle?"on":"")}><input type="checkbox" checked={a.freestyle!==false} onChange={e=>updateAthlete(a.id,{freestyle:e.target.checked})}/>ФС</label></td>
            <td><label className={"chk "+(a.base?"on":"")}><input type="checkbox" checked={a.base!==false} onChange={e=>updateAthlete(a.id,{base:e.target.checked})}/>База</label></td>
            <td style={{fontSize:11,color:"#94a3b8"}}>{fc.label} / {bc.label}</td>
            <td><button className={"chk "+(a.present!==false?"on":"")} onClick={()=>updateAthlete(a.id,{present:!(a.present!==false)})}>{a.present!==false?"✓":"✗"}</button></td>
            <td><button className="btn btn-danger btn-sm" onClick={()=>removeAthlete(a.id)}>×</button></td>
          </tr>})}
        </tbody>
      </table></div>}
    </div>
  </div>;
}

/* ========== ТАБ 2: СУДЕЙСТВО БАЗА ========== */
function JudgeBaseTab({athletes,baseResults,setBaseResults,showToast}){
  const [selId,setSelId]=useState("");
  const available=athletes.filter(a=>a.base!==false&&a.present!==false);
  const selected=available.find(a=>a.id===selId);
  const [reps,setReps]=useState({});

  useEffect(()=>{
    /* Подхватить существующий результат */
    if(selected){
      const existing=baseResults.find(r=>r.id===selId);
      if(existing&&existing.exercises)setReps(existing.exercises);
      else setReps({});
    }
  },[selId]);

  if(!selected){
    return <div className="card">
      <h3 style={{color:"#f59e0b",marginBottom:12}}>Выбор участника (база/ОФП)</h3>
      {available.length===0?<div className="empty">Нет явившихся участников базы. Проверь вкладку «Участники».</div>:
      <select value={selId} onChange={e=>setSelId(e.target.value)}>
        <option value="">— Выбери участника —</option>
        {available.map(a=><option key={a.id} value={a.id}>{a.name} ({a.sex==="ж"?"Ж":"М"}, {a.age} лет)</option>)}
      </select>}
    </div>;
  }

  const cat=getBaseCategory(selected.sex,selected.age);
  const exercises=BASE_EXERCISES[cat.code];
  const total=exercises.reduce((s,ex)=>s+((reps[ex]||0)*BASE_COEF[ex]),0);

  function updateRep(ex,val){
    const n=parseInt(val)||0;
    setReps({...reps,[ex]:n});
  }

  function saveResult(){
    const entry={
      id:selected.id,name:selected.name,sex:selected.sex,age:selected.age,group:selected.group,
      category:cat.code,categoryLabel:cat.label,
      exercises:{...reps},
      total:Math.round(total*10)/10,
      present:selected.present!==false,
      judgedAt:new Date().toISOString()
    };
    const idx=baseResults.findIndex(r=>r.id===selected.id);
    const next=[...baseResults];
    if(idx>=0)next[idx]=entry;else next.push(entry);
    setBaseResults(next);
    showToast("Сохранено: "+selected.name+" — "+entry.total+" б.");
    setSelId("");
    setReps({});
  }

  return <div>
    <div className="card">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
        <div>
          <h3 style={{color:"#f59e0b"}}>{selected.name}</h3>
          <div style={{fontSize:12,color:"#94a3b8",marginTop:2}}>{selected.sex==="ж"?"Ж":"М"} · {selected.age} лет · {cat.label}</div>
        </div>
        <button className="btn btn-secondary btn-sm" onClick={()=>setSelId("")}>Назад</button>
      </div>

      <div style={{marginBottom:12}}>
        {exercises.map(ex=>(<div key={ex} className="form-row" style={{marginBottom:10,padding:10,background:"#0f172a",borderRadius:8}}>
          <div style={{flex:1}}>
            <div style={{fontSize:14,fontWeight:600}}>{EXERCISE_LABEL[ex]}</div>
            <div style={{fontSize:11,color:"#64748b"}}>коэф. {BASE_COEF[ex]}</div>
          </div>
          <input type="number" value={reps[ex]||0} onChange={e=>updateRep(ex,e.target.value)} style={{width:80,flex:"none"}} min="0"/>
          <div style={{width:80,flex:"none",textAlign:"right",fontWeight:700,color:"#f59e0b"}}>
            {((reps[ex]||0)*BASE_COEF[ex]).toFixed(1)} б.
          </div>
        </div>))}
      </div>

      <div style={{padding:16,background:"linear-gradient(135deg,rgba(245,158,11,0.15),rgba(245,158,11,0.05))",borderRadius:12,textAlign:"center",marginBottom:12}}>
        <div style={{fontSize:12,color:"#94a3b8",marginBottom:4}}>ИТОГО</div>
        <div style={{fontSize:32,fontWeight:800,color:"#f59e0b"}}>{total.toFixed(1)} б.</div>
      </div>

      <button className="btn btn-primary" style={{width:"100%"}} onClick={saveResult}>Сохранить в протокол</button>
    </div>
  </div>;
}

/* ========== ТАБ 3: ПРОТОКОЛ ========== */
function ProtocolTab({athletes,fsResults,setFsResults,baseResults,setBaseResults}){
  const [logResult,setLogResult]=useState(null);
  const absentIds=new Set(athletes.filter(a=>a.present===false).map(a=>a.id));

  const fsGrouped=useMemo(()=>{
    const groups={};
    for(const code of FREESTYLE_CAT_ORDER)groups[code]={label:null,items:[]};
    for(const r of fsResults){
      if(absentIds.has(r.id))continue;
      const c=getFreestyleCategory(r.sex,r.age);
      if(!groups[c.code])groups[c.code]={label:c.label,items:[]};
      groups[c.code].label=c.label;
      groups[c.code].items.push(r);
    }
    Object.values(groups).forEach(g=>g.items.sort((a,b)=>b.total-a.total));
    return groups;
  },[fsResults,athletes]);

  const baseGrouped=useMemo(()=>{
    const groups={};
    for(const code of BASE_CAT_ORDER)groups[code]={label:null,items:[]};
    for(const r of baseResults){
      if(absentIds.has(r.id))continue;
      const c=getBaseCategory(r.sex,r.age);
      if(!groups[c.code])groups[c.code]={label:c.label,items:[]};
      groups[c.code].label=c.label;
      groups[c.code].items.push(r);
    }
    Object.values(groups).forEach(g=>g.items.sort((a,b)=>b.total-a.total));
    return groups;
  },[baseResults,athletes]);

  function removeFs(id){
    if(!confirm("Удалить результат фристайла?"))return;
    setFsResults(fsResults.filter(r=>r.id!==id));
  }
  function removeBase(id){
    if(!confirm("Удалить результат базы?"))return;
    setBaseResults(baseResults.filter(r=>r.id!==id));
  }

  return <div>
    <div className="section-title">ФРИСТАЙЛ</div>
    {FREESTYLE_CAT_ORDER.map(code=>{const g=fsGrouped[code];if(!g||g.items.length===0)return null;return <div key={code} className="card">
      <h4 style={{color:"#f59e0b",marginBottom:10}}>{g.label} ({g.items.length})</h4>
      <div className="table-wrap"><table>
        <thead><tr><th>#</th><th>ФИО</th><th>Гр</th><th>Возр.</th><th>Комбо</th><th>Креатив</th><th>Балл</th><th>Штрафы</th><th></th><th></th></tr></thead>
        <tbody>{g.items.map((r,i)=>(<tr key={r.id}>
          <td style={{fontWeight:700,color:i===0?"#fbbf24":i===1?"#94a3b8":i===2?"#cd7f32":"#64748b"}}>{i+1}</td>
          <td>{r.name}</td><td>{r.group}</td><td>{r.age}</td>
          <td>{r.combo ?? 0}</td>
          <td>{r.creativity ?? 0}</td>
          <td style={{fontWeight:700,color:"#f59e0b"}}>{r.total ?? ((r.raw||0)+(r.balance||0)-(r.penalties||0)+(r.combo||0)+(r.creativity||0))}</td>
          <td style={{color:"#ef4444"}}>{r.penalties>0?`-${r.penalties}`:""}{r.dsk?" ДСК":""}</td>
          <td>{r.log?<button className="btn btn-sm btn-secondary" onClick={()=>setLogResult(r)} title="Разбор">🔍</button>:<span style={{color:"#334155"}}>—</span>}</td>
          <td><button className="btn btn-danger btn-sm" onClick={()=>removeFs(r.id)}>×</button></td>
        </tr>))}</tbody>
      </table></div>
    </div>;})}
    {Object.values(fsGrouped).every(g=>g.items.length===0)&&<div className="card"><div className="empty">Нет результатов фристайла. Вбивай через <a href="open_calc.html" target="_blank" style={{color:"#f59e0b"}}>калькулятор</a>.</div></div>}

    <div className="section-title">БАЗА / ОФП</div>
    {BASE_CAT_ORDER.map(code=>{const g=baseGrouped[code];if(!g||g.items.length===0)return null;const exercises=BASE_EXERCISES[code]||[];return <div key={code} className="card">
      <h4 style={{color:"#14b8a6",marginBottom:10}}>{g.label} ({g.items.length})</h4>
      <div className="table-wrap"><table>
        <thead><tr><th>#</th><th>ФИО</th><th>Гр</th><th>Возр.</th>{exercises.map(ex=>(<th key={ex}>{EXERCISE_LABEL[ex]}</th>))}<th>Балл</th><th></th></tr></thead>
        <tbody>{g.items.map((r,i)=>(<tr key={r.id}>
          <td style={{fontWeight:700,color:i===0?"#fbbf24":i===1?"#94a3b8":i===2?"#cd7f32":"#64748b"}}>{i+1}</td>
          <td>{r.name}</td><td>{r.group}</td><td>{r.age}</td>
          {exercises.map(ex=>(<td key={ex}>{r.exercises?.[ex]||0} <span style={{color:"#64748b",fontSize:10}}>(×{BASE_COEF[ex]})</span></td>))}
          <td style={{fontWeight:700,color:"#14b8a6"}}>{r.total}</td>
          <td><button className="btn btn-danger btn-sm" onClick={()=>removeBase(r.id)}>×</button></td>
        </tr>))}</tbody>
      </table></div>
    </div>;})}
    {Object.values(baseGrouped).every(g=>g.items.length===0)&&<div className="card"><div className="empty">Нет результатов базы. Используй вкладку «Судейство база».</div></div>}

    {logResult&&<PerformanceLogModal result={logResult} onClose={()=>setLogResult(null)}/>}
  </div>;
}

/* ========== ТАБ 4: ПРИЗЁРЫ ========== */
function WinnersTab({athletes,fsResults,baseResults}){
  const absentIds=new Set(athletes.filter(a=>a.present===false).map(a=>a.id));

  function groupAndTop(results,orderArr,catFn){
    const groups={};
    for(const code of orderArr)groups[code]={label:null,top:[]};
    for(const r of results){
      if(absentIds.has(r.id))continue;
      if(r.dsk)continue; /* ДСК не в призы */
      const c=catFn(r.sex,r.age);
      if(!groups[c.code])groups[c.code]={label:c.label,top:[]};
      groups[c.code].label=c.label;
      groups[c.code].top.push(r);
    }
    Object.values(groups).forEach(g=>{g.top.sort((a,b)=>b.total-a.total);g.top=g.top.slice(0,3);});
    return groups;
  }

  const fsWinners=useMemo(()=>groupAndTop(fsResults,FREESTYLE_CAT_ORDER,getFreestyleCategory),[fsResults,athletes]);
  const baseWinners=useMemo(()=>groupAndTop(baseResults,BASE_CAT_ORDER,getBaseCategory),[baseResults,athletes]);

  function renderGroup(g,color){
    if(!g||g.top.length===0)return null;
    return <div className="card" key={g.label}>
      <h4 style={{color,marginBottom:10}}>{g.label}</h4>
      <table>
        <thead><tr><th>Место</th><th>ФИО</th><th>Гр</th><th>Возр.</th><th>Балл</th></tr></thead>
        <tbody>{g.top.map((r,i)=><tr key={r.id}>
          <td className={"medal-"+(i+1)} style={{fontSize:18,fontWeight:800}}>{i===0?"🥇":i===1?"🥈":"🥉"}</td>
          <td>{r.name}</td><td>{r.group}</td><td>{r.age}</td>
          <td style={{fontWeight:700,color}}>{r.total}</td>
        </tr>)}</tbody>
      </table>
    </div>;
  }

  return <div>
    <div className="section-title">ПРИЗЁРЫ ФРИСТАЙЛ</div>
    {FREESTYLE_CAT_ORDER.map(code=>renderGroup(fsWinners[code],"#f59e0b"))}
    {Object.values(fsWinners).every(g=>g.top.length===0)&&<div className="card"><div className="empty">Нет призёров фристайла</div></div>}

    <div className="section-title">ПРИЗЁРЫ БАЗА / ОФП</div>
    {BASE_CAT_ORDER.map(code=>renderGroup(baseWinners[code],"#14b8a6"))}
    {Object.values(baseWinners).every(g=>g.top.length===0)&&<div className="card"><div className="empty">Нет призёров базы</div></div>}
  </div>;
}

/* ========== МОДАЛКА ЛОГА ВЫСТУПЛЕНИЯ ========== */
function PerformanceLogModal({result,onClose}){
  const log=result.log;
  if(!log)return null;
  return <div onClick={onClose} style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(2,6,23,0.85)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
    <div onClick={e=>e.stopPropagation()} style={{background:"linear-gradient(145deg,#1e293b,#0f172a)",borderRadius:16,padding:20,maxWidth:560,width:"100%",maxHeight:"90vh",overflowY:"auto",border:"1px solid #334155",color:"#e2e8f0",fontSize:13}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
        <div>
          <div style={{fontSize:16,fontWeight:700}}>{result.name}</div>
          <div style={{fontSize:12,color:"#94a3b8",marginTop:2}}>{result.group} · {result.sex==="ж"?"Ж":"М"} · {result.age} лет · <b style={{color:"#f59e0b"}}>{log.total}</b> б.</div>
        </div>
        <button onClick={onClose} className="btn btn-secondary btn-sm">×</button>
      </div>

      {log.dsk&&<div style={{padding:"10px 12px",background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:10,color:"#ef4444",fontWeight:600,marginBottom:12}}>ДИСКВАЛИФИКАЦИЯ</div>}

      {log.slots.map((slot,si)=>slot.length>0?<div key={si} style={{marginBottom:12,padding:12,background:"#0f172a",border:"1px solid #334155",borderRadius:10}}>
        <div style={{fontSize:11,color:"#f59e0b",fontWeight:700,marginBottom:8,textTransform:"uppercase"}}>Связка {si+1}</div>
        {slot.map((el,ei)=>{
          const penalty=log.penaltyEvents.find(p=>p.slotIdx===si&&p.elementIdx===ei);
          return <div key={ei} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"6px 8px",marginBottom:4,background:el.credited!==false?"rgba(20,184,166,0.06)":"rgba(100,116,139,0.06)",borderLeft:`3px solid ${el.credited!==false?"#14b8a6":"#475569"}`,borderRadius:6}}>
            <div style={{display:"flex",alignItems:"center",gap:8,flex:1}}>
              <span style={{color:"#64748b",fontSize:11,minWidth:18}}>{ei+1}.</span>
              <span>{el.name}</span>
              <span style={{color:el.cat==="Статика"?"#14b8a6":"#f59e0b",fontSize:11}}>({el.cat==="Статика"?"Стат":"Дин"} {el.score}б)</span>
            </div>
            {penalty&&<span style={{fontSize:11,color:"#ef4444",fontWeight:600,whiteSpace:"nowrap"}}>
              {penalty.type==="dirty"?"грязь −2":"падение −4"}{penalty.note?" ("+penalty.note+")":""}
            </span>}
          </div>;
        })}
      </div>:null)}

      {log.penaltyEvents.filter(p=>p.slotIdx===null).length>0&&<div style={{marginBottom:12,padding:12,background:"rgba(239,68,68,0.06)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:10}}>
        <div style={{fontSize:11,color:"#ef4444",fontWeight:700,marginBottom:6,textTransform:"uppercase"}}>Штрафы без привязки</div>
        {log.penaltyEvents.filter(p=>p.slotIdx===null).map((p,i)=><div key={i} style={{fontSize:12,marginBottom:2}}>• {p.type==="dirty"?"Грязь −2":"Падение −4"}{p.note?" ("+p.note+")":""}</div>)}
      </div>}

      <div style={{padding:12,background:"#0f172a",border:"1px solid #334155",borderRadius:10,fontSize:12}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{color:"#94a3b8"}}>Элементы</span><span style={{fontWeight:600}}>{log.raw}</span></div>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{color:"#94a3b8"}}>Баланс</span><span style={{color:"#14b8a6",fontWeight:600}}>+{log.balance}</span></div>
        {log.totalPenalty>0&&<div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{color:"#94a3b8"}}>Штрафы</span><span style={{color:"#ef4444",fontWeight:600}}>−{log.totalPenalty}</span></div>}
        <div style={{display:"flex",justifyContent:"space-between",borderTop:"1px solid #334155",paddingTop:6,marginTop:6,fontWeight:700}}><span>ИТОГО</span><span style={{color:log.dsk?"#ef4444":"#f59e0b"}}>{log.total}</span></div>
      </div>

      {log.judgedAt&&<div style={{marginTop:10,fontSize:10,color:"#475569",textAlign:"center"}}>Судейство: {new Date(log.judgedAt).toLocaleString("ru-RU")}</div>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(e=>console.log('SW:',e));}
</script>
</body>
