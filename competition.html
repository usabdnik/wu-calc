*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#020617;font-family:system-ui,-apple-system,sans-serif;color:#e2e8f0;overflow-x:hidden;min-height:100vh}
::-webkit-scrollbar{width:4px}

input,select,textarea,button{font-family:inherit;font-size:inherit}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.header{background:#0f172a;border-bottom:1px solid #334155;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header h1{font-size:18px;font-weight:700;color:#14b8a6}
.header a{color:#94a3b8;text-decoration:none;font-size:14px}
.header a:hover{color:#14b8a6}

.tabs{display:flex;background:#0f172a;border-bottom:1px solid #334155;position:sticky;top:49px;z-index:99;overflow-x:auto}
.tabs button{flex:1;min-width:0;padding:10px 8px;background:none;border:none;color:#94a3b8;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s}
.tabs button.active{color:#14b8a6;border-bottom-color:#14b8a6;background:#14b8a611}
.tabs button:hover:not(.active){color:#e2e8f0}

.container{max-width:1200px;margin:0 auto;padding:16px}
.card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:16px;margin-bottom:16px;animation:fadeIn .3s ease}

.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-weight:600;font-size:14px;transition:all .2s}
.btn-primary{background:#14b8a6;color:#020617}
.btn-primary:hover{background:#0d9488}
.btn-danger{background:#ef4444;color:#fff}
.btn-danger:hover{background:#dc2626}
.btn-secondary{background:#334155;color:#e2e8f0}
.btn-secondary:hover{background:#475569}
.btn-success{background:#22c55e;color:#020617}
.btn-success:hover{background:#16a34a}
.btn-sm{padding:4px 10px;font-size:12px}

input[type="number"],input[type="text"],select,textarea{background:#0f172a;border:1px solid #334155;border-radius:8px;padding:8px 12px;color:#e2e8f0;width:100%;outline:none;transition:border-color .2s}
input:focus,select:focus,textarea:focus{border-color:#14b8a6}
textarea{resize:vertical;min-height:100px}

table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#0f172a;color:#94a3b8;font-weight:600;text-align:left;padding:8px 10px;border-bottom:1px solid #334155;position:sticky;top:0;white-space:nowrap}
td{padding:6px 10px;border-bottom:1px solid #334155}
tr:hover{background:#ffffff08}
.table-wrap{overflow-x:auto;border-radius:8px;border:1px solid #334155}

.form-row{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap;align-items:flex-end}
.form-group{display:flex;flex-direction:column;gap:4px;flex:1;min-width:120px}
.form-group label{font-size:12px;color:#94a3b8;font-weight:500}

.badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600}
.badge-pass{background:#22c55e22;color:#22c55e}
.badge-fail{background:#ef444422;color:#ef4444}
.badge-female{background:#f472b622;color:#f472b6}
.badge-male{background:#60a5fa22;color:#60a5fa}

.score-big{font-size:32px;font-weight:800;color:#f59e0b;text-align:center;margin:12px 0}
.result-pass{color:#22c55e;font-weight:700}
.result-fail{color:#ef4444;font-weight:700}
.row-pass{background:#22c55e0a}
.row-fail{background:#ef44440a}

.penalty-ctrl{display:flex;align-items:center;gap:8px}
.penalty-ctrl button{width:28px;height:28px;border-radius:6px;border:none;background:#334155;color:#e2e8f0;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.penalty-ctrl button:hover{background:#475569}
.penalty-ctrl span{min-width:20px;text-align:center;font-weight:600}

.norm-ok{color:#22c55e;font-weight:600}
.norm-fail{color:#ef4444;font-weight:600}

.section-title{font-size:16px;font-weight:700;color:#14b8a6;margin:20px 0 12px;padding-bottom:8px;border-bottom:1px solid #334155}
.empty{text-align:center;color:#64748b;padding:24px;font-style:italic}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#22c55e;color:#020617;padding:10px 24px;border-radius:10px;font-weight:600;z-index:200;animation:fadeIn .3s ease}

.age-cat-row input{width:80px;flex:none}
.age-cat-row .cat-name{width:100px}

.footer{text-align:center;padding:24px 16px;color:#64748b;font-size:13px;border-top:1px solid #334155;margin-top:32px}
.footer a{color:#14b8a6;text-decoration:none}

.confirm-box{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:24px;max-width:400px;width:90%;text-align:center}
.confirm-box p{margin-bottom:16px;font-size:15px}

@media(max-width:480px){

/* ========== HELPERS ========== */
function loadLS(key,def){try{const v=localStorage.getItem(key);return v?JSON.parse(v):def}catch{return def}}
function saveLS(key,val){localStorage.setItem(key,JSON.stringify(val))}
function saveLSTracked(key,val,syncMgr){
  saveLS(key,val);
  if(!syncMgr)return;
  const typeMap={'comp_athletes':'athletes','comp_freestyle_results':'freestyle_results','comp_base_results':'base_results','comp_age_categories_freestyle':'age_categories_freestyle','comp_age_categories_base':'age_categories_base'};
  const recordType=typeMap[key];
  if(!recordType)return;
  for(const item of val){
    const recordKey=syncMgr._getRecordKey(item,recordType);
    syncMgr.updateTimestamp(recordType,recordKey);
  }
}
function findLevel(name){return LEVELS.find(l=>l.name===name)}
function findBaseLevel(name){return BASE_LEVELS.find(l=>l.name===name)}
function getDirForLevel(level){if(!level)return"freestyle";if(level.startsWith("BASE"))return"base";if(level==="SPIRIT 1 Biginner"||level==="SPIRIT 1 Diligent")return"base";return"freestyle"}

/* ========== TOAST ========== */
function Toast({msg,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,2000);return()=>clearTimeout(t)},[onDone]);

}

/* ========== CONFIRM DIALOG ========== */
function ConfirmDialog({msg,onYes,onNo}){

}

      if(!res.ok){const txt=await res.text();throw new Error(`${res.status}: ${txt.slice(0,200)}`);}
      const data=await res.json();
      if(data.count===0){setServerLoading(false);alert('На сегодня нет записей на контрольные тренировки');return;}
      setServerPreview(data);
    }catch(e){console.error(e);alert(`Ошибка загрузки: ${e.message}`);}
    setServerLoading(false);
  }

  function confirmServerLoad(){
    if(!serverPreview)return;
    const incoming=serverPreview.athletes.map(a=>({id:String(a.id),name:a.name,group:a.group,sex:a.sex,age:a.age,level:a.level,dir:a.direction,present:true}));
    setAthletes(prev=>{
      const existing=new Map(prev.map(a=>[a.id,a]));
      for(const a of incoming){
        if(existing.has(a.id)){
          const old=existing.get(a.id);
          existing.set(a.id,{...old,name:a.name,group:a.group||old.group,age:a.age||old.age,level:a.level,dir:a.dir});
        }else{existing.set(a.id,a);}
      }
      return Array.from(existing.values());
    });
    setServerPreview(null);
  }

  useEffect(()=>{if(showLoad&&events.length===0)fetchEvents()},[showLoad]);

  function importCsv(){
    if(!csv.trim())return;
    const lines=csv.trim().split("\n").filter(l=>l.trim());
    const newAthletes=[];
    for(const line of lines){
      const parts=line.split(";").map(s=>s.trim());
      if(parts.length<7)continue;
      const [id,group,name,sex,age,level,dir]=parts;
      newAthletes.push({id,group,name,sex:sex.toLowerCase(),age:parseInt(age)||0,level,dir:dir.toLowerCase(),present:true});
    }
    if(newAthletes.length>0){
      setAthletes(prev=>[...prev,...newAthletes]);
      setCsv("");
    }
  }

  function addManual(){
    if(!form.name.trim())return;
    const a={...form,id:form.id||String(Date.now()),age:parseInt(form.age)||0,sex:form.sex.toLowerCase(),dir:form.dir.toLowerCase(),present:true};
    setAthletes(prev=>[...prev,a]);
    setForm({id:"",group:"",name:"",sex:"м",age:"",level:"SPIRIT 1 Biginner",dir:"base"});
  }

  function togglePresent(idx){setAthletes(prev=>prev.map((a,i)=>i===idx?{...a,present:a.present===false?true:false}:a))}

  const [editIdx,setEditIdx]=useState(null);
  const [editData,setEditData]=useState({});

  function startEdit(i){setEditIdx(i);setEditData({...athletes[i]});}
  function saveEdit(){setAthletes(prev=>prev.map((a,i)=>i===editIdx?{...editData,age:parseInt(editData.age)||0,sex:editData.sex.toLowerCase(),dir:editData.dir.toLowerCase()}:a));setEditIdx(null);}
  function cancelEdit(){setEditIdx(null);}

  function removeAthlete(idx){setAthletes(prev=>prev.filter((_,i)=>i!==idx))}
  function clearAll(){setConfirm(true)}

  return <div>
    <div className="card">
      <h3 style={{cursor:"pointer",color:"#14b8a6",display:"flex",justifyContent:"space-between",alignItems:"center"}} onClick={()=>setShowLoad(!showLoad)}>
        Загрузка / Импорт <span style={{fontSize:14,color:"#64748b"}}>{showLoad?"▲":"▼"}</span>
      </h3>
      {showLoad&&<div style={{marginTop:12}}>
        <h4 style={{marginBottom:8,color:"#94a3b8",fontSize:14}}>Загрузить с сервера (МойКласс + разряды)</h4>
        <p style={{fontSize:12,color:"#64748b",marginBottom:8}}>Автосборка: записи на контрольную тренировку (сегодня) + разряды из Coach App</p>
        <button className="btn btn-success" onClick={loadFromServer} disabled={serverLoading} style={{marginBottom:16}}>
          {serverLoading?'⏳ Загрузка...':'🏋️ Загрузить с сервера'}
        </button>

        <h4 style={{marginBottom:8,color:"#94a3b8",fontSize:14}}>Загрузить из события</h4>
        {eventsLoading?<div style={{color:"#64748b",padding:8}}>Загрузка...</div>:
        events.length===0?<div style={{color:"#64748b",padding:8,fontSize:13}}>Нет доступных событий</div>:
        <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:12}}>
          {events.map(ev=><button key={ev.id} className="btn" style={{background:syncManager?.eventId===ev.id?"#1e40af":"#334155",color:"#e2e8f0",textAlign:"left",padding:"10px 14px",fontSize:13,display:"flex",justifyContent:"space-between",alignItems:"center"}} onClick={()=>setConfirmEvent(ev)} disabled={!!loadingEventId}>
            <span>{ev.name}</span>
            <span style={{color:"#64748b",fontSize:12}}>{ev.date}</span>
          </button>)}
        </div>}
        <button className="btn btn-secondary btn-sm" onClick={fetchEvents} style={{marginBottom:16}}>Обновить список</button>
        <h4 style={{marginBottom:8,color:"#94a3b8",fontSize:14}}>Импорт CSV</h4>
        <p style={{fontSize:12,color:"#64748b",marginBottom:8}}>Формат: id;группа;ФИО;пол;возраст;уровень;направление</p>
        <textarea value={csv} onChange={e=>setCsv(e.target.value)} placeholder="100006;М-118;Трескин Кирилл Денисович;м;12;SPIRIT 3;freestyle"/>
        <div style={{marginTop:8}}>
          <button className="btn btn-primary" onClick={importCsv}>Импорт</button>
        </div>
      </div>}
    </div>

    <div className="card">
      <h3 style={{cursor:"pointer",color:"#14b8a6",display:"flex",justifyContent:"space-between",alignItems:"center"}} onClick={()=>setShowAdd(!showAdd)}>
        Добавить участника <span style={{fontSize:14,color:"#64748b"}}>{showAdd?"▲":"▼"}</span>
      </h3>
      {showAdd&&<div style={{marginTop:12}}>
      <div className="form-row">
        <div className="form-group"><label>ID</label><input type="text" value={form.id} onChange={e=>setForm({...form,id:e.target.value})} placeholder="Авто"/></div>
        <div className="form-group"><label>Группа</label><input type="text" value={form.group} onChange={e=>setForm({...form,group:e.target.value})}/></div>
        <div className="form-group"><label>ФИО *</label><input type="text" value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/></div>
      </div>
      <div className="form-row">
        <div className="form-group"><label>Пол</label>
          <select value={form.sex} onChange={e=>setForm({...form,sex:e.target.value})}><option value="м">М</option><option value="ж">Ж</option></select>
        </div>
        <div className="form-group"><label>Возраст</label><input type="number" value={form.age} onChange={e=>setForm({...form,age:e.target.value})} min="0"/></div>
        <div className="form-group"><label>Уровень</label>
          <select value={form.level} onChange={e=>{const lv=e.target.value;setForm({...form,level:lv,dir:getDirForLevel(lv)})}}>{allLevelNames.map(l=><option key={l} value={l}>{l}</option>)}</select>
        </div>
        <div className="form-group"><label>Направление</label>
          <select value={form.dir} onChange={e=>setForm({...form,dir:e.target.value})}><option value="freestyle">Freestyle</option><option value="base">Base</option></select>
        </div>
      </div>
      <button className="btn btn-primary" onClick={addManual}>Добавить</button>
      </div>}
    </div>

    <div className="card">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <h3 style={{color:"#14b8a6"}}>Участники ({athletes.filter(a=>a.present!==false).length}/{athletes.length})</h3>
        {athletes.length>0&&<button className="btn btn-danger btn-sm" onClick={clearAll}>Очистить всех</button>}
      </div>
      {athletes.length===0?<div className="empty">Нет загруженных участников</div>:
      <div className="table-wrap"><table>
        <thead><tr><th>№</th><th>Явка</th><th>Гр</th><th>ФИО</th><th>Пол</th><th>Лет</th><th>Уровень</th><th>Напр.</th><th></th></tr></thead>
        <tbody>{athletes.map((a,i)=>editIdx===i?<tr key={i} style={{background:"#1e293b"}}>
          <td>{a.id}</td>
          <td style={{textAlign:"center"}}><input type="checkbox" checked={editData.present!==false} onChange={e=>setEditData({...editData,present:e.target.checked})} style={{width:18,height:18,cursor:"pointer"}}/></td>
          <td><input style={{width:60,padding:4,background:"#0f172a",border:"1px solid #14b8a6",borderRadius:4,color:"#e2e8f0",fontSize:12}} value={editData.group} onChange={e=>setEditData({...editData,group:e.target.value})}/></td>
          <td><input style={{width:"100%",padding:4,background:"#0f172a",border:"1px solid #14b8a6",borderRadius:4,color:"#e2e8f0",fontSize:12}} value={editData.name} onChange={e=>setEditData({...editData,name:e.target.value})}/></td>
          <td><select style={{padding:4,background:"#0f172a",border:"1px solid #14b8a6",borderRadius:4,color:"#e2e8f0",fontSize:12}} value={editData.sex} onChange={e=>setEditData({...editData,sex:e.target.value})}><option value="м">М</option><option value="ж">Ж</option></select></td>
          <td><input type="number" style={{width:45,padding:4,background:"#0f172a",border:"1px solid #14b8a6",borderRadius:4,color:"#e2e8f0",fontSize:12}} value={editData.age} onChange={e=>setEditData({...editData,age:e.target.value})}/></td>
          <td><select style={{padding:4,background:"#0f172a",border:"1px solid #14b8a6",borderRadius:4,color:"#e2e8f0",fontSize:12}} value={editData.level} onChange={e=>{const lv=e.target.value;setEditData({...editData,level:lv,dir:getDirForLevel(lv)})}}>{allLevelNames.map(l=><option key={l} value={l}>{l}</option>)}</select></td>
          <td><select style={{padding:4,background:"#0f172a",border:"1px solid #14b8a6",borderRadius:4,color:"#e2e8f0",fontSize:12}} value={editData.dir} onChange={e=>setEditData({...editData,dir:e.target.value})}><option value="freestyle">freestyle</option><option value="base">base</option></select></td>
          <td style={{whiteSpace:"nowrap"}}><button className="btn btn-primary btn-sm" onClick={saveEdit}>✓</button>{" "}<button className="btn btn-secondary btn-sm" onClick={cancelEdit}>✕</button></td>
        </tr>:<tr key={i} style={a.present===false?{opacity:0.4}:{}}>
          <td>{a.id}</td>
          <td style={{textAlign:"center"}}><button onClick={()=>togglePresent(i)} style={{background:"none",border:"none",cursor:"pointer",fontSize:16,padding:0}} title={a.present===false?"Отметить как явившегося":"Отметить как не явившегося"}>{a.present===false?"❌":"✅"}</button></td>
          <td>{a.group}</td><td>{a.name}</td>
          <td><span className={(a.sex||"")=="ж"?"badge badge-female":"badge badge-male"}>{(a.sex||"?").toUpperCase()}</span></td>
          <td>{a.age}</td><td>{a.level}</td><td>{a.dir}</td>
          <td style={{whiteSpace:"nowrap"}}><button className="btn btn-secondary btn-sm" onClick={()=>startEdit(i)} style={{marginRight:4}}>✎</button><button className="btn btn-danger btn-sm" onClick={()=>removeAthlete(i)}>×</button></td>
        </tr>)}</tbody>
      </table></div>}
    </div>

    {confirm&&<ConfirmDialog msg="Удалить всех участников?" onYes={()=>{setAthletes([]);clearResults();setConfirm(false)}} onNo={()=>setConfirm(false)}/>}
    {confirmEvent&&<ConfirmDialog msg={`Загрузить участников из "${confirmEvent.name}"? Текущие участники и результаты будут сброшены.`} onYes={()=>loadFromEvent(confirmEvent)} onNo={()=>setConfirmEvent(null)}/>}
    {serverPreview&&<div className="confirm-overlay" onClick={()=>setServerPreview(null)}>
      <div className="confirm-box" onClick={e=>e.stopPropagation()} style={{maxWidth:500}}>
        <h3 style={{color:"#14b8a6",marginBottom:12}}>Загрузка с сервера</h3>
        <p style={{marginBottom:8}}>Найдено <strong>{serverPreview.count}</strong> спортсменов на <strong>{serverPreview.date}</strong></p>
        <p style={{fontSize:12,color:"#94a3b8",marginBottom:12}}>Источники: {serverPreview.sources.moyklass_lessons||0} тренировок, {serverPreview.sources.moyklass_signups||0} записей, {serverPreview.sources.coach_athletes||0} в Coach App</p>
        <div style={{maxHeight:200,overflowY:"auto",border:"1px solid #334155",borderRadius:8,marginBottom:12}}>
          <table><thead><tr><th>ФИО</th><th>Гр</th><th>Ур</th><th>Возр</th></tr></thead>
          <tbody>{serverPreview.athletes.map((a,i)=><tr key={i}><td>{a.name}</td><td>{a.group}</td><td>{a.level}</td><td>{a.age}</td></tr>)}</tbody></table>
        </div>
        <p style={{fontSize:12,color:"#64748b",marginBottom:12}}>Существующие участники будут обновлены по ID, новые — добавлены.</p>
        <div className="btn-row">
          <button className="btn btn-success" onClick={confirmServerLoad}>Загрузить</button>
          <button className="btn btn-secondary" onClick={()=>setServerPreview(null)}>Отмена</button>
        </div>
      </div>
    </div>}
  </div>;
}

/* ========== TAB 2: JUDGING ========== */
function JudgingTab({athletes,freestyleResults,setFreestyleResults,baseResults,setBaseResults,toast}){
  const [selIdx,setSelIdx]=useState("");
  const [filter,setFilter]=useState("all");

  // Freestyle form
  const [statika,setStatika]=useState(0);
  const [dynamika,setDynamika]=useState(0);
  const [combo,setCombo]=useState(0);
  const [universality,setUniversality]=useState(0);
  const [creative,setCreative]=useState(0);
  const [dirty,setDirty]=useState(0);
  const [fall,setFall]=useState(0);
  const [dsk,setDsk]=useState(false);
  const [comboCheck,setComboCheck]=useState(false);
  const [minElCheck,setMinElCheck]=useState(false);

  // Base form
  const [otj,setOtj]=useState(0);
  const [podt,setPodt]=useState(0);
  const [br,setBr]=useState(0);
  const [pl,setPl]=useState(0);
  const [pres,setPres]=useState(0);
  const [vyh,setVyh]=useState(0);

  const filtered=useMemo(()=>{
    return athletes.map((a,i)=>({...a,_idx:i})).filter(a=>a.present!==false&&(filter==="all"||a.dir===filter));
  },[athletes,filter]);

  const judgedIds=useMemo(()=>{
    const s=new Set();
    freestyleResults.forEach(r=>s.add(r.athleteIdx));
    baseResults.forEach(r=>s.add(r.athleteIdx));
    return s;
  },[freestyleResults,baseResults]);

  const selected=selIdx!==""?athletes[parseInt(selIdx)]:null;

  function resetFreestyleForm(){setStatika(0);setDynamika(0);setCombo(0);setUniversality(0);setCreative(0);setDirty(0);setFall(0);setDsk(false);setComboCheck(false);setMinElCheck(false)}
  function resetBaseForm(){setOtj(0);setPodt(0);setBr(0);setPl(0);setPres(0);setVyh(0)}

  useEffect(()=>{resetFreestyleForm();resetBaseForm()},[selIdx]);

  function selectNextUnjudged(){
    const next=filtered.find(a=>!judgedIds.has(a._idx)&&a._idx!==parseInt(selIdx));
    if(next)setSelIdx(String(next._idx));
    else setSelIdx("");
  }

  function saveFreestyle(){
    if(!selected)return;
    const lvl=findLevel(selected.level);
    const penalties=dirty*2+fall*4;
    const total=statika+dynamika+combo+universality+creative-penalties;
    const minScore=selected.sex==="ж"?lvl.minF:lvl.minM;
    const passed=!dsk&&comboCheck&&minElCheck&&total>=minScore;

    const result={
      athleteIdx:parseInt(selIdx),
      id:selected.id,group:selected.group,name:selected.name,sex:selected.sex,age:selected.age,
      level:selected.level,
      statika,dynamika,combo,universality,creative,
      dirty,fall,dsk,comboCheck,minElCheck,
      penalties,total:Math.round(total*100)/100,passed
    };
    setFreestyleResults(prev=>{
      const exists=prev.findIndex(r=>r.athleteIdx===result.athleteIdx);
      if(exists>=0){const n=[...prev];n[exists]=result;return n}
      return [...prev,result];
    });
    toast("Результат сохранён!");
    setTimeout(selectNextUnjudged,100);
  }

  function saveBase(){
    if(!selected)return;
    const blvl=findBaseLevel(selected.level);
    if(!blvl)return;
    const score=otj*BASE_COEF.otj+podt*BASE_COEF.podt+br*BASE_COEF.br+vyh*BASE_COEF.vyh;
    const checks={
      otj:blvl.otj===0||otj>=blvl.otj,
      podt:blvl.podt===0||podt>=blvl.podt,
      br:blvl.br===0||br>=blvl.br,
      pl:blvl.pl===0||pl>=blvl.pl,
      pres:blvl.pres===0||pres>=blvl.pres,
      vyh:blvl.vyh===0||vyh>=blvl.vyh
    };
    const allPassed=Object.values(checks).every(Boolean);

    const result={
      athleteIdx:parseInt(selIdx),
      id:selected.id,group:selected.group,name:selected.name,sex:selected.sex,age:selected.age,
      level:selected.level,
      otj,podt,br,pl,pres,vyh,
      score:Math.round(score*100)/100,passed:allPassed,checks
    };
    setBaseResults(prev=>{
      const exists=prev.findIndex(r=>r.athleteIdx===result.athleteIdx);
      if(exists>=0){const n=[...prev];n[exists]=result;return n}
      return [...prev,result];
    });
    toast("Результат сохранён!");
    setTimeout(selectNextUnjudged,100);
  }

  return <div>
    <div className="card">
      <div className="form-row">
        <div className="form-group" style={{flex:2}}>
          <label>Направление</label>
          <select value={filter} onChange={e=>{setFilter(e.target.value);setSelIdx("")}}>
            <option value="all">Все</option><option value="freestyle">Freestyle</option><option value="base">Base</option>
          </select>
        </div>
        <div className="form-group" style={{flex:5}}>
          <label>Спортсмен</label>
          <select value={selIdx} onChange={e=>setSelIdx(e.target.value)}>
            <option value="">— Выберите —</option>
            {filtered.map(a=><option key={a._idx} value={a._idx} style={judgedIds.has(a._idx)?{color:"#22c55e"}:{}}>
              {judgedIds.has(a._idx)?"✓ ":""}{a.name} — {a.level} ({a.dir})
            </option>)}
          </select>
        </div>
      </div>
    </div>

    {selected&&selected.dir==="freestyle"&&<FreestyleJudging
      athlete={selected}
      statika={statika} setStatika={setStatika}
      dynamika={dynamika} setDynamika={setDynamika}
      combo={combo} setCombo={setCombo}
      universality={universality} setUniversality={setUniversality}
      creative={creative} setCreative={setCreative}
      dirty={dirty} setDirty={setDirty}
      fall={fall} setFall={setFall}
      dsk={dsk} setDsk={setDsk}
      comboCheck={comboCheck} setComboCheck={setComboCheck}
      minElCheck={minElCheck} setMinElCheck={setMinElCheck}
      onSave={saveFreestyle}
    />}

    {selected&&selected.dir==="base"&&<BaseJudging
      athlete={selected}
      otj={otj} setOtj={setOtj}
      podt={podt} setPodt={setPodt}
      br={br} setBr={setBr}
      pl={pl} setPl={setPl}
      pres={pres} setPres={setPres}
      vyh={vyh} setVyh={setVyh}
      onSave={saveBase}
    />}

    {selected===null&&selIdx===""&&<div className="card"><div className="empty">Выберите спортсмена для судейства</div></div>}
  </div>;
}

function FreestyleJudging({athlete,statika,setStatika,dynamika,setDynamika,combo,setCombo,universality,setUniversality,creative,setCreative,dirty,setDirty,fall,setFall,dsk,setDsk,comboCheck,setComboCheck,minElCheck,setMinElCheck,onSave}){
  const lvl=findLevel(athlete.level);
  const penalties=dirty*2+fall*4;
  const total=statika+dynamika+combo+universality+creative-penalties;
  const minScore=athlete.sex==="ж"?lvl.minF:lvl.minM;
  const passed=!dsk&&comboCheck&&minElCheck&&total>=minScore;

  return <div className="card">
    <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8,marginBottom:12}}>
      <div>
        <h3 style={{color:"#14b8a6"}}>{athlete.name}</h3>
        <div style={{fontSize:13,color:"#94a3b8",marginTop:4}}>
          {athlete.level} | <span className={(athlete.sex||"")==="ж"?"badge badge-female":"badge badge-male"}>{(athlete.sex||"?").toUpperCase()}</span> | Мин. баллов: <strong style={{color:"#f59e0b"}}>{minScore}</strong> | Мин. элементов: <strong style={{color:"#f59e0b"}}>{lvl.minEl}</strong>
        </div>
      </div>
    </div>

    <div className="form-row">
      <div className="form-group"><label>Статика</label><input type="number" step="0.5" min="0" value={statika} onChange={e=>setStatika(parseFloat(e.target.value)||0)}/></div>
      <div className="form-group"><label>Динамика</label><input type="number" step="0.5" min="0" value={dynamika} onChange={e=>setDynamika(parseFloat(e.target.value)||0)}/></div>
      <div className="form-group"><label>Комбо бонус</label><input type="number" step="0.1" min="0" value={combo} onChange={e=>setCombo(parseFloat(e.target.value)||0)}/></div>
    </div>
    <div className="form-row">
      <div className="form-group"><label>Универсальность</label><input type="number" step="0.1" min="0" value={universality} onChange={e=>setUniversality(parseFloat(e.target.value)||0)}/></div>
      <div className="form-group"><label>Креатив</label><input type="number" step="0.5" min="0" value={creative} onChange={e=>setCreative(parseFloat(e.target.value)||0)}/></div>
    </div>

    <div className="section-title">Штрафы</div>
    <div className="form-row" style={{alignItems:"center"}}>
      <div className="form-group">
        <label>Грязное исполнение (-2)</label>
        <div className="penalty-ctrl">
          <button onClick={()=>setDirty(Math.max(0,dirty-1))}>−</button>
          <span>{dirty}</span>
          <button onClick={()=>setDirty(dirty+1)}>+</button>
          <span style={{color:"#ef4444",fontSize:13}}>= −{dirty*2}</span>
        </div>
      </div>
      <div className="form-group">
        <label>Падение (-4)</label>
        <div className="penalty-ctrl">
          <button onClick={()=>setFall(Math.max(0,fall-1))}>−</button>
          <span>{fall}</span>
          <button onClick={()=>setFall(fall+1)}>+</button>
          <span style={{color:"#ef4444",fontSize:13}}>= −{fall*4}</span>
        </div>
      </div>
      <div className="form-group">
        <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer"}}>
          <input type="checkbox" checked={dsk} onChange={e=>setDsk(e.target.checked)} style={{width:"auto"}}/>
          ДСК (дисквалификация)
        </label>
      </div>
    </div>

    <div className="section-title">Обязательные условия</div>
    <div className="form-row" style={{alignItems:"center"}}>
      <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer"}}>
        <input type="checkbox" checked={comboCheck} onChange={e=>setComboCheck(e.target.checked)} style={{width:"auto"}}/>
        Комбо 3+ элементов
      </label>
      <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer"}}>
        <input type="checkbox" checked={minElCheck} onChange={e=>setMinElCheck(e.target.checked)} style={{width:"auto"}}/>
        Мин. кол. элементов своего разряда
      </label>
    </div>

    <div style={{marginTop:16,textAlign:"center"}}>
      <div className="score-big">{(Math.round(total*100)/100).toFixed(1)}</div>
      <div style={{fontSize:18,fontWeight:700,marginBottom:12}} className={passed?"result-pass":"result-fail"}>
        {dsk?"ДИСКВАЛИФИКАЦИЯ":passed?"СДАЛ":"НЕ СДАЛ"}
      </div>
      {!dsk&&total<minScore&&<div style={{fontSize:12,color:"#ef4444",marginBottom:8}}>Не хватает баллов: нужно {minScore}, набрано {(Math.round(total*100)/100).toFixed(1)}</div>}
      {!comboCheck&&<div style={{fontSize:12,color:"#ef4444",marginBottom:4}}>Не выполнено: комбо 3+ элементов</div>}
      {!minElCheck&&<div style={{fontSize:12,color:"#ef4444",marginBottom:4}}>Не выполнено: мин. кол. элементов</div>}
      <button className="btn btn-success" onClick={onSave} style={{marginTop:8}}>Сохранить в протокол</button>
    </div>
  </div>;
}

function BaseJudging({athlete,otj,setOtj,podt,setPodt,br,setBr,pl,setPl,pres,setPres,vyh,setVyh,onSave}){
  const blvl=findBaseLevel(athlete.level);
  if(!blvl)return <div className="card"><div className="empty">Уровень {athlete.level} не найден в BASE</div></div>;

  const score=otj*BASE_COEF.otj+podt*BASE_COEF.podt+br*BASE_COEF.br+vyh*BASE_COEF.vyh;
  const checks={
    otj:blvl.otj===0||otj>=blvl.otj,
    podt:blvl.podt===0||podt>=blvl.podt,
    br:blvl.br===0||br>=blvl.br,
    pl:blvl.pl===0||pl>=blvl.pl,
    pres:blvl.pres===0||pres>=blvl.pres,
    vyh:blvl.vyh===0||vyh>=blvl.vyh
  };
  const allPassed=Object.values(checks).every(Boolean);

  const exercises=[
    {label:"Отжимания",val:otj,set:setOtj,norm:blvl.otj,key:"otj"},
    {label:"Подтягивания",val:podt,set:setPodt,norm:blvl.podt,key:"podt"},
    {label:"Брусья",val:br,set:setBr,norm:blvl.br,key:"br"},
    {label:"Планка (сек)",val:pl,set:setPl,norm:blvl.pl,key:"pl"},
    {label:"Пресс",val:pres,set:setPres,norm:blvl.pres,key:"pres"},
    {label:"Выходы силой",val:vyh,set:setVyh,norm:blvl.vyh,key:"vyh"},
  ];

  return <div className="card">
    <div style={{marginBottom:12}}>
      <h3 style={{color:"#14b8a6"}}>{athlete.name}</h3>
      <div style={{fontSize:13,color:"#94a3b8",marginTop:4}}>{athlete.level}</div>
    </div>

    <div className="form-row" style={{flexWrap:"wrap"}}>
      {exercises.map(ex=><div className="form-group" key={ex.key} style={{minWidth:140}}>
        <label>{ex.label} {ex.norm>0&&<span className={checks[ex.key]?"norm-ok":"norm-fail"}>(норм: {ex.norm})</span>}</label>
        <input type="number" min="0" value={ex.val} onChange={e=>ex.set(parseInt(e.target.value)||0)}
          style={{borderColor:ex.norm>0?(checks[ex.key]?"#22c55e":"#ef4444"):"#334155"}}
        />
      </div>)}
    </div>

    <div style={{marginTop:16,textAlign:"center"}}>
      <div style={{fontSize:13,color:"#94a3b8",marginBottom:4}}>Баллы = отж×0.5 + подт×2 + бр×1 + вых×3</div>
      <div className="score-big">{(Math.round(score*100)/100).toFixed(1)}</div>
      <div style={{fontSize:18,fontWeight:700,marginBottom:12}} className={allPassed?"result-pass":"result-fail"}>
        {allPassed?"СДАЛ":"НЕ СДАЛ"}
      </div>
      {!allPassed&&<div style={{fontSize:12,color:"#ef4444",marginBottom:8}}>
        Не выполнены: {exercises.filter(e=>e.norm>0&&!checks[e.key]).map(e=>e.label).join(", ")}
      </div>}
      <button className="btn btn-success" onClick={onSave} style={{marginTop:8}}>Сохранить в протокол</button>
    </div>
  </div>;
}

/* ========== TAB 3: PROTOCOL ========== */
function ProtocolTab({freestyleResults,baseResults}){
  const sortedF=useMemo(()=>[...freestyleResults].sort((a,b)=>b.total-a.total),[freestyleResults]);
  const sortedB=useMemo(()=>[...baseResults].sort((a,b)=>b.score-a.score),[baseResults]);

  function exportCsv(){
    let csv="Направление;№;Гр;ФИО;Уровень;Балл;Результат\n";
    sortedF.forEach(r=>{csv+=`Freestyle;${r.id};${r.group};${r.name};${r.level};${r.total};${r.passed?"Сдал":"Не сдал"}\n`});
    sortedB.forEach(r=>{csv+=`Base;${r.id};${r.group};${r.name};${r.level};${r.score};${r.passed?"Сдал":"Не сдал"}\n`});
    const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download="protocol.csv";a.click();
    URL.revokeObjectURL(url);
  }

  function copyText(){
    let txt="=== FREESTYLE ===\n";
    sortedF.forEach((r,i)=>{txt+=`${i+1}. ${r.name} (${r.level}) — ${r.total} — ${r.passed?"Сдал":"Не сдал"}\n`});
    txt+="\n=== BASE ===\n";
    sortedB.forEach((r,i)=>{txt+=`${i+1}. ${r.name} (${r.level}) — ${r.score} — ${r.passed?"Сдал":"Не сдал"}\n`});
    navigator.clipboard.writeText(txt);
  }

  return <div>
    <div className="section-title">FREESTYLE</div>
    {sortedF.length===0?<div className="card"><div className="empty">Нет результатов freestyle</div></div>:
    <div className="card"><div className="table-wrap"><table>
      <thead><tr><th>№</th><th>Гр</th><th>ФИО</th><th>Уровень</th><th>Стат</th><th>Дин</th><th>Комбо</th><th>Унив</th><th>Креатив</th><th>Штрафы</th><th>Балл</th><th title="Мин. элементов разряда">Мин.эл</th><th title="Комбо из 3+ элементов">Комбо 3+</th><th title="Набрано / нужно баллов">Мин.балл</th><th>Результат</th></tr></thead>
      <tbody>{sortedF.map((r,i)=>{const lvl=LEVELS.find(l=>l.name===r.level)||{minEl:0,minM:0,minF:0};const minScore=r.sex==="ж"?lvl.minF:lvl.minM;const scoreOk=r.total>=minScore;return <tr key={i} className={r.passed?"row-pass":"row-fail"}>
        <td>{r.id}</td><td>{r.group}</td><td>{r.name}</td><td>{r.level}</td>
        <td>{r.statika}</td><td>{r.dynamika}</td><td>{r.combo}</td><td>{r.universality}</td><td>{r.creative}</td>
        <td style={{color:"#ef4444"}}>{r.penalties>0?`-${r.penalties}`:""}{r.dsk?" ДСК":""}</td>
        <td style={{fontWeight:700,color:"#f59e0b"}}>{r.total}</td>
        <td style={{textAlign:"center"}}><span style={{color:r.minElCheck?"#22c55e":"#ef4444",fontWeight:700}}>{r.minElCheck?"✅":"❌"}</span><div style={{fontSize:10,color:"#64748b"}}>нужно {lvl.minEl}</div></td>
        <td style={{textAlign:"center"}}><span style={{color:r.comboCheck?"#22c55e":"#ef4444",fontWeight:700}}>{r.comboCheck?"✅":"❌"}</span></td>
        <td style={{textAlign:"center"}}><span style={{color:scoreOk?"#22c55e":"#ef4444",fontWeight:700}}>{scoreOk?"✅":"❌"}</span><div style={{fontSize:10,color:"#64748b"}}>{minScore}</div></td>
        <td><span className={r.passed?"badge badge-pass":"badge badge-fail"}>{r.dsk?"ДСК":r.passed?"Сдал":"Не сдал"}</span></td>
      </tr>})}</tbody>
    </table></div></div>}

    <div className="section-title">БАЗОВЫЕ</div>
    {sortedB.length===0?<div className="card"><div className="empty">Нет результатов base</div></div>:
    <div className="card"><div className="table-wrap"><table>
      <thead><tr><th>№</th><th>Гр</th><th>ФИО</th><th>Уровень</th><th>Отж</th><th>Подт</th><th>Бр</th><th>Планка</th><th>Пресс</th><th>Вых</th><th>Балл</th><th>Результат</th></tr></thead>
      <tbody>{sortedB.map((r,i)=><tr key={i} className={r.passed?"row-pass":"row-fail"}>
        <td>{r.id}</td><td>{r.group}</td><td>{r.name}</td><td>{r.level}</td>
        <td className={r.checks?.otj?"norm-ok":"norm-fail"}>{r.otj}</td>
        <td className={r.checks?.podt?"norm-ok":"norm-fail"}>{r.podt}</td>
        <td className={r.checks?.br?"norm-ok":"norm-fail"}>{r.br}</td>
        <td className={r.checks?.pl?"norm-ok":"norm-fail"}>{r.pl}</td>
        <td className={r.checks?.pres?"norm-ok":"norm-fail"}>{r.pres}</td>
        <td className={r.checks?.vyh?"norm-ok":"norm-fail"}>{r.vyh}</td>
        <td style={{fontWeight:700,color:"#f59e0b"}}>{r.score}</td>
        <td><span className={r.passed?"badge badge-pass":"badge badge-fail"}>{r.passed?"Сдал":"Не сдал"}</span></td>
      </tr>)}</tbody>
    </table></div></div>}

    <div style={{display:"flex",gap:12,marginTop:16,flexWrap:"wrap"}}>
      <button className="btn btn-primary" onClick={exportCsv}>Экспорт CSV</button>
      <button className="btn btn-secondary" onClick={copyText}>Копировать как текст</button>
    </div>
  </div>;
}

/* ========== TAB 4: WINNERS ========== */
function AgeCatEditor({label,color,cats,setCats}){
  const [editing,setEditing]=useState(false);
  const [editCats,setEditCats]=useState([]);
  function startEdit(){setEditCats(cats.map(c=>({...c})));setEditing(true)}
  function saveEdit(){setCats(editCats.filter(c=>c.name.trim()));setEditing(false)}
  function addCat(){setEditCats([...editCats,{name:"",min:0,max:99}])}
  function removeCat(i){setEditCats(editCats.filter((_,j)=>j!==i))}
  function updateCat(i,field,val){const n=[...editCats];n[i]={...n[i],[field]:field==="name"?val:parseInt(val)||0};setEditCats(n)}
  return <div className="card">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
      <h3 style={{color}}>{label}</h3>
      {!editing?<button className="btn btn-secondary btn-sm" onClick={startEdit}>Настроить</button>
      :<button className="btn btn-primary btn-sm" onClick={saveEdit}>Сохранить</button>}
    </div>
    {editing?<div>
      {editCats.map((c,i)=><div className="age-cat-row" key={i}>
        <input className="cat-name" type="text" value={c.name} onChange={e=>updateCat(i,"name",e.target.value)} placeholder="Название"/>
        <input type="number" value={c.min} onChange={e=>updateCat(i,"min",e.target.value)} placeholder="Мин"/>
        <span style={{color:"#64748b"}}>—</span>
        <input type="number" value={c.max} onChange={e=>updateCat(i,"max",e.target.value)} placeholder="Макс"/>
        <button className="btn btn-danger btn-sm" onClick={()=>removeCat(i)}>×</button>
      </div>)}
      <button className="btn btn-secondary btn-sm" onClick={addCat} style={{marginTop:8}}>+ Категория</button>
    </div>
    :<div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
      {cats.map((c,i)=><span key={i} className="badge" style={{background:color+"22",color}}>{c.name} ({c.min}–{c.max})</span>)}
    </div>}
  </div>;
}

function WinnersTab({athletes,freestyleResults,baseResults,ageCatsF,setAgeCatsF,ageCatsB,setAgeCatsB}){
  const absentIds=useMemo(()=>new Set(athletes.filter(a=>a.present===false).map(a=>a.id)),[athletes]);
  const passedF=useMemo(()=>freestyleResults.filter(r=>r.passed&&!absentIds.has(r.id)).sort((a,b)=>b.total-a.total),[freestyleResults,absentIds]);
  const passedB=useMemo(()=>baseResults.filter(r=>r.passed&&!absentIds.has(r.id)).sort((a,b)=>b.score-a.score),[baseResults,absentIds]);

  function getWinners(results,cats){
    return cats.map(cat=>{
      const inCat=results.filter(r=>r.age>=cat.min&&r.age<=cat.max);
      return {cat,winners:inCat.slice(0,3)};
    }).filter(g=>g.winners.length>0);
  }

  const fWinners=getWinners(passedF,ageCatsF);
  const bWinners=getWinners(passedB,ageCatsB);

  return <div>
    <AgeCatEditor label="Категории Фристайл" color="#14b8a6" cats={ageCatsF} setCats={setAgeCatsF}/>
    <AgeCatEditor label="Категории База" color="#f59e0b" cats={ageCatsB} setCats={setAgeCatsB}/>

    <div className="section-title">ПОБЕДИТЕЛИ ФРИСТАЙЛ</div>
    {fWinners.length===0?<div className="card"><div className="empty">Нет сдавших freestyle</div></div>:
    fWinners.map((g,gi)=><div className="card" key={gi}>
      <h4 style={{marginBottom:8,color:"#14b8a6"}}>{g.cat.name} лет</h4>
      <div className="table-wrap"><table>
        <thead><tr><th>Место</th><th>Гр</th><th>ФИО</th><th>Лет</th><th>Баллы</th></tr></thead>
        <tbody>{g.winners.map((w,i)=><tr key={i}>
          <td style={{fontWeight:700,color:i===0?"#f59e0b":i===1?"#94a3b8":"#cd7f32"}}>{i+1}</td>
          <td>{w.group}</td><td>{w.name}</td><td>{w.age}</td>
          <td style={{fontWeight:700,color:"#f59e0b"}}>{w.total}</td>
        </tr>)}</tbody>
      </table></div>
    </div>)}

    <div className="section-title">ПОБЕДИТЕЛИ БАЗА</div>
    {bWinners.length===0?<div className="card"><div className="empty">Нет сдавших base</div></div>:
    bWinners.map((g,gi)=><div className="card" key={gi}>
      <h4 style={{marginBottom:8,color:"#f59e0b"}}>{g.cat.name} лет</h4>
      <div className="table-wrap"><table>
        <thead><tr><th>Место</th><th>Гр</th><th>ФИО</th><th>Лет</th><th>Баллы</th></tr></thead>
        <tbody>{g.winners.map((w,i)=><tr key={i}>
          <td style={{fontWeight:700,color:i===0?"#f59e0b":i===1?"#94a3b8":"#cd7f32"}}>{i+1}</td>
          <td>{w.group}</td><td>{w.name}</td><td>{w.age}</td>
          <td style={{fontWeight:700,color:"#f59e0b"}}>{w.score}</td>
        </tr>)}</tbody>
      </table></div>
    </div>)}
  </div>;
}

/* ========== TAB 5: CERTIFICATES ========== */
function CertsTab({athletes,freestyleResults,baseResults}){
  const absentIds=useMemo(()=>new Set(athletes.filter(a=>a.present===false).map(a=>a.id)),[athletes]);
  const fPresent=useMemo(()=>freestyleResults.filter(r=>!absentIds.has(r.id)),[freestyleResults,absentIds]);
  const bPresent=useMemo(()=>baseResults.filter(r=>!absentIds.has(r.id)),[baseResults,absentIds]);
  const fPassed=useMemo(()=>fPresent.filter(r=>r.passed).sort((a,b)=>b.total-a.total),[fPresent]);
  const fFailed=useMemo(()=>fPresent.filter(r=>!r.passed),[fPresent]);
  const bPassed=useMemo(()=>bPresent.filter(r=>r.passed).sort((a,b)=>b.score-a.score),[bPresent]);
  const bFailed=useMemo(()=>bPresent.filter(r=>!r.passed),[bPresent]);
  const fAbsent=useMemo(()=>freestyleResults.filter(r=>absentIds.has(r.id)),[freestyleResults,absentIds]);
  const bAbsent=useMemo(()=>baseResults.filter(r=>absentIds.has(r.id)),[baseResults,absentIds]);

  function copyList(items,type){
    let txt="";
    items.forEach(r=>{
      if(type==="f-pass")txt+=`${r.group}\t${r.name}\t${r.level}\t${r.total}\tРазряд присвоен\n`;
      else if(type==="f-fail")txt+=`${r.group}\t${r.name}\t${r.level}\tГрамота за участие\n`;
      else if(type==="b-pass")txt+=`${r.group}\t${r.name}\t${r.level}\t${r.score}\tРазряд присвоен\n`;
      else if(type==="b-fail")txt+=`${r.group}\t${r.name}\t${r.level}\tГрамота за участие\n`;
    });
    navigator.clipboard.writeText(txt);
  }

  return <div>
    <div className="section-title">FREESTYLE</div>

    <div className="card">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <h4 style={{color:"#22c55e"}}>СДАЛИ ({fPassed.length})</h4>
        {fPassed.length>0&&<button className="btn btn-secondary btn-sm" onClick={()=>copyList(fPassed,"f-pass")}>Копировать список</button>}
      </div>
      {fPassed.length===0?<div className="empty">—</div>:
      <div className="table-wrap"><table>
        <thead><tr><th>Гр</th><th>ФИО</th><th>Уровень</th><th>Баллы</th><th>Статус</th></tr></thead>
        <tbody>{fPassed.map((r,i)=><tr key={i}>
          <td>{r.group}</td><td>{r.name}</td><td>{r.level}</td>
          <td style={{color:"#f59e0b",fontWeight:700}}>{r.total}</td>
          <td><span className="badge badge-pass">Разряд присвоен</span></td>
        </tr>)}</tbody>
      </table></div>}
    </div>

    <div className="card">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <h4 style={{color:"#ef4444"}}>НЕ СДАЛИ / УЧАСТИЕ ({fFailed.length})</h4>
        {fFailed.length>0&&<button className="btn btn-secondary btn-sm" onClick={()=>copyList(fFailed,"f-fail")}>Копировать список</button>}
      </div>
      {fFailed.length===0?<div className="empty">—</div>:
      <div className="table-wrap"><table>
        <thead><tr><th>Гр</th><th>ФИО</th><th>Уровень заявки</th><th>Баллы</th><th>Причина</th><th>Статус</th></tr></thead>
        <tbody>{fFailed.map((r,i)=>{const lvl=LEVELS.find(l=>l.name===r.level)||{minEl:0,minM:0,minF:0};const minScore=r.sex==="ж"?lvl.minF:lvl.minM;const reasons=[];if(r.dsk)reasons.push("ДСК");if(!r.comboCheck)reasons.push("нет комбо 3+");if(!r.minElCheck)reasons.push(`мин.эл (нужно ${lvl.minEl})`);if(r.total<minScore)reasons.push(`баллы ${r.total}/${minScore}`);return <tr key={i}>
          <td>{r.group}</td><td>{r.name}</td><td>{r.level}</td>
          <td style={{color:"#f59e0b"}}>{r.total}</td>
          <td style={{fontSize:12,color:"#ef4444"}}>{reasons.join(", ")||"—"}</td>
          <td><span className="badge" style={{background:"#94a3b822",color:"#94a3b8"}}>Грамота за участие</span></td>
        </tr>})}</tbody>
      </table></div>}
    </div>

    <div className="section-title">БАЗОВЫЕ</div>

    <div className="card">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <h4 style={{color:"#22c55e"}}>СДАЛИ ({bPassed.length})</h4>
        {bPassed.length>0&&<button className="btn btn-secondary btn-sm" onClick={()=>copyList(bPassed,"b-pass")}>Копировать список</button>}
      </div>
      {bPassed.length===0?<div className="empty">—</div>:
      <div className="table-wrap"><table>
        <thead><tr><th>Гр</th><th>ФИО</th><th>Уровень</th><th>Баллы</th><th>Статус</th></tr></thead>
        <tbody>{bPassed.map((r,i)=><tr key={i}>
          <td>{r.group}</td><td>{r.name}</td><td>{r.level}</td>
          <td style={{color:"#f59e0b",fontWeight:700}}>{r.score}</td>
          <td><span className="badge badge-pass">Разряд присвоен</span></td>
        </tr>)}</tbody>
      </table></div>}
    </div>

    <div className="card">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <h4 style={{color:"#ef4444"}}>НЕ СДАЛИ / УЧАСТИЕ ({bFailed.length})</h4>
        {bFailed.length>0&&<button className="btn btn-secondary btn-sm" onClick={()=>copyList(bFailed,"b-fail")}>Копировать список</button>}
      </div>
      {bFailed.length===0?<div className="empty">—</div>:
      <div className="table-wrap"><table>
        <thead><tr><th>Гр</th><th>ФИО</th><th>Уровень заявки</th><th>Статус</th></tr></thead>
        <tbody>{bFailed.map((r,i)=><tr key={i}>
          <td>{r.group}</td><td>{r.name}</td><td>{r.level}</td>
          <td><span className="badge" style={{background:"#94a3b822",color:"#94a3b8"}}>Грамота за участие</span></td>
        </tr>)}</tbody>
      </table></div>}
    </div>

    {(fAbsent.length>0||bAbsent.length>0)&&<>

/* ========== SYNC MANAGER ========== */
class SyncManager {
  constructor(){
    this.API_BASE='https://api.workoutudm.ru/api/competition';
    this.deviceId=this._getOrCreateDeviceId();
    this.meta=this._loadMeta();
    this.timestamps=this._loadTimestamps();
    this.role=localStorage.getItem('comp_sync_role')||null;
    this.pendingChanges=[];
    this._autoPushTimer=null;
    this._pollTimer=null;
    this._onSyncUpdate=null;
    this._currentDataRef=null;
  }
  _getOrCreateDeviceId(){
    let id=localStorage.getItem('comp_device_id');
    if(!id){id=crypto.randomUUID();localStorage.setItem('comp_device_id',id);}
    return id;
  }
  _loadMeta(){return JSON.parse(localStorage.getItem('comp_sync_meta')||'null');}
  _saveMeta(meta){this.meta=meta;localStorage.setItem('comp_sync_meta',JSON.stringify(meta));}
  _loadTimestamps(){return JSON.parse(localStorage.getItem('comp_sync_timestamps')||'{}');}
  _saveTimestamps(){localStorage.setItem('comp_sync_timestamps',JSON.stringify(this.timestamps));}
  _headers(){return{'Content-Type':'application/json','X-API-Key':this._getApiKey()};}
  _getApiKey(){return 'SggpROWNGUNVTdWFYXmNmBZGzyoJp91E-7c5bEz8zdE';}
  _getRecordKey(record,recordType){
    if(recordType==='age_categories_freestyle'||recordType==='age_categories_base')return record.name;
    return record.id;
  }
  _keyForType(recordType){
    const map={'athletes':'comp_athletes','freestyle_results':'comp_freestyle_results','base_results':'comp_base_results','age_categories_freestyle':'comp_age_categories_freestyle','age_categories_base':'comp_age_categories_base'};
    return map[recordType];
  }
  updateTimestamp(recordType,recordKey){
    this.timestamps[`${recordType}:${recordKey}`]=new Date().toISOString();
    this._saveTimestamps();
  }
  getTimestamp(recordType,recordKey){return this.timestamps[`${recordType}:${recordKey}`]||null;}
  get eventId(){return this.meta?.event_id||null;}
  get lastSyncAt(){return this.meta?.last_sync_at||null;}
  get isConfigured(){return !!this.eventId;}
  setEventId(eventId){this._saveMeta({...this.meta,event_id:eventId,last_sync_at:null});}
  async fetchEvents(){
    const res=await fetch(`${this.API_BASE}/events`,{headers:this._headers()});
    if(!res.ok)throw new Error(`Events fetch failed: ${res.status}`);
    return(await res.json()).events;
  }
  async createEvent(name,date){
    const res=await fetch(`${this.API_BASE}/events`,{method:'POST',headers:this._headers(),body:JSON.stringify({name,date})});
    if(!res.ok)throw new Error(`Event create failed: ${res.status}`);
    return await res.json();
  }
  async preview(){
    if(!this.eventId)throw new Error('No event selected');
    const res=await fetch(`${this.API_BASE}/sync/preview?event_id=${encodeURIComponent(this.eventId)}`,{headers:this._headers()});
    if(!res.ok)throw new Error(`Preview failed: ${res.status}`);
    return await res.json();
  }
  async sync(currentData){
    if(!this.eventId)throw new Error('No event selected');
    const records=this._collectRecords(currentData);
    const res=await fetch(`${this.API_BASE}/sync`,{method:'POST',headers:this._headers(),body:JSON.stringify({event_id:this.eventId,device_id:this.deviceId,since:this.lastSyncAt,records})});
    if(!res.ok)throw new Error(`Sync failed: ${res.status}`);
    const result=await res.json();
    this._saveMeta({...this.meta,last_sync_at:result.server_time});
    return result;
  }
  async pullOnly(){
    if(!this.eventId)throw new Error('No event selected');
    const since=this.lastSyncAt||'1970-01-01T00:00:00Z';
    const res=await fetch(`${this.API_BASE}/sync?event_id=${encodeURIComponent(this.eventId)}&since=${encodeURIComponent(since)}`,{headers:this._headers()});
    if(!res.ok)throw new Error(`Pull failed: ${res.status}`);
    return await res.json();
  }
  _collectRecords(data){
    const records=[];
    const typeMap={athletes:data.athletes,freestyle_results:data.freestyleResults,base_results:data.baseResults,age_categories_freestyle:data.ageCatsF,age_categories_base:data.ageCatsB};
    for(const[recordType,items]of Object.entries(typeMap)){
      for(const item of items){
        const recordKey=this._getRecordKey(item,recordType);
        records.push({record_type:recordType,record_key:recordKey,data:item,updated_at:this.getTimestamp(recordType,recordKey)||new Date().toISOString()});
      }
    }
    return records;
  }
  mergeRecords(pulledRecords,currentData){
    const result={athletes:[...currentData.athletes],freestyleResults:[...currentData.freestyleResults],baseResults:[...currentData.baseResults],ageCatsF:[...currentData.ageCatsF],ageCatsB:[...currentData.ageCatsB]};
    const stats={added:0,updated:0,deleted:0};
    for(const sr of pulledRecords){
      const stateKey=this._stateKeyForType(sr.record_type);
      const arr=result[stateKey];
      const localIdx=arr.findIndex(r=>this._getRecordKey(r,sr.record_type)===sr.record_key);
      if(sr.deleted){if(localIdx>=0){arr.splice(localIdx,1);stats.deleted++;}}
      else if(localIdx<0){arr.push(sr.data);stats.added++;}
      else{arr[localIdx]=sr.data;stats.updated++;}
      this.timestamps[`${sr.record_type}:${sr.record_key}`]=sr.updated_at;
    }
    this._saveTimestamps();
    this._recalcAthleteIdx(result.athletes,result.freestyleResults);
    this._recalcAthleteIdx(result.athletes,result.baseResults);
    return{...result,stats};
  }
  _stateKeyForType(recordType){
    const map={'athletes':'athletes','freestyle_results':'freestyleResults','base_results':'baseResults','age_categories_freestyle':'ageCatsF','age_categories_base':'ageCatsB'};
    return map[recordType];
  }
  _recalcAthleteIdx(athletes,results){
    for(const r of results){const idx=athletes.findIndex(a=>a.id===r.id);if(idx>=0)r.athleteIdx=idx;}
  }

  // --- Realtime Sync: Role management ---
  async setRole(role){
    if(!this.eventId)throw new Error('No event selected');
    const res=await fetch(`${this.API_BASE}/sync/role`,{method:'POST',headers:this._headers(),body:JSON.stringify({event_id:this.eventId,device_id:this.deviceId,role})});
    if(!res.ok)throw new Error(`Set role failed: ${res.status}`);
    this.role=role;
    localStorage.setItem('comp_sync_role',role);
    return await res.json();
  }
  async fetchRoles(){
    if(!this.eventId)return{roles:[],leader:null};
    const res=await fetch(`${this.API_BASE}/sync/role?event_id=${encodeURIComponent(this.eventId)}`,{headers:this._headers()});
    if(!res.ok)throw new Error(`Fetch roles failed: ${res.status}`);
    return await res.json();
  }

  // --- Realtime Sync: Auto-push (leader mode) ---
  schedulePush(currentData){
    if(this.role!=='leader'||!this.isConfigured)return;
    this._currentDataRef=currentData;
    if(!navigator.onLine){
      this.pendingChanges.push({ts:Date.now()});
      return;
    }
    if(this._autoPushTimer)clearTimeout(this._autoPushTimer);
    this._autoPushTimer=setTimeout(()=>{this._doAutoPush();},2000);
  }
  async _doAutoPush(){
    if(!this._currentDataRef||!this.isConfigured)return;
    try{
      const result=await this.sync(this._currentDataRef);
      this.pendingChanges=[];
      if(this._onSyncUpdate)this._onSyncUpdate({type:'pushed',result});
    }catch(e){
      console.error('Auto-push failed:',e);
      this.pendingChanges.push({ts:Date.now(),error:e.message});
      if(this._onSyncUpdate)this._onSyncUpdate({type:'push-error',error:e.message});
    }
  }

  // --- Realtime Sync: Polling (viewer mode) ---
  startPolling(onUpdate){
    this.stopPolling();
    if(!this.isConfigured)return;
    this._pollTimer=setInterval(async()=>{
      if(!navigator.onLine)return;
      try{
        const pulled=await this.pullOnly();
        if(pulled.count>0&&onUpdate)onUpdate(pulled);
      }catch(e){console.error('Poll failed:',e);}
    },3000);
  }
  stopPolling(){
    if(this._pollTimer){clearInterval(this._pollTimer);this._pollTimer=null;}
  }

  // --- Realtime Sync: Offline queue ---
  async flushPending(currentData){
    if(!navigator.onLine||!this.isConfigured||this.pendingChanges.length===0)return false;
    try{
      const result=await this.sync(currentData);
      this.pendingChanges=[];
      if(this._onSyncUpdate)this._onSyncUpdate({type:'flushed',result});
      return true;
    }catch(e){
      console.error('Flush pending failed:',e);
      return false;
    }
  }

  // --- Realtime Sync: Version history ---
  async fetchHistory(limit=50){
    if(!this.eventId)throw new Error('No event selected');
    const res=await fetch(`${this.API_BASE}/sync/history?event_id=${encodeURIComponent(this.eventId)}&limit=${limit}`,{headers:this._headers()});
    if(!res.ok)throw new Error(`History fetch failed: ${res.status}`);
    return await res.json();
  }
  async rollback(version){
    if(!this.eventId)throw new Error('No event selected');
    const res=await fetch(`${this.API_BASE}/sync/rollback`,{method:'POST',headers:this._headers(),body:JSON.stringify({event_id:this.eventId,version,device_id:this.deviceId})});
    if(!res.ok)throw new Error(`Rollback failed: ${res.status}`);
    return await res.json();
  }

  // --- Cleanup ---
  destroy(){
    this.stopPolling();
    if(this._autoPushTimer)clearTimeout(this._autoPushTimer);
  }
}

function SyncBar({syncManager,onSyncComplete,currentData,toast}){
  const[status,setStatus]=useState(syncManager.isConfigured?'idle':'no-event');
  const[showEventSelector,setShowEventSelector]=useState(false);
  const[showPreview,setShowPreview]=useState(false);
  const[previewData,setPreviewData]=useState(null);
  const[showCreateEvent,setShowCreateEvent]=useState(false);
  const[isOnline,setIsOnline]=useState(navigator.onLine);
  const[role,setRole]=useState(syncManager.role);
  const[pendingCount,setPendingCount]=useState(0);
  const[showHistory,setShowHistory]=useState(false);
  const[syncIndicator,setSyncIndicator]=useState('');

  useEffect(()=>{
    const on=()=>{
      setIsOnline(true);
      if(syncManager.role==='leader'&&syncManager.pendingChanges.length>0){
        syncManager.flushPending(currentData).then(ok=>{
          if(ok){setPendingCount(0);toast('Ожидающие изменения отправлены');}
        });
      }
    };
    const off=()=>setIsOnline(false);
    window.addEventListener('online',on);
    window.addEventListener('offline',off);
    return()=>{window.removeEventListener('online',on);window.removeEventListener('offline',off);};
  },[currentData]);

  // Auto-select latest active event if none selected
  useEffect(()=>{
    if(syncManager.eventId)return;
    syncManager.fetchEvents().then(events=>{
      const active=events.filter(e=>e.status==='active');
      if(active.length>0){
        syncManager.setEventId(active[0].id);
        setStatus('idle');
      }
    }).catch(()=>{});
  },[]);

  // Setup sync update callback
  useEffect(()=>{
    syncManager._onSyncUpdate=(ev)=>{
      if(ev.type==='pushed'||ev.type==='flushed'){setPendingCount(0);setSyncIndicator('✓');}
      else if(ev.type==='push-error'){setSyncIndicator('!');}
    };
    return()=>{syncManager._onSyncUpdate=null;};
  },[]);

  // Leader auto-push: schedule on data changes
  useEffect(()=>{
    if(role==='leader'&&syncManager.isConfigured&&syncManager.lastSyncAt){
      syncManager.schedulePush(currentData);
      setPendingCount(syncManager.pendingChanges.length);
    }
  },[currentData,role]);

  // Viewer polling
  useEffect(()=>{
    if(role==='viewer'&&syncManager.isConfigured){
      syncManager.startPolling((pulled)=>{
        if(pulled.count>0){
          const merged=syncManager.mergeRecords(pulled.records,currentData);
          onSyncComplete(merged);
          setSyncIndicator(`↓${pulled.count}`);
        }
      });
    }else{
      syncManager.stopPolling();
    }
    return()=>syncManager.stopPolling();
  },[role,syncManager.eventId]);

  async function handleRoleChange(newRole){
    if(!syncManager.isConfigured){toast('Сначала выберите событие');return;}
    try{
      await syncManager.setRole(newRole);
      setRole(newRole);
      if(newRole==='viewer'){syncManager.stopPolling();syncManager.startPolling((pulled)=>{
        if(pulled.count>0){const merged=syncManager.mergeRecords(pulled.records,currentData);onSyncComplete(merged);}
      });}
      else{syncManager.stopPolling();}
      toast(newRole==='leader'?'Режим: Я сужу (авто-push)':'Режим: Я смотрю (авто-pull)');
    }catch(e){toast(`Ошибка: ${e.message}`);}
  }

  async function handleSync(){
    if(!syncManager.isConfigured){setShowEventSelector(true);return;}
    if(!syncManager.lastSyncAt){
      try{setStatus('syncing');const preview=await syncManager.preview();setPreviewData(preview);setShowPreview(true);setStatus('idle');}
      catch(e){setStatus('error');toast(`Ошибка: ${e.message}`);}
      return;
    }
    await doSync();
  }
  async function doSync(){
    try{
      setStatus('syncing');
      const result=await syncManager.sync(currentData);
      if(result.pulled.count>0){
        const merged=syncManager.mergeRecords(result.pulled.records,currentData);
        onSyncComplete(merged);
        toast(`Синхронизировано: ↑${result.pushed.accepted} ↓${result.pulled.count}`);
      }else{
        toast(`Отправлено: ${result.pushed.accepted} записей`);
      }
      if(result.pushed.conflicts?.length>0)toast(`⚠ ${result.pushed.conflicts.length} конфликтов (сервер новее)`);
      setStatus('idle');setPendingCount(0);
    }catch(e){setStatus('error');toast(`Ошибка синхронизации: ${e.message}`);}
  }

  async function handleRollback(result){
    setShowHistory(false);
    // After rollback, pull the restored state
    try{
      setStatus('syncing');
      const pulled=await syncManager.pullOnly();
      const merged=syncManager.mergeRecords(pulled.records,{athletes:[],freestyleResults:[],baseResults:[],ageCatsF:currentData.ageCatsF,ageCatsB:currentData.ageCatsB});
      onSyncComplete(merged);
      setStatus('idle');
    }catch(e){setStatus('error');toast(`Ошибка загрузки после отката: ${e.message}`);}
  }

  const roleColor=role==='leader'?'#22c55e':role==='viewer'?'#3b82f6':'#64748b';
  const statusText=!isOnline?`🔴 Offline${pendingCount>0?` (${pendingCount})`:''}`
    :role==='leader'?(pendingCount>0?`⏳ Не синхр. (${pendingCount})`:(syncIndicator==='✓'?'✅ Сохранено':''))
    :role==='viewer'?(syncIndicator?`↓ ${syncIndicator}`:'👁 Наблюдение')
    :'';

  return <>
    <div className="sync-bar">
      <span className="sync-event-badge" onClick={()=>setShowEventSelector(true)}>
        {syncManager.eventId?`📋 ${syncManager.eventId}`:'⚙ Выбрать событие'}
      </span>
      {syncManager.isConfigured&&<>
        <button style={{padding:'4px 10px',borderRadius:8,border:'1px solid '+roleColor,background:role?roleColor+'22':'transparent',color:roleColor,fontSize:12,fontWeight:600,cursor:'pointer'}}
          onClick={()=>handleRoleChange(role==='leader'?'viewer':'leader')}>
          {role==='leader'?'🏆 Я сужу':role==='viewer'?'👁 Я смотрю':'⚡ Выбрать роль'}
        </button>
        <button className="btn btn-sm btn-secondary" onClick={()=>setShowHistory(true)} style={{fontSize:12}}>📜 История</button>
      </>}
      <button className={`btn btn-sm sync-btn sync-btn-${status}`} onClick={handleSync} disabled={status==='syncing'}>
        {status==='syncing'?'🔄 Синхронизация...':status==='error'?'❌ Повторить':'☁️ Синхронизировать'}
      </button>
      {statusText&&<span style={{fontSize:11,color:roleColor,fontWeight:500}}>{statusText}</span>}
      <span className={`sync-indicator ${isOnline?'online':'offline'}`}>{isOnline?'🟢':'🔴'}</span>
    </div>
    {showEventSelector&&<EventSelector
      syncManager={syncManager}
      onSelect={(eid)=>{syncManager.setEventId(eid);setShowEventSelector(false);setStatus('idle');}}
      onClose={()=>setShowEventSelector(false)}
      onCreateNew={()=>{setShowEventSelector(false);setShowCreateEvent(true);}}
    />}
    {showCreateEvent&&<CreateEventDialog
      syncManager={syncManager}
      onCreate={(evt)=>{syncManager.setEventId(evt.id);setShowCreateEvent(false);setStatus('idle');}}
      onClose={()=>setShowCreateEvent(false)}
    />}
    {showPreview&&<FirstSyncPreview
      previewData={previewData}
      localCounts={{athletes:currentData.athletes.length,freestyle_results:currentData.freestyleResults.length,base_results:currentData.baseResults.length}}
      onPush={()=>{setShowPreview(false);doSync();}}
      onPull={async()=>{
        setShowPreview(false);
        try{
          setStatus('syncing');
          const pulled=await syncManager.pullOnly();
          const merged=syncManager.mergeRecords(pulled.records,{athletes:[],freestyleResults:[],baseResults:[],ageCatsF:currentData.ageCatsF,ageCatsB:currentData.ageCatsB});
          onSyncComplete(merged);
          toast(`Загружено с сервера: ${pulled.count} записей`);
          setStatus('idle');
        }catch(e){setStatus('error');toast(`Ошибка: ${e.message}`);}
      }}
      onMerge={()=>{setShowPreview(false);doSync();}}
      onCancel={()=>setShowPreview(false)}
    />}
    {showHistory&&<VersionHistoryModal syncManager={syncManager} onRollback={handleRollback} onClose={()=>setShowHistory(false)} toast={toast}/>}
  </>;
}

/* ========== APP ========== */
function App(){
  const [tab,setTab]=useState(0);
  const [athletes,setAthletes]=useState(()=>loadLS("comp_athletes",[]));
  const [freestyleResults,setFreestyleResults]=useState(()=>loadLS("comp_freestyle_results",[]));
  const [baseResults,setBaseResults]=useState(()=>loadLS("comp_base_results",[]));
  const [ageCatsF,setAgeCatsF]=useState(()=>loadLS("comp_age_categories_freestyle",DEFAULT_AGE_CATS));
  const [ageCatsB,setAgeCatsB]=useState(()=>loadLS("comp_age_categories_base",DEFAULT_AGE_CATS));
  const [toastMsg,setToastMsg]=useState("");
  const [syncMgr]=useState(()=>new SyncManager());

  useEffect(()=>()=>syncMgr.destroy(),[]);

  useEffect(()=>saveLSTracked("comp_athletes",athletes,syncMgr),[athletes]);
  useEffect(()=>saveLSTracked("comp_freestyle_results",freestyleResults,syncMgr),[freestyleResults]);
  useEffect(()=>saveLSTracked("comp_base_results",baseResults,syncMgr),[baseResults]);
  useEffect(()=>saveLSTracked("comp_age_categories_freestyle",ageCatsF,syncMgr),[ageCatsF]);
  useEffect(()=>saveLSTracked("comp_age_categories_base",ageCatsB,syncMgr),[ageCatsB]);

  const showToast=useCallback((msg)=>setToastMsg(msg),[]);

  const handleSyncComplete=useCallback((merged)=>{
    setAthletes(merged.athletes);
    setFreestyleResults(merged.freestyleResults);
    setBaseResults(merged.baseResults);
    setAgeCatsF(merged.ageCatsF);
    setAgeCatsB(merged.ageCatsB);
  },[]);

  useEffect(()=>{
    function handleOnline(){
      if(syncMgr.isConfigured&&syncMgr.lastSyncAt){
        const last=new Date(syncMgr.lastSyncAt).getTime();
        if(Date.now()-last>5*60*1000)showToast('Соединение восстановлено');
      }
    }
    window.addEventListener('online',handleOnline);
    return()=>window.removeEventListener('online',handleOnline);
  },[]);

  return <>
    <div className="header">
      <h1>WU Протокол Соревнований</h1>
      <SyncBar syncManager={syncMgr} onSyncComplete={handleSyncComplete} currentData={{athletes,freestyleResults,baseResults,ageCatsF,ageCatsB}} toast={showToast}/>
      <a href="index.html">&larr; Калькулятор</a>
    </div>

    <div className="tabs">
      {TAB_NAMES.map((name,i)=><button key={i} className={tab===i?"active":""} onClick={()=>setTab(i)}>{name}</button>)}
    </div>

    <div className="container">
      {tab===0&&<AthletesTab athletes={athletes} setAthletes={setAthletes} clearResults={()=>{setFreestyleResults([]);setBaseResults([])}} syncManager={syncMgr}/>}
      {tab===1&&<JudgingTab athletes={athletes} freestyleResults={freestyleResults} setFreestyleResults={setFreestyleResults} baseResults={baseResults} setBaseResults={setBaseResults} toast={showToast}/>}
      {tab===2&&<ProtocolTab freestyleResults={freestyleResults} baseResults={baseResults}/>}
      {tab===3&&<WinnersTab athletes={athletes} freestyleResults={freestyleResults} baseResults={baseResults} ageCatsF={ageCatsF} setAgeCatsF={setAgeCatsF} ageCatsB={ageCatsB} setAgeCatsB={setAgeCatsB}/>}
      {tab===4&&<CertsTab athletes={athletes} freestyleResults={freestyleResults} baseResults={baseResults}/>}
    </div>

    <div className="footer">Калькулятор для спортсменов &rarr; <a href="index.html">index.html</a></div>

    {toastMsg&&<Toast msg={toastMsg} onDone={()=>setToastMsg("")}/>}
  </>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
