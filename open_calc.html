<script>
/* One-shot cache/SW purge to force fresh version (v10+). Removes self after. */
(function(){
  var MARK='wu_opencalc_purged_v10';
  if(localStorage.getItem(MARK))return;
  try{
    if(navigator.serviceWorker){navigator.serviceWorker.getRegistrations().then(function(rs){rs.forEach(function(r){r.unregister()})})}
    if(window.caches){caches.keys().then(function(ns){ns.forEach(function(n){caches.delete(n)})})}
  }catch(e){}
  localStorage.setItem(MARK,'1');
  setTimeout(function(){location.reload()},600);
})();
</script>

/* ── Fuzzy ── */
function lev(a,b){const m=a.length,n=b.length;if(!m)return n;if(!n)return m;const d=Array.from({length:m+1},(_,i)=>i);for(let j=1;j<=n;j++){let p=d[0];d[0]=j;for(let i=1;i<=m;i++){const t=d[i];d[i]=a[i-1]===b[j-1]?p:1+Math.min(p,d[i],d[i-1]);p=t;}}return d[m];}
function norm(s){return s.toLowerCase().replace(/ё/g,"е").replace(/[.\-_\/\\,;:!?()]/g," ").replace(/\s+/g," ").trim();}
function normNum(s){return(" "+norm(s)+" ").replace(/(?<=\s)(одну|одной|одного|одним|одном|одна|одно|один)(?=\s)/g,"1").replace(/(?<=\s)(двух|двум|двумя|двое|две|два)(?=\s)/g,"2").replace(/(?<=\s)(трех|трёх|трем|трём|тремя|трое|три)(?=\s)/g,"3").replace(/(?<=\s)(четырех|четырём|четырем|четырьмя|четыре)(?=\s)/g,"4").replace(/(?<=\s)(пяти|пятью|пять)(?=\s)/g,"5").replace(/(?<=\s)(шести|шестью|шесть)(?=\s)/g,"6").replace(/(?<=\s)(семи|семью|семь)(?=\s)/g,"7").replace(/(?<=\s)(восьми|восемью|восемь)(?=\s)/g,"8").replace(/(?<=\s)(девяти|девятью|девять)(?=\s)/g,"9").replace(/(?<=\s)(десяти|десятью|десять)(?=\s)/g,"10").replace(/\s+/g," ").trim();}
function stem(w){if(w.length<=3)return w;const endings=["ами","ями","ого","его","ому","ему","ыми","ими","ей","ий","ой","ый","ая","яя","ое","ее","ую","ю","ы","и","а","я","е","у","о","ь"];for(const e of endings){if(w.endsWith(e)&&w.length-e.length>=3)return w.slice(0,-e.length);}return w;}
function normStem(s){return normNum(s).split(" ").map(stem).join(" ");}
function buildIdx(els,syn){return els.map(el=>{const n=normNum(el.name),w=n.split(" "),sk=[];for(const[k,v]of Object.entries(syn))if(v===el.name)sk.push(normNum(k));return{el,n,w,sk};});}
function findBest(q,idx,th=0.45){const qn=normNum(q);if(!qn)return null;let bs=0,be=null;for(const{el,n,w,sk}of idx){if(n===qn)return{el,s:1,ex:true};for(const s of sk)if(s===qn)return{el,s:1,ex:true};if(n.includes(qn)){const s=qn.length/n.length*0.95;if(s>bs){bs=s;be=el;}}if(qn.length>2&&n.startsWith(qn+" ")){const s=Math.max(0.55,qn.length/n.length*1.2);if(s>bs){bs=Math.min(s,0.75);be=el;}}for(const s of sk){if(s.includes(qn)||qn.includes(s)){const sc=Math.min(qn.length,s.length)/Math.max(qn.length,s.length)*0.9;if(sc>bs){bs=sc;be=el;}}const d=lev(qn,s),ml=Math.max(qn.length,s.length),sc=ml>0?(1-d/ml):0;if(sc>bs){bs=sc;be=el;}}const qw=qn.split(" ");let mw=0;for(const qi of qw)for(const wi of w){const d=lev(qi,wi),ml=Math.max(qi.length,wi.length);if(ml>0&&(1-d/ml)>0.7){mw++;break;}}if(qw.length>0){const ws=mw/Math.max(qw.length,w.length)*0.85;if(ws>bs){bs=ws;be=el;}}const d=lev(qn,n),ml=Math.max(qn.length,n.length),s=ml>0?(1-d/ml)*0.8:0;if(s>bs){bs=s;be=el;}}/* Stem match pass */const qs=normStem(q);if(qs){for(const{el,n}of idx){const ns=n.split(" ").map(stem).join(" ");if(ns===qs){if(bs<0.92){bs=0.92;be=el;}}else if(ns.includes(qs)||qs.includes(ns)){const sc=Math.min(qs.length,ns.length)/Math.max(qs.length,ns.length)*0.85;if(sc>bs){bs=sc;be=el;}}}}if(bs>=th&&be)return{el:be,s:bs,ex:false};return null;}

/* ── Balance ── */
function bal(sC,dC,lv){const mx=Math.max(sC,dC),mn=Math.min(sC,dC);if(mx===0)return 0;const r=(mx+mn)/Math.sqrt(2*(mx*mx+mn*mn));return(1-Math.acos(Math.min(1,Math.max(-1,r)))/Math.acos(Math.SQRT2/2))*lv;}

const SLOT_KW=[
{ps:["группа а","группа a","связка 1","связка один","связка 1н","первая связка","первая группа","1 связка","1 группа","группа 1"],sl:0},
{ps:["группа с","группа c","связка 2","связка два","связка 2а","вторая связка","вторая группа","2 связка","2 группа","группа 2"],sl:1},
{ps:["группа е","группа e","связка 3","связка три","связка 3и","третья связка","третья группа","3 связка","3 группа","группа 3"],sl:2},
{ps:["группа г","группа g","связка 4","связка четыре","связка 4е","четвёртая связка","четвертая связка","четвертая группа","4 связка","4 группа","группа 4"],sl:3},
{ps:["связка 5","связка пять","пятая связка","5 связка","группа 5"],sl:4},
{ps:["связка 6","связка шесть","шестая связка","6 связка","группа 6"],sl:5},
{ps:["связка 7","связка семь","седьмая связка","7 связка","группа 7"],sl:6},
{ps:["связка 8","связка восемь","восьмая связка","8 связка","группа 8"],sl:7},
{ps:["связка 9","связка девять","девятая связка","9 связка","группа 9"],sl:8},
{ps:["связка 10","связка десять","десятая связка","10 связка","группа 10"],sl:9}];

function parseVoice(text){
  const lo=norm(text);const mk=[];
  for(const{ps,sl}of SLOT_KW)for(const p of ps){let i=lo.indexOf(p);while(i!==-1){mk.push({pos:i,len:p.length,sl});i=lo.indexOf(p,i+1);}}
  mk.sort((a,b)=>a.pos-b.pos);
  if(!mk.length)return[{sl:0,raw:text.trim()}];
  const r=[];for(let i=0;i<mk.length;i++){const s=mk[i].pos+mk[i].len;const e=i<mk.length-1?mk[i+1].pos:lo.length;const c=lo.substring(s,e).trim();if(c)r.push({sl:mk[i].sl,raw:c});}return r;
}
function splitEls(raw){return raw.split(/\s*(?:,|потом|далее|затем|дальше|следующий|следующая|и\s+потом)\s*/i).map(s=>s.trim()).filter(s=>s.length>0);}
function smartSplit(raw,idx){
  const quoted=[];
  const QTAG="\x00";
  const stripped=raw.replace(/[""«»"\u201c\u201d](.*?)[""«»"\u201c\u201d]/g,(_,g)=>{quoted.push(g.trim());return " "+QTAG+quoted.length+QTAG+" ";});
  const chunks=splitEls(stripped);const all=[];
  for(const chunk of chunks){
    const parts=chunk.split(new RegExp(QTAG+"(\\d+)"+QTAG));
    for(let p=0;p<parts.length;p++){
      if(p%2===1){all.push(quoted[parseInt(parts[p])-1]);continue;}
      const words=norm(parts[p]).split(/\s+/).filter(Boolean);
      if(!words.length)continue;
      let i=0;
      while(i<words.length){
        let found=false;
        const maxLen=Math.min(15,words.length-i);
        for(let len=maxLen;len>=1;len--){
          const phrase=words.slice(i,i+len).join(" ");
          const th=len>=4?0.4:0.55;
          const m=findBest(phrase,idx,th);
          if(m&&m.s>=th){all.push(phrase);i+=len;found=true;break;}
        }
        if(!found){all.push(words[i]);i++;}
      }
    }
  }
  return all;
}

/* ── Открытые соревнования: авто-подбор разряда по max(tot) ── */
/* Freestyle-уровни (1..10), без Biginner/Diligent (это base). */
const OPEN_LEVELS=LEVELS.filter(l=>!/Biginner|Diligent/.test(l.name));

/* Для каждого разряда N считаем сумму элементов из диапазона [N-1, N+2.5].
   Берём разряд с максимальной итоговой суммой (raw+balance-penalty).
   ДСК → tot=0. */
function calcOpenScore(uniqueEls, penaltyScore, isDQ){
  if(isDQ){
    return{credited:[],sC:0,dC:0,raw:0,b:0,tot:0,penaltyScore,level:null,levelRange:null,tries:[]};
  }
  const tries=OPEN_LEVELS.map(lvObj=>{
    const lv=lvObj.num;
    const credited=uniqueEls.filter(e=>e.score>=lv-1&&e.score<=lv+2.5);
    const sC=credited.filter(e=>e.cat==="Статика").length;
    const dC=credited.filter(e=>e.cat==="Динамика").length;
    const raw=credited.reduce((s,e)=>s+e.score,0);
    const b=bal(sC,dC,lv);
    const tot=raw+b-penaltyScore;
    return{level:lvObj,credited,sC,dC,raw,b,tot};
  });
  /* max(tot); при равенстве — выше номер разряда */
  let best=tries[0];
  for(const t of tries){if(t.tot>best.tot||(t.tot===best.tot&&t.level.num>best.level.num))best=t;}
  return{
    credited:best.credited,sC:best.sC,dC:best.dC,raw:best.raw,b:best.b,tot:best.tot,
    penaltyScore,level:best.level,
    levelRange:[best.level.num-1,best.level.num+2.5],
    tries
  };
}

        const c=canvasRef.current,cx=c.getContext("2d"),w=c.width,h=c.height;
        cx.clearRect(0,0,w,h);

        for(let i=0;i<bars;i++){const bh=(data[i]/255)*h;cx.fillStyle="#a855f7";cx.fillRect(i*bw,h-bh,Math.max(1,bw-1),bh);}
        rafRef.current=requestAnimationFrame(draw);
      };
      draw();
    }catch(e){/* viz best-effort */}
  };
  const stopViz=()=>{
    if(rafRef.current){cancelAnimationFrame(rafRef.current);rafRef.current=null;}

  const process=useCallback(()=>{

  const au=uri!==null?unr[uri]:null;
  const[editCI,setEditCI]=useState(null);const[editMI,setEditMI]=useState(null);const[editSq,setEditSq]=useState("");
  const editEls=useMemo(()=>editSq?ELS.filter(e=>norm(e.name).includes(norm(editSq))).slice(0,30):ELS.slice(0,30),[editSq]);
  const startEdit=(ci,mi,q)=>{setEditCI(ci);setEditMI(mi);setEditSq(q);setUri(null);setSq("");};
  const applyEdit=(el)=>{
    const origQ=parsed[editCI]?.ms[editMI]?.q;
    const wasMatched=!!parsed[editCI]?.ms[editMI]?.el;
    if(origQ&&!parsed[editCI].ms[editMI].el){onAddSyn(origQ,el.name);}
    setParsed(parsed.map((c,i)=>i!==editCI?c:{...c,ms:c.ms.map((m,j)=>j!==editMI?m:{...m,el,m:{el,s:1,ex:true}})}));
    setEditCI(null);setEditMI(null);setEditSq("");
    /* user correction → flag corrected */
    if(lastVoiceLogId&&origQ){postVoiceFlag(lastVoiceLogId,"corrected",{q:origQ,from:wasMatched?(parsed[editCI].ms[editMI].el?.name||null):null,to:el.name});}
  };
  const cancelEdit=()=>{setEditCI(null);setEditMI(null);setEditSq("");};
  const removeEl=(ci,mi)=>{setParsed(parsed.map((c,i)=>i!==ci?c:{...c,ms:c.ms.filter((_,j)=>j!==mi)}));};
  const mergeEls=(ci,mi)=>{
    setParsed(parsed.map((c,i)=>{if(i!==ci)return c;const ms=[...c.ms];if(mi>=ms.length-1)return c;
      const merged=ms[mi].q+" "+ms[mi+1].q;const m=findBest(merged,sidx,0.3);
      ms.splice(mi,2,{q:merged,m:m||null,el:m?.el||null});return{...c,ms};}));
  };
  const resolve=(ci,mi,el)=>{
    const q=parsed[ci].ms[mi].q;onAddSyn(q,el.name);
    setParsed(parsed.map((c,i)=>i!==ci?c:{...c,ms:c.ms.map((m,j)=>j!==mi?m:{...m,el,m:{el,s:1,ex:true}})}));
    setUri(null);setSq("");
    /* unmatched phrase resolved → flag corrected */
    if(lastVoiceLogId){postVoiceFlag(lastVoiceLogId,"corrected",{q,from:null,to:el.name});}
  };

  const apply=()=>{
    if(!parsed)return;const maxSl=Math.max(curSlots.length-1,...parsed.map(p=>p.sl));const ns=Array.from({length:maxSl+1},(_, i)=>i<curSlots.length?[...curSlots[i]]:[]);const ex=new Set(curSlots.flat().map(e=>e.name));
    const pendingPen=[];let pendingDQ=false;
    parsed.forEach(({sl,ms})=>ms.forEach(({el,penalty})=>{
      if(el&&!ex.has(el.name)){
        const elementIdx=ns[sl].length;
        ns[sl].push(el);ex.add(el.name);
        if(penalty==="dirty"||penalty==="fall")pendingPen.push({type:penalty,slotIdx:sl,elementIdx,elementName:el.name});
        else if(penalty==="dq")pendingDQ=true;
      }
    }));
    const srcText=tx||ti;
    const matched=[];const missed=[];
    parsed.forEach(({sl,ms})=>ms.forEach(({q,el})=>{if(el)matched.push({q,name:el.name,sl});else missed.push({q,sl});}));
    setLastResult({text:srcText,matched,missed,slots:parsed.map(p=>p.sl)});
    setShowReview(missed.length>0);
    onApply(ns);
    if(pendingDQ&&onPenalty)onPenalty("dq");
    if(onPenaltyEvent)pendingPen.forEach(p=>onPenaltyEvent(p.type,p.slotIdx,p.elementIdx,p.elementName));
    setParsed(null);setTx("");setTi("");
    /* mark apply timestamp for retry detection */
    lastApplyAt.current=Date.now();
  };

  const fEls=useMemo(()=>sq?ELS.filter(e=>norm(e.name).includes(norm(sq))).slice(0,30):ELS.slice(0,30),[sq]);

  const processText=()=>{if(!ti.trim())return;setTx(ti);const lo=norm(ti);if(onPenalty){const penKw=[{p:["жесткое падение","жёсткое падение","дисквалификация"],t:"dq"},{p:["падение","упал","упала"],t:"fall"},{p:["грязно","бланш","грязное","штраф минус 2","минус 2 балла","минус два"],t:"dirty"}];for(const{p,t}of penKw)for(const kw of p)if(lo.includes(kw)){onPenalty(t);break;}}const chunks=parseVoice(ti);const res=chunks.map(({sl,raw})=>{const qs=smartSplit(raw,sidx);const ms=qs.map(q=>{const m=findBest(q,sidx);return{q,m,el:m?.el||null};});return{sl,ms};});setParsed(res);};

  const processAI=async(text)=>{
    const src=text||(tx||ti).trim();if(!src){setStatus("Нет текста");return;}
    const isVoiceFlow=!text&&!!tx&&!!recordingStartedAt.current;
    setAiLoading(true);setStatus("AI анализирует...");
    try{
      const data=await aiParse(src);
      if(data.elements&&data.elements.length){
        lastAiParsed.current=data;
        const voiceChunks=parseVoice(src);
        const aiEls=data.elements.map(ai=>{const el=ELS.find(e=>e.name===ai.name);return{q:ai.spoken||ai.name,m:el?{el,s:1,ex:true}:null,el:el||null,confidence:ai.confidence,penalty:ai.penalty||null};});
        if(voiceChunks.length>1||voiceChunks[0].sl!==0||voiceChunks.length===1&&voiceChunks[0].raw!==src.trim()){
          const loSrc=norm(src);const slotRanges=[];
          for(let i=0;i<voiceChunks.length;i++){
            const vc=voiceChunks[i];const rawLo=norm(vc.raw);
            const startPos=loSrc.indexOf(rawLo);
            slotRanges.push({sl:vc.sl,start:startPos,end:startPos>=0?startPos+rawLo.length:loSrc.length});
          }
          const buckets={};slotRanges.forEach(sr=>{if(!buckets[sr.sl])buckets[sr.sl]=[];});
          const assigned=new Set();
          for(let ei=0;ei<aiEls.length;ei++){
            const ae=aiEls[ei];const aiSlot=data.elements[ei].slot;
            if(aiSlot!=null&&buckets[aiSlot]!=null){buckets[aiSlot].push(ae);assigned.add(ei);continue;}
            const eName=norm(ae.q);const elName=ae.el?norm(ae.el.name):"";
            let bestSl=voiceChunks[0].sl;
            for(const sr of slotRanges){
              const chunkText=loSrc.substring(sr.start,sr.end);
              if(chunkText.includes(eName)||(elName&&chunkText.includes(elName))){bestSl=sr.sl;break;}
            }
            if(!buckets[bestSl])buckets[bestSl]=[];
            buckets[bestSl].push(ae);assigned.add(ei);
          }
          for(let ei=0;ei<aiEls.length;ei++){
            if(!assigned.has(ei)){const lastSl=voiceChunks[voiceChunks.length-1].sl;if(!buckets[lastSl])buckets[lastSl]=[];buckets[lastSl].push(aiEls[ei]);}
          }
          const res=Object.entries(buckets).filter(([_,ms])=>ms.length>0).map(([sl,ms])=>({sl:parseInt(sl),ms}));
          res.sort((a,b)=>a.sl-b.sl);
          setParsed(res);
          if(isVoiceFlow){const dur=Date.now()-recordingStartedAt.current;const payload=buildVoiceLogPayload({source:"judge",whisper_text:lastWhisperText.current||src,ai_parsed:data,parsed:res,duration_ms:dur});postVoiceLog(payload).then(id=>{if(id)setLastVoiceLogId(id);});}
        }else{
          const single=[{sl:0,ms:aiEls}];
          setParsed(single);
          if(isVoiceFlow){const dur=Date.now()-recordingStartedAt.current;const payload=buildVoiceLogPayload({source:"judge",whisper_text:lastWhisperText.current||src,ai_parsed:data,parsed:single,duration_ms:dur});postVoiceLog(payload).then(id=>{if(id)setLastVoiceLogId(id);});}
        }
        setStatus("AI нашёл "+data.elements.length+" элементов");
      }else{setStatus("AI не нашёл элементов");}
    }catch(e){setStatus("Ошибка: "+e.message);}
    finally{setAiLoading(false);}
  };

  const voiceAvail=!!navigator.mediaDevices;

  return(<div style={{marginBottom:20,background:"linear-gradient(145deg,#1e293b,#0f172a)",borderRadius:16,border:"1px solid #334155",overflow:"hidden"}}>
    <div style={{padding:"16px 20px",borderBottom:"1px solid #1e293b",display:"flex",alignItems:"center",gap:12}}>
      <div style={{width:36,height:36,borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",background:on?"rgba(239,68,68,0.2)":"rgba(20,184,166,0.15)",border:`1px solid ${on?"rgba(239,68,68,0.4)":"rgba(20,184,166,0.3)"}`,animation:on?"pulse 1.5s infinite":"none"}}><span style={{fontSize:20}}>{on?"🔴":voiceAvail?"🎙️":"⌨️"}</span></div>
      <div style={{flex:1}}><div style={{fontSize:14,fontWeight:600,color:"#e2e8f0"}}>{voiceAvail?"Голосовой ввод":"Ввод связок"}</div><div style={{fontSize:11,color:"#64748b"}}>{on?"Говорите...":voiceAvail?"Нажмите Старт":"Текстовый режим"}</div></div>
      {voiceAvail&&<button onClick={on?stop:start} style={{padding:"8px 20px",borderRadius:10,border:`1px solid ${on?"rgba(239,68,68,0.3)":"rgba(20,184,166,0.3)"}`,cursor:"pointer",fontSize:13,fontWeight:600,background:on?"rgba(239,68,68,0.2)":"rgba(20,184,166,0.15)",color:on?"#ef4444":"#14b8a6"}}>{on?"Стоп":"Старт"}</button>}
    </div>

    {status&&<div style={{padding:"6px 20px",fontSize:11,color:status.startsWith("Ошибка")?"#ef4444":"#64748b",background:status.startsWith("Ошибка")?"rgba(239,68,68,0.05)":"transparent"}}>{status}</div>}

    {/* Live waveform during recording */}
    {on&&<div style={{padding:"4px 20px 8px"}}><canvas ref={canvasRef} width={300} height={60} style={{width:"100%",maxWidth:"100%",height:"60px",background:"#0f172a",borderRadius:"8px",border:"1px solid #1e293b"}}/></div>}

    {!tx&&!on&&!parsed&&(<div style={{padding:"16px 20px"}}><div style={{fontSize:12,color:"#64748b",lineHeight:1.6,marginBottom:12}}><div style={{fontWeight:600,color:"#94a3b8",marginBottom:6}}>Как пользоваться:</div>{voiceAvail?"Говорите или пишите":"Пишите"}: <span style={{color:"#14b8a6"}}>"связка один"</span> — топорик, бочка — <span style={{color:"#f59e0b"}}>"связка два"</span> — склёпка, замок...<div style={{marginTop:6,color:"#475569"}}>Разделяйте: запятые, "потом", "далее"</div></div>
      <textarea value={ti} onChange={e=>setTi(e.target.value)} placeholder='связка один топорик потом бочка, связка два замок потом солнышко' rows={3} style={{width:"100%",padding:"10px 14px",background:"#0f172a",border:"1px solid #334155",borderRadius:10,color:"#e2e8f0",fontSize:13,outline:"none",boxSizing:"border-box",resize:"vertical",fontFamily:"inherit",lineHeight:1.5}}/>
      {ti.trim()&&<div style={{display:"flex",gap:8,marginTop:10}}>
        <button onClick={processText} style={{flex:1,padding:"10px",borderRadius:10,border:"1px solid rgba(20,184,166,0.3)",cursor:"pointer",fontSize:13,fontWeight:600,background:"rgba(20,184,166,0.15)",color:"#14b8a6"}}>Локально</button>
        <button onClick={()=>processAI(ti)} disabled={aiLoading} style={{flex:1,padding:"10px",borderRadius:10,border:"1px solid rgba(168,85,247,0.3)",cursor:"pointer",fontSize:13,fontWeight:600,background:"rgba(168,85,247,0.15)",color:"#a855f7",opacity:aiLoading?0.5:1}}>{aiLoading?"...":"AI разбор"}</button>
      </div>}
    </div>)}

    {(tx||itx)&&!parsed&&(<div style={{padding:"12px 20px"}}><div style={{fontSize:11,color:"#64748b",fontWeight:600,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.05em"}}>{on?"Распознано:":"Распознано (редактируйте):"}</div>
      {on?(<div style={{padding:12,background:"#0f172a",borderRadius:10,border:"1px solid #1e293b",fontSize:13,color:"#e2e8f0",lineHeight:1.6,minHeight:40}}>{tx}{itx&&<span style={{color:"#64748b",fontStyle:"italic"}}> {itx}</span>}</div>):(
        <textarea value={tx} onChange={e=>setTx(e.target.value)} rows={Math.max(2,Math.ceil(tx.length/40))} style={{width:"100%",padding:"10px 14px",background:"#0f172a",border:"1px solid #334155",borderRadius:10,color:"#e2e8f0",fontSize:13,outline:"none",boxSizing:"border-box",resize:"vertical",fontFamily:"inherit",lineHeight:1.5}}/>
      )}
      {!on&&tx&&<div style={{display:"flex",gap:8,marginTop:10}}>
        <button onClick={process} style={{flex:1,padding:"10px",borderRadius:10,border:"1px solid rgba(20,184,166,0.3)",cursor:"pointer",fontSize:13,fontWeight:600,background:"rgba(20,184,166,0.15)",color:"#14b8a6"}}>Локально</button>
        <button onClick={()=>processAI()} disabled={aiLoading} style={{flex:1,padding:"10px",borderRadius:10,border:"1px solid rgba(168,85,247,0.3)",cursor:"pointer",fontSize:13,fontWeight:600,background:"rgba(168,85,247,0.15)",color:"#a855f7",opacity:aiLoading?0.5:1}}>{aiLoading?"...":"AI разбор"}</button>
      </div>}
    </div>)}

    {parsed&&(<div style={{padding:"12px 20px 20px"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><span style={{fontSize:11,color:"#64748b",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em"}}>Найденные элементы:</span><button onClick={()=>{setParsed(null);setEditCI(null);setEditMI(null);}} style={{padding:"4px 10px",borderRadius:6,border:"1px solid #334155",background:"#1e293b",color:"#94a3b8",fontSize:11,cursor:"pointer"}}>Редактировать текст</button></div>
      {parsed.map((ch,ci)=>(<div key={ci} style={{marginBottom:12}}><div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}><div style={{width:8,height:8,borderRadius:2,background:SC[ch.sl%SC.length]}}/><select value={ch.sl} onChange={e=>{const ns=parseInt(e.target.value);setParsed(parsed.map((c,i)=>i===ci?{...c,sl:ns}:c));}} style={{fontSize:12,fontWeight:600,color:SC[ch.sl%SC.length],background:"transparent",border:"1px solid #334155",borderRadius:6,padding:"2px 6px",cursor:"pointer",outline:"none"}}>{SN.map((n,si)=>(<option key={si} value={si} style={{background:"#1e293b",color:"#e2e8f0"}}>{n}</option>))}</select></div>
        <div style={{display:"flex",flexDirection:"column",gap:2}}>{ch.ms.map((m,mi)=>(<React.Fragment key={mi}>
          <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:m.el?"rgba(20,184,166,0.06)":"rgba(239,68,68,0.06)",border:`1px solid ${m.el?"rgba(20,184,166,0.2)":"rgba(239,68,68,0.2)"}`,borderRadius:10}}><span style={{fontSize:12,color:"#64748b",flex:"0 0 auto"}}>"{m.q}"</span><span style={{fontSize:14,color:"#475569"}}>→</span>
          {m.el?(<div style={{flex:1,display:"flex",alignItems:"center",gap:6,minWidth:0}}>
            <span onClick={()=>startEdit(ci,mi,m.q)} style={{fontSize:12,color:"#e2e8f0",cursor:"pointer",textDecoration:"underline",textDecorationStyle:"dotted",textUnderlineOffset:"3px",textDecorationColor:"#475569",lineHeight:1.3}}>{m.el.name}</span>
            <span style={{fontSize:11,fontWeight:700,color:"#f59e0b",flexShrink:0}}>{m.el.score}</span>
            {m.m&&!m.m.ex&&<span style={{fontSize:10,color:"#64748b",flexShrink:0}}>~{Math.round(m.m.s*100)}%</span>}
            <span onClick={()=>removeEl(ci,mi)} style={{cursor:"pointer",color:"#64748b",fontSize:14,lineHeight:1,marginLeft:"auto",flexShrink:0}}>×</span>
          </div>):(<div style={{flex:1,display:"flex",alignItems:"center",gap:6}}><button onClick={()=>{const i=unr.findIndex(u=>u.ci===ci&&u.mi===mi);setUri(i>=0?i:null);setSq(m.q);}} style={{flex:1,padding:"4px 10px",borderRadius:8,border:"1px solid rgba(239,68,68,0.3)",background:"rgba(239,68,68,0.1)",color:"#ef4444",fontSize:12,cursor:"pointer",textAlign:"left"}}>Выбрать элемент</button><button onClick={()=>startEdit(ci,mi,m.q)} style={{padding:"4px 8px",borderRadius:8,border:"1px solid rgba(168,85,247,0.3)",background:"rgba(168,85,247,0.1)",color:"#a855f7",fontSize:11,cursor:"pointer",whiteSpace:"nowrap"}}>Найти</button></div>)}
          </div>
          {mi<ch.ms.length-1&&(<div style={{display:"flex",justifyContent:"center"}}><button onClick={()=>mergeEls(ci,mi)} style={{padding:"2px 12px",borderRadius:6,border:"1px dashed #334155",background:"transparent",color:"#64748b",fontSize:10,cursor:"pointer",lineHeight:1.2}} title="Объединить с нижним">склеить</button></div>)}
        </React.Fragment>))}</div></div>))}

      {au&&(<div style={{marginTop:12,padding:16,background:"#0f172a",borderRadius:12,border:"1px solid #f59e0b"}}><div style={{fontSize:13,fontWeight:600,color:"#f59e0b",marginBottom:8}}>Что за элемент: "{au.q}"?</div>
        <input value={sq} onChange={e=>setSq(e.target.value)} placeholder="Поиск в базе..." style={{width:"100%",padding:"8px 12px",background:"#1e293b",border:"1px solid #334155",borderRadius:8,color:"#e2e8f0",fontSize:13,outline:"none",boxSizing:"border-box",marginBottom:8}}/>
        <div style={{maxHeight:200,overflowY:"auto"}}>{fEls.map(el=>(<div key={el.name} onClick={()=>resolve(au.ci,au.mi,el)} style={{padding:"6px 10px",cursor:"pointer",display:"flex",alignItems:"flex-start",gap:6,borderBottom:"1px solid #1e293b",fontSize:12,color:"#cbd5e1"}} onMouseEnter={e=>e.currentTarget.style.background="#334155"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}><span style={{flex:1,lineHeight:1.4}}>{el.name}</span><span style={{display:"flex",gap:4,alignItems:"center",flexShrink:0}}><span style={{fontSize:10,padding:"1px 5px",borderRadius:4,background:el.cat==="Статика"?"rgba(20,184,166,0.15)":"rgba(245,158,11,0.15)",color:el.cat==="Статика"?"#14b8a6":"#f59e0b"}}>{el.cat==="Статика"?"С":"Д"}</span><span style={{fontWeight:700,color:"#f59e0b"}}>{el.score}</span></span></div>))}</div>
        <button onClick={()=>{setUri(null);setSq("");}} style={{marginTop:8,padding:"6px 14px",borderRadius:8,border:"1px solid #334155",background:"#1e293b",color:"#94a3b8",fontSize:12,cursor:"pointer"}}>Пропустить</button>
      </div>)}

      {editCI!==null&&(<div style={{marginTop:12,padding:16,background:"#0f172a",borderRadius:12,border:"1px solid #14b8a6"}}><div style={{fontSize:13,fontWeight:600,color:"#14b8a6",marginBottom:4}}>{parsed[editCI]?.ms[editMI]?.el?"Заменить элемент:":"Выбрать элемент:"}</div>{!parsed[editCI]?.ms[editMI]?.el&&<div style={{fontSize:11,color:"#a855f7",marginBottom:8}}>Синоним "{parsed[editCI]?.ms[editMI]?.q}" сохранится</div>}
        <input value={editSq} onChange={e=>setEditSq(e.target.value)} placeholder="Поиск в базе..." style={{width:"100%",padding:"8px 12px",background:"#1e293b",border:"1px solid #334155",borderRadius:8,color:"#e2e8f0",fontSize:13,outline:"none",boxSizing:"border-box",marginBottom:8}}/>
        <div style={{maxHeight:200,overflowY:"auto"}}>{editEls.map(el=>(<div key={el.name} onClick={()=>applyEdit(el)} style={{padding:"6px 10px",cursor:"pointer",display:"flex",alignItems:"flex-start",gap:6,borderBottom:"1px solid #1e293b",fontSize:12,color:"#cbd5e1"}} onMouseEnter={e=>e.currentTarget.style.background="#334155"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}><span style={{flex:1,lineHeight:1.4}}>{el.name}</span><span style={{display:"flex",gap:4,alignItems:"center",flexShrink:0}}><span style={{fontSize:10,padding:"1px 5px",borderRadius:4,background:el.cat==="Статика"?"rgba(20,184,166,0.15)":"rgba(245,158,11,0.15)",color:el.cat==="Статика"?"#14b8a6":"#f59e0b"}}>{el.cat==="Статика"?"С":"Д"}</span><span style={{fontWeight:700,color:"#f59e0b"}}>{el.score}</span></span></div>))}</div>
        <button onClick={cancelEdit} style={{marginTop:8,padding:"6px 14px",borderRadius:8,border:"1px solid #334155",background:"#1e293b",color:"#94a3b8",fontSize:12,cursor:"pointer"}}>Отмена</button>
      </div>)}

      {editCI===null&&unr.length===0&&parsed.some(c=>c.ms.some(m=>m.el))&&(<div style={{marginTop:12,display:"flex",gap:8,alignItems:"stretch"}}>
        <button onClick={apply} style={{flex:1,padding:"12px",borderRadius:12,border:"none",cursor:"pointer",fontSize:14,fontWeight:700,background:"linear-gradient(135deg,#14b8a6,#0d9488)",color:"#020617"}}>Применить связки</button>
        <button
          onClick={()=>{if(!lastVoiceLogId||feedbackAck)return;postVoiceFlag(lastVoiceLogId,'bad');setFeedbackAck(true);setTimeout(()=>setFeedbackAck(false),2000);}}
          disabled={!lastVoiceLogId||feedbackAck}
          title={lastVoiceLogId?"Сообщить, что распознано неверно":"Лог недоступен"}
          style={{padding:"12px 14px",borderRadius:12,border:"1px solid "+(feedbackAck?"#22c55e":"#3a3a3a"),background:"transparent",color:feedbackAck?"#22c55e":"#8a8a8a",fontSize:12,fontWeight:500,cursor:lastVoiceLogId&&!feedbackAck?"pointer":"not-allowed",opacity:lastVoiceLogId?1:0.5,whiteSpace:"nowrap",transition:"all .2s"}}
        >{feedbackAck?"Спасибо, учтём":"✍ исправить"}</button>
      </div>)}
      {unr.length>0&&(<div style={{marginTop:8,fontSize:12,color:"#f59e0b",textAlign:"center"}}>Осталось определить: {unr.length} элемент(ов)</div>)}
    </div>)}

    {lastResult&&(<div style={{borderTop:"1px solid #1e293b"}}>
      <button onClick={()=>setShowReview(!showReview)} style={{width:"100%",padding:"10px 20px",background:"transparent",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",color:lastResult.missed.length>0?"#f59e0b":"#64748b",fontSize:12}}>
        <span>{lastResult.missed.length>0?`Пропущено: ${lastResult.missed.length}`:"Все элементы распознаны"} — текст</span>
        <span style={{transform:showReview?"rotate(180deg)":"none",transition:"transform 0.2s"}}>&#9660;</span>
      </button>
      {showReview&&(<div style={{padding:"0 20px 16px"}}>
        <div style={{padding:12,background:"#0f172a",borderRadius:10,border:"1px solid #334155",fontSize:12,color:"#94a3b8",lineHeight:1.6,marginBottom:10,whiteSpace:"pre-wrap"}}>{lastResult.text}</div>

  const[showV,setShowV]=useState(false);const[showAI,setShowAI]=useState(false);const[showBreak,setShowBreak]=useState(false);
  /* penalties.events: [{id, type:"dirty"|"fall", slotIdx:int|null, elementIdx:int|null, elementName:string|null, note:string|null, createdAt}] */
  const[penalties,setPenalties]=useState({events:[],dq:false});
  const[penaltyPicker,setPenaltyPicker]=useState(null); /* null | {type:"dirty"|"fall"} */
  const[selAthlete,setSelAthlete]=useState("");
  const[combo,setCombo]=useState(0);

  const[toast,setToast]=useState("");
  /* Участники из open_athletes: freestyle===true && present!==false (см. getOpenAthletes) */
  const compAthletes=useMemo(()=>getOpenAthletes(),[]);
  /* Голосовой addPenalty — без привязки к элементу (slotIdx=null). Ручная привязка делается через penaltyPicker UI. */
  const addPenalty=useCallback((type)=>{
    if(type==="dq"){setPenalties(p=>({...p,dq:true}));return;}
    setPenalties(p=>({...p,events:[...p.events,{id:Date.now()+Math.random(),type,slotIdx:null,elementIdx:null,elementName:null,note:null,createdAt:new Date().toISOString()}]}));
  },[]);
  const addPenaltyEvent=useCallback((type,slotIdx,elementIdx,elementName,note)=>{
    setPenalties(p=>({...p,events:[...p.events,{id:Date.now()+Math.random(),type,slotIdx,elementIdx,elementName,note:note||null,createdAt:new Date().toISOString()}]}));
  },[]);
  const removePenaltyEvent=useCallback((id)=>{
    setPenalties(p=>({...p,events:p.events.filter(e=>e.id!==id)}));
  },[]);
  const[syn,setSyn]=useState(()=>LS.get("wu-syn")||{});
  const addSyn=useCallback((k,v)=>{const ns={...syn,[norm(k)]:v};setSyn(ns);LS.set("wu-syn",ns);},[syn]);

  const penaltyScore=useMemo(()=>{
    const d=penalties.events.filter(e=>e.type==="dirty").length;
    const f=penalties.events.filter(e=>e.type==="fall").length;
    return d*2+f*4;
  },[penalties.events]);
  const dirtyCount=useMemo(()=>penalties.events.filter(e=>e.type==="dirty").length,[penalties.events]);
  const fallCount=useMemo(()=>penalties.events.filter(e=>e.type==="fall").length,[penalties.events]);

  /* Deduplicated elements from all slots */
  const allRaw=useMemo(()=>slots.flat(),[slots]);
  const all=useMemo(()=>{const seen=new Set();return allRaw.filter(e=>{if(seen.has(e.name))return false;seen.add(e.name);return true;});},[allRaw]);

  /* Простой подсчёт для открытых соревнований (без уровней) */

    {slots.length<10&&<button onClick={addSlot} style={{width:"100%",padding:"12px",borderRadius:12,border:"1px dashed rgba(20,184,166,0.3)",background:"transparent",color:"#14b8a6",fontSize:13,fontWeight:600,cursor:"pointer",marginBottom:16}}>+ Добавить связку</button>}

    {/* Penalties — событийная модель с привязкой к элементу */}
    <div style={{marginTop:16,marginBottom:8,padding:16,background:"linear-gradient(145deg,#1e293b,#0f172a)",borderRadius:16,border:"1px solid #334155"}}>
      <div style={{fontSize:12,color:"#ef4444",marginBottom:12,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em"}}>Штрафы ({dirtyCount+fallCount})</div>

      {/* Кнопки добавления */}
      <div style={{display:"flex",gap:8,marginBottom:penalties.events.length>0?12:0}}>
        <button onClick={()=>setPenaltyPicker({type:"dirty"})} style={{flex:1,padding:"10px",borderRadius:10,border:"1px solid rgba(239,68,68,0.3)",background:"rgba(239,68,68,0.08)",color:"#ef4444",fontSize:13,fontWeight:600,cursor:"pointer"}}>+ Грязь −2</button>
        <button onClick={()=>setPenaltyPicker({type:"fall"})} style={{flex:1,padding:"10px",borderRadius:10,border:"1px solid rgba(239,68,68,0.3)",background:"rgba(239,68,68,0.08)",color:"#ef4444",fontSize:13,fontWeight:600,cursor:"pointer"}}>+ Падение −4</button>
      </div>

      {/* Список событий */}
      {penalties.events.length>0&&<div style={{marginBottom:12}}>
        {penalties.events.map(ev=>(<div key={ev.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 10px",marginBottom:6,background:"rgba(239,68,68,0.06)",borderRadius:8,border:"1px solid rgba(239,68,68,0.15)"}}>
          <div style={{fontSize:12,color:"#e2e8f0"}}>
            <span style={{color:"#ef4444",fontWeight:700}}>{ev.type==="dirty"?"Грязь":"Падение"}</span>
            <span style={{color:"#64748b"}}> — </span>
            {ev.elementName?<span>{SN[ev.slotIdx]||("Связка "+(ev.slotIdx+1))}: <b>{ev.elementName}</b></span>:<span style={{color:"#94a3b8",fontStyle:"italic"}}>без привязки</span>}
            {ev.note&&<span style={{color:"#64748b",fontSize:11}}> ({ev.note})</span>}
          </div>
          <button onClick={()=>removePenaltyEvent(ev.id)} style={{width:24,height:24,borderRadius:6,border:"1px solid #334155",background:"#1e293b",color:"#64748b",fontSize:12,cursor:"pointer"}} title="Удалить">×</button>
        </div>))}
      </div>}

      {/* ДСК toggle */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",paddingTop:10,borderTop:"1px solid #334155"}}>
        <div><div style={{fontSize:13,color:"#e2e8f0",fontWeight:500}}>Дисквалификация</div><div style={{fontSize:11,color:"#64748b"}}>Баллы → 0, не в призах</div></div>
        <button onClick={()=>setPenalties(p=>({...p,dq:!p.dq}))} style={{padding:"6px 16px",borderRadius:8,border:`1px solid ${penalties.dq?"rgba(239,68,68,0.5)":"#334155"}`,background:penalties.dq?"rgba(239,68,68,0.2)":"#0f172a",color:penalties.dq?"#ef4444":"#64748b",fontSize:13,fontWeight:600,cursor:"pointer"}}>{penalties.dq?"ДСК":"Нет"}</button>
      </div>
      {(penaltyScore>0||penalties.dq)&&<div style={{marginTop:10,padding:"8px 12px",background:"rgba(239,68,68,0.08)",borderRadius:8,border:"1px solid rgba(239,68,68,0.2)",fontSize:12,color:"#ef4444",fontWeight:600}}>
        {penalties.dq?"ДИСКВАЛИФИКАЦИЯ":"Штраф: -"+penaltyScore+" б. (грязь: "+dirtyCount+", падения: "+fallCount+")"}
      </div>}
    </div>

    {/* Модалка выбора элемента для штрафа */}
    {penaltyPicker&&<PenaltyPickerModal type={penaltyPicker.type} slots={slots} slotNames={SN} onApply={(slotIdx,elementIdx,elementName,note)=>{addPenaltyEvent(penaltyPicker.type,slotIdx,elementIdx,elementName,note);setPenaltyPicker(null);}} onApplyUnlinked={(note)=>{addPenaltyEvent(penaltyPicker.type,null,null,null,note);setPenaltyPicker(null);}} onClose={()=>setPenaltyPicker(null)}/>}

    {/* Result + protocol buttons (открытые соревнования) */}
    {all.length>0&&(<div style={{marginTop:24,padding:20,borderRadius:16,textAlign:"center",background:isDQ?"linear-gradient(135deg,rgba(239,68,68,0.15),rgba(239,68,68,0.05))":"linear-gradient(135deg,rgba(245,158,11,0.15),rgba(245,158,11,0.05))",border:`1px solid ${isDQ?"rgba(239,68,68,0.3)":"rgba(245,158,11,0.3)"}`}}><div style={{fontSize:18,fontWeight:700,color:isDQ?"#ef4444":"#f59e0b"}}>{isDQ?"ДИСКВАЛИФИКАЦИЯ":"Итого: "+r.tot.toFixed(1)+" баллов"}</div><div style={{fontSize:12,color:"#64748b",marginTop:4}}>{isDQ?"0 баллов — не участвует в призах":r.credited.length+" уникальных элементов"}</div>
      <button onClick={()=>{
        const d=new Date().toLocaleDateString("ru-RU");
        let txt="ПРОТОКОЛ WU (Открытые) — "+d+"\n";
        txt+="Пол: "+(g==="M"?"Мужчины":"Женщины")+"\n";
        if(isDQ)txt+="Результат: ДИСКВАЛИФИКАЦИЯ\n";
        txt+="═══════════════════════════\n";
        slots.forEach((s,i)=>{if(!s.length)return;txt+="\n"+(SN[i]||("Связка "+(i+1)))+":\n";s.forEach(el=>{txt+="  "+el.name+" ("+el.cat+", "+el.score+" б.)\n";});});
        txt+="\n═══════════════════════════\n";
        if(!isDQ&&r.level)txt+="Разряд: "+r.level.name+" (диапазон ["+r.levelRange[0]+"; "+r.levelRange[1]+"])\n";
        txt+="Элементы: "+r.raw.toFixed(1)+" | Баланс: +"+r.b.toFixed(1)+" | ИТОГО: "+r.tot.toFixed(1)+"\n";
        txt+="Статика: "+r.sC+" | Динамика: "+r.dC+"\n";
        if(penalties.events.length>0){
          txt+="\nШтрафы:\n";
          penalties.events.forEach(ev=>{
            const label=ev.type==="dirty"?"Грязь(−2)":"Падение(−4)";
            const loc=ev.elementName?(SN[ev.slotIdx]||("Связка "+(ev.slotIdx+1)))+", "+ev.elementName:"без привязки";
            txt+="  • "+label+" — "+loc+(ev.note?" ("+ev.note+")":"")+"\n";
          });
          txt+="Итого штрафов: -"+penaltyScore+" б.\n";
        }
        if(navigator.share){navigator.share({title:"Протокол WU (Открытые)",text:txt}).catch(()=>{});}
        else{navigator.clipboard.writeText(txt).then(()=>{}).catch(()=>{const w=window.open();if(w){const p=w.document.createElement("pre");p.textContent=txt;w.document.body.appendChild(p);}});}
      }} style={{marginTop:12,padding:"8px 20px",borderRadius:10,border:"1px solid rgba(245,158,11,0.3)",background:"rgba(245,158,11,0.1)",color:"#f59e0b",fontSize:13,fontWeight:600,cursor:"pointer"}}>Протокол</button>
    </div>)}

    {/* Combo / Creativity (открытые соревнования) — валидация по rankNumber из max(tot) */}
    {(() => {
      const rankNumber=(!isDQ&&r.level)?r.level.num:null;
      const hasEls=all.length>0;
      const comboOver=rankNumber!=null&&combo>rankNumber;
      const creatOver=rankNumber!=null&&creativity>rankNumber;
      const selObj=selAthlete?compAthletes.find(x=>x.id===selAthlete):null;
      const canSubmit=!!selObj&&(isDQ||(hasEls&&!comboOver&&!creatOver&&rankNumber!=null));
      const submit=()=>{
        if(!canSubmit||!selObj||(!isDQ&&!r.level))return;
        const entry={
          id:selObj.id,
          name:selObj.name,
          sex:selObj.sex,
          age:selObj.age,
          rank:r.level?r.level.name:null,
          rankNumber:r.level?r.level.num:null,
          raw:Math.round(r.raw*100)/100,
          balance:Math.round(r.b*100)/100,
          penalties:penaltyScore,
          combo:combo,
          creativity:creativity,
          total:isDQ?0:Math.round((r.raw+r.b-penaltyScore+combo+creativity)*100)/100,
          dsk:!!isDQ,
          ts:Date.now()
        };
        sendToOpenProtocol(entry);
        setToast(isDQ?"ДСК отправлено в протокол":"Отправлено в протокол");
        setTimeout(()=>setToast(""),2000);
      };
      const fieldBase={flex:1,padding:"10px 12px",background:"#0f172a",borderRadius:8,color:"#e2e8f0",fontSize:14,outline:"none",boxSizing:"border-box"};
      const okBorder="1px solid #334155";
      const errBorder="1px solid #ef4444";
      const hintBadge=(hasEls&&rankNumber!=null)?String(rankNumber):"—";
      return(<div style={{marginTop:16,padding:16,background:"#1e293b",borderRadius:8,border:"1px solid #334155"}}>
        <div style={{fontSize:11,color:"#f59e0b",fontWeight:600,marginBottom:10,textTransform:"uppercase",letterSpacing:"0.05em"}}>Комбо и Креатив</div>
        <div style={{display:"flex",gap:10,marginBottom:10}}>
          <div style={{flex:1}}>
            <label style={{fontSize:11,color:"#64748b",display:"block",marginBottom:4}}>Комбо</label>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <input type="number" min="0" step="1" value={combo} disabled={!hasEls}
                onChange={e=>setCombo(Math.max(0,parseInt(e.target.value)||0))}
                onBlur={e=>setCombo(Math.max(0,parseInt(e.target.value)||0))}
                style={{...fieldBase,border:comboOver?errBorder:okBorder,opacity:hasEls?1:0.5}}/>
              <span title={hasEls?("Лимит: "+hintBadge):"Добавьте элементы"} style={{minWidth:34,textAlign:"center",padding:"4px 8px",borderRadius:8,background:"rgba(245,158,11,0.12)",border:"1px solid rgba(245,158,11,0.3)",color:"#f59e0b",fontSize:13,fontWeight:700}}>{hintBadge}</span>
            </div>
          </div>
          <div style={{flex:1}}>
            <label style={{fontSize:11,color:"#64748b",display:"block",marginBottom:4}}>Креатив</label>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <input type="number" min="0" step="1" value={creativity} disabled={!hasEls}
                onChange={e=>setCreativity(Math.max(0,parseInt(e.target.value)||0))}
                onBlur={e=>setCreativity(Math.max(0,parseInt(e.target.value)||0))}
                style={{...fieldBase,border:creatOver?errBorder:okBorder,opacity:hasEls?1:0.5}}/>
              <span title={hasEls?("Лимит: "+hintBadge):"Добавьте элементы"} style={{minWidth:34,textAlign:"center",padding:"4px 8px",borderRadius:8,background:"rgba(245,158,11,0.12)",border:"1px solid rgba(245,158,11,0.3)",color:"#f59e0b",fontSize:13,fontWeight:700}}>{hintBadge}</span>
            </div>
          </div>
        </div>
        {(comboOver||creatOver)&&<div style={{fontSize:11,color:"#ef4444",marginBottom:8}}>Лимит: {hintBadge} (по текущему разряду)</div>}
        {canSubmit&&<button onClick={submit} title={canSubmit?"":("Лимит: "+hintBadge)} style={{width:"100%",padding:"12px",borderRadius:8,border:isDQ?"1px solid rgba(239,68,68,0.4)":"1px solid rgba(245,158,11,0.4)",background:isDQ?"linear-gradient(135deg,rgba(239,68,68,0.2),rgba(239,68,68,0.08))":"linear-gradient(135deg,rgba(245,158,11,0.2),rgba(245,158,11,0.08))",color:isDQ?"#ef4444":"#f59e0b",fontSize:14,fontWeight:700,cursor:"pointer"}}>{isDQ?"Отправить (ДСК)":"Отправить в протокол"}</button>}
        {!canSubmit&&selObj&&hasEls&&(comboOver||creatOver)&&<button disabled title={"Лимит: "+hintBadge} style={{width:"100%",padding:"12px",borderRadius:8,border:"1px solid #334155",background:"#0f172a",color:"#64748b",fontSize:14,fontWeight:700,cursor:"not-allowed"}}>Отправить в протокол</button>}
        {toast&&<div style={{marginTop:10,padding:"8px 12px",borderRadius:8,background:"rgba(34,197,94,0.12)",border:"1px solid rgba(34,197,94,0.3)",color:"#22c55e",fontSize:12,textAlign:"center",fontWeight:600}}>{toast}</div>}
      </div>);
    })()}
    <div style={{textAlign:"center",padding:"32px 0 16px",fontSize:11,color:"#334155"}}>WU Open Calc v1 — {ELS.length} эл.</div>
  </div></div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(e=>console.log('SW:',e));}
</script>
</body>
</html>
